version: "2"

linters:
  default: standard
  enable:
    - sloglint
    - errorlint
    - errcheck
    - govet
    - staticcheck
    - exhaustruct

  settings:
    sloglint:
      # Enforce attributes-only (no key-value pairs in message)
      attr-only: true
      # Prevent mixing structured args with key-value pairs
      no-mixed-args: true
      # Enforce static message strings (no fmt.Sprintf in messages)
      static-msg: true
      # Enforce snake_case keys (e.g., "device_id", not "deviceID")
      key-naming-case: snake
      # Forbid reserved keys that collide with built-in handler output
      forbidden-keys:
        - time
        - level
        - msg
        - source

formatters:
  enable:
    - goimports # checks if the code and import statements are formatted according to the 'goimports' command
    - golines # checks if code is formatted, and fixes long lines
    - gofmt # checks if the code is formatted according to 'gofmt' command

  settings:
    golines:
      # Target maximum line length.
      # Default: 100
      max-len: 120