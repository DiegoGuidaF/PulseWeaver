version: "2"

# Build with "test" tag so packages that use test-only code (e.g. internal/testutils, internal/testdb) load correctly.
run:
  build-tags:
    - test
    - lint

linters:
  default: standard
  enable:
    - errcheck
    - errorlint
    - govet
    - staticcheck
    - sloglint
    - bodyclose
    - noctx
    - unparam
    - prealloc
    - revive
  disable:
    # exhaustruct requires all struct fields to be set — too noisy for
    # third-party structs (http.Server, slog.HandlerOptions, etc.)
    - exhaustruct

  settings:
    sloglint:
      # Enforce attributes-only (no key-value pairs in message)
      attr-only: true
      # Prevent mixing structured args with key-value pairs
      no-mixed-args: true
      # Enforce static message strings (no fmt.Sprintf in messages)
      static-msg: true
      # Enforce snake_case keys (e.g., "device_id", not "deviceID")
      key-naming-case: snake
      # Forbid reserved keys that collide with built-in handler output
      forbidden-keys:
        - time
        - level
        - msg
        - source
    revive:
      rules:
        # Disable exported rule - too noisy for internal packages
        # Can be re-enabled later when doc comments are added
        # - name: exported
        - name: error-strings
        - name: error-naming
        - name: var-naming
        - name: indent-error-flow

issues:
  exclude-rules:
    - path: .*_test\.go$
      linters:
        - unparam
        - revive
    - path: \.gen\.go
      linters:
        - revive
        - errcheck
        - staticcheck

formatters:
  enable:
    - goimports # checks if the code and import statements are formatted according to the 'goimports' command
    - gofmt # checks if the code is formatted according to 'gofmt' command
