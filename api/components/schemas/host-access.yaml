KnownHost:
  type: object
  required:
    - id
    - fqdn
    - created_at
  properties:
    id:
      $ref: './common.yaml#/ID'
    fqdn:
      type: string
      description: Fully-qualified domain name (lowercased).
    icon:
      type: string
      nullable: true
      description: Tabler icon name.
    created_at:
      type: string
      format: date-time
      x-go-type: UTCTime

KnownHostWithStats:
  type: object
  required:
    - id
    - fqdn
    - created_at
    - user_count
  properties:
    id:
      $ref: './common.yaml#/ID'
    fqdn:
      type: string
    icon:
      type: string
      nullable: true
    created_at:
      type: string
      format: date-time
      x-go-type: UTCTime
    last_seen:
      type: string
      format: date-time
      nullable: true
      description: Last time this host appeared in the access log.
      x-go-type: UTCTime
    user_count:
      type: integer
      description: Number of distinct users with access to this host.

BulkCreateKnownHostsRequest:
  type: object
  required:
    - fqdns
  properties:
    fqdns:
      type: array
      minItems: 1
      items:
        type: string
        minLength: 1
      description: One or more FQDNs to register as known hosts.

UpdateKnownHostRequest:
  type: object
  properties:
    icon:
      type: string
      nullable: true
      x-go-type: NullableString
      x-go-type-skip-optional-pointer: true
      description: Tabler icon name. Pass null to clear.

HostGroup:
  type: object
  required:
    - id
    - name
    - created_at
  properties:
    id:
      $ref: './common.yaml#/ID'
    name:
      type: string
    description:
      type: string
      nullable: true
    icon:
      type: string
      nullable: true
    created_at:
      type: string
      format: date-time
      x-go-type: UTCTime

HostGroupWithMembers:
  type: object
  required:
    - id
    - name
    - created_at
    - host_ids
  properties:
    id:
      $ref: './common.yaml#/ID'
    name:
      type: string
    description:
      type: string
      nullable: true
    icon:
      type: string
      nullable: true
    created_at:
      type: string
      format: date-time
      x-go-type: UTCTime
    host_ids:
      type: array
      items:
        $ref: './common.yaml#/ID'

CreateHostGroupRequest:
  type: object
  required:
    - name
  properties:
    name:
      type: string
      minLength: 1
      maxLength: 100
    description:
      type: string
      nullable: true
      maxLength: 500
    icon:
      type: string
      nullable: true

UpdateHostGroupRequest:
  type: object
  required:
    - name
  properties:
    name:
      type: string
      minLength: 1
      maxLength: 100
    description:
      type: string
      nullable: true
      x-go-type: NullableString
      x-go-type-skip-optional-pointer: true
    icon:
      type: string
      nullable: true
      x-go-type: NullableString
      x-go-type-skip-optional-pointer: true

SetHostGroupMembersRequest:
  type: object
  required:
    - host_ids
  properties:
    host_ids:
      type: array
      items:
        type: integer
      description: Complete list of known-host IDs for this group.

UserHostGrants:
  type: object
  required:
    - bypass
    - host_ids
    - group_ids
  properties:
    bypass:
      type: boolean
      description: When true the user can reach every known host.
    host_ids:
      type: array
      items:
        $ref: './common.yaml#/ID'
    group_ids:
      type: array
      items:
        $ref: './common.yaml#/ID'

SetUserHostGrantsRequest:
  type: object
  properties:
    bypass:
      type: boolean
    host_ids:
      type: array
      items:
        type: integer
    group_ids:
      type: array
      items:
        type: integer

IgnoredHostSuggestion:
  type: object
  required:
    - id
    - fqdn
    - created_at
  properties:
    id:
      $ref: './common.yaml#/ID'
    fqdn:
      type: string
    created_at:
      type: string
      format: date-time
      x-go-type: UTCTime

HostSuggestion:
  type: object
  required:
    - fqdn
    - first_seen
    - allowed_hits
    - denied_hits
  properties:
    fqdn:
      type: string
    first_seen:
      type: string
      format: date-time
      x-go-type: UTCTime
    allowed_hits:
      type: integer
    denied_hits:
      type: integer

IgnoreSuggestionRequest:
  type: object
  required:
    - fqdn
  properties:
    fqdn:
      type: string
      minLength: 1
