GroupRef:
  type: object
  required:
    - id
    - name
  properties:
    id:
      $ref: './common.yaml#/ID'
    name:
      type: string

KnownHostRef:
  type: object
  required:
    - id
    - fqdn
  properties:
    id:
      $ref: './common.yaml#/ID'
    fqdn:
      type: string
    icon:
      type: string
      nullable: true

KnownHost:
  type: object
  required:
    - id
    - fqdn
    - created_at
  properties:
    id:
      $ref: './common.yaml#/ID'
    fqdn:
      type: string
      description: Fully-qualified domain name (lowercased).
    icon:
      type: string
      nullable: true
      description: Tabler icon name.
    created_at:
      type: string
      format: date-time
      x-go-type: UTCTime

KnownHostWithStats:
  type: object
  required:
    - id
    - fqdn
    - created_at
    - user_count
    - groups
  properties:
    id:
      $ref: './common.yaml#/ID'
    fqdn:
      type: string
    icon:
      type: string
      nullable: true
    created_at:
      type: string
      format: date-time
      x-go-type: UTCTime
    user_count:
      type: integer
      description: Number of distinct users with access to this host.
    groups:
      type: array
      items:
        $ref: '#/GroupRef'
      description: Host groups this host belongs to.

BulkCreateKnownHostsRequest:
  type: object
  required:
    - fqdns
  properties:
    fqdns:
      type: array
      minItems: 1
      items:
        type: string
        minLength: 1
      description: One or more FQDNs to register as known hosts.

UpdateKnownHostRequest:
  type: object
  properties:
    icon:
      type: string
      nullable: true
      x-go-type: NullableString
      x-go-type-skip-optional-pointer: true
      description: Tabler icon name. Pass null to clear.

HostGroupWithMembers:
  type: object
  required:
    - id
    - name
    - created_at
    - hosts
  properties:
    id:
      $ref: './common.yaml#/ID'
    name:
      type: string
    description:
      type: string
      nullable: true
    icon:
      type: string
      nullable: true
    created_at:
      type: string
      format: date-time
      x-go-type: UTCTime
    hosts:
      type: array
      items:
        $ref: '#/KnownHostRef'

CreateHostGroupRequest:
  type: object
  required:
    - name
  properties:
    name:
      type: string
      minLength: 1
      maxLength: 100
    description:
      type: string
      nullable: true
      maxLength: 500
    icon:
      type: string
      nullable: true
    host_ids:
      type: array
      description: Known-host IDs to include in the group.
      items:
        $ref: './common.yaml#/ID'

UpdateHostGroupRequest:
  type: object
  required:
    - name
  properties:
    name:
      type: string
      minLength: 1
      maxLength: 100
    description:
      type: string
      nullable: true
      x-go-type: NullableString
      x-go-type-skip-optional-pointer: true
    icon:
      type: string
      nullable: true
      x-go-type: NullableString
      x-go-type-skip-optional-pointer: true
    host_ids:
      type: array
      description: Known-host IDs for this group. Omit to leave members unchanged; pass empty array to clear.
      items:
        $ref: './common.yaml#/ID'

SetUserHostGrantsRequest:
  type: object
  properties:
    bypass:
      type: boolean
    host_ids:
      type: array
      items:
        type: integer
    group_ids:
      type: array
      items:
        type: integer

IgnoredHostSuggestion:
  type: object
  required:
    - id
    - fqdn
    - created_at
  properties:
    id:
      $ref: './common.yaml#/ID'
    fqdn:
      type: string
    created_at:
      type: string
      format: date-time
      x-go-type: UTCTime

HostSuggestion:
  type: object
  required:
    - fqdn
    - first_seen
    - allowed_hits
    - denied_hits
  properties:
    fqdn:
      type: string
    first_seen:
      type: string
      format: date-time
      x-go-type: UTCTime
    allowed_hits:
      type: integer
    denied_hits:
      type: integer

IgnoreSuggestionRequest:
  type: object
  required:
    - fqdn
  properties:
    fqdn:
      type: string
      minLength: 1

HostSuggestionsPage:
  type: object
  required:
    - suggestions
    - ignored
  properties:
    suggestions:
      type: array
      items:
        $ref: '#/HostSuggestion'
    ignored:
      type: array
      items:
        $ref: '#/IgnoredHostSuggestion'

UserHostAccessSummary:
  type: object
  required:
    - id
    - display_name
    - email
    - role
    - bypass
    - direct_host_count
    - groups
  properties:
    id:
      $ref: './common.yaml#/ID'
    display_name:
      type: string
    email:
      type: string
      format: email
    role:
      $ref: './users.yaml#/UserRole'
    bypass:
      type: boolean
      description: When true the user can reach every known host.
    direct_host_count:
      type: integer
      description: Number of hosts granted directly via user_allowed_hosts.
    groups:
      type: array
      items:
        $ref: '#/GroupRef'

UserHostDetails:
  type: object
  required:
    - id
    - display_name
    - email
    - role
    - bypass
    - groups
    - hosts
  properties:
    id:
      $ref: './common.yaml#/ID'
    display_name:
      type: string
    email:
      type: string
      format: email
    role:
      $ref: './users.yaml#/UserRole'
    bypass:
      type: boolean
    groups:
      type: array
      items:
        $ref: '#/UserHostDetailsGroup'
    hosts:
      type: array
      items:
        $ref: '#/UserHostDetailsHost'

UserHostDetailsGroup:
  type: object
  required:
    - id
    - name
    - granted
    - hosts
  properties:
    id:
      $ref: './common.yaml#/ID'
    name:
      type: string
    icon:
      type: string
      nullable: true
    granted:
      type: boolean
      description: Whether this group is granted to the user.
    hosts:
      type: array
      items:
        $ref: '#/KnownHostRef'

UserHostDetailsHost:
  type: object
  required:
    - id
    - fqdn
    - directly_granted
  properties:
    id:
      $ref: './common.yaml#/ID'
    fqdn:
      type: string
    icon:
      type: string
      nullable: true
    directly_granted:
      type: boolean
      description: Whether this host is directly granted to the user.
    via_group:
      nullable: true
      allOf:
        - $ref: '#/GroupRef'
      description: First (alphabetically) granted group that covers this host, if any.
