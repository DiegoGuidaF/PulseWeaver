GroupRef:
  type: object
  required:
    - id
    - name
  properties:
    id:
      $ref: './common.yaml#/ID'
    name:
      type: string

KnownHostRef:
  type: object
  required:
    - id
    - fqdn
  properties:
    id:
      $ref: './common.yaml#/ID'
    fqdn:
      type: string
      maxLength: 253
    icon:
      type: string
      nullable: true

KnownHostWithStats:
  type: object
  required:
    - id
    - fqdn
    - created_at
    - user_count
    - groups
  properties:
    id:
      $ref: './common.yaml#/ID'
    fqdn:
      type: string
      maxLength: 253
    icon:
      type: string
      nullable: true
    created_at:
      type: string
      format: date-time
      x-go-type: UTCTime
    user_count:
      type: integer
      description: Number of distinct users with access to this host.
    groups:
      type: array
      items:
        $ref: '#/GroupRef'
      description: Host groups this host belongs to.


HostGroupWithMembers:
  type: object
  required:
    - id
    - name
    - created_at
    - hosts
    - member_ids
  properties:
    id:
      $ref: './common.yaml#/ID'
    name:
      type: string
    color:
      type: string
      nullable: true
      description: UI accent colour for the group. Null means "not chosen".
    description:
      type: string
      nullable: true
    icon:
      type: string
      nullable: true
    created_at:
      type: string
      format: date-time
      x-go-type: UTCTime
    hosts:
      type: array
      description: Hydrated member hosts (id + fqdn + icon) for display.
      items:
        $ref: '#/KnownHostRef'
    member_ids:
      type: array
      description: Plain list of member host IDs, parallel to `hosts`. Useful to round-trip into a reconcile request.
      items:
        $ref: './common.yaml#/ID'

DesiredKnownHost:
  type: object
  required:
    - fqdn
  description: |
    A single known host inside a reconcile request. A null `id` marks a
    brand-new host; a non-null `id` must match an existing row. `fqdn` is
    immutable on updates — a mismatch is rejected.
  properties:
    id:
      nullable: true
      allOf:
        - $ref: './common.yaml#/ID'
    fqdn:
      type: string
      minLength: 3
      maxLength: 253
    icon:
      type: string
      nullable: true

ReconcileKnownHostsRequest:
  type: object
  required:
    - hosts
  description: |
    Full desired image of all known hosts. Hosts already in the database whose
    ID is absent from `hosts` will be deleted; hosts with a non-null ID are
    updated (icon only); hosts with a null ID are created. An empty `hosts`
    array deletes every known host.
  properties:
    hosts:
      type: array
      items:
        $ref: '#/DesiredKnownHost'

DesiredHostGroup:
  type: object
  required:
    - name
  description: |
    A single host group inside a reconcile request. A null `id` marks a
    brand-new group; a non-null `id` must match an existing group.
  properties:
    id:
      nullable: true
      allOf:
        - $ref: './common.yaml#/ID'
    name:
      type: string
      minLength: 1
      maxLength: 100
    color:
      type: string
      nullable: true
      description: UI accent colour. Null means "not chosen".
    description:
      type: string
      nullable: true
      maxLength: 500
    icon:
      type: string
      nullable: true
    host_ids:
      type: array
      description: Known-host IDs that should be members of this group.
      items:
        $ref: './common.yaml#/ID'

ReconcileHostGroupsRequest:
  type: object
  required:
    - groups
  description: |
    Full desired image of all host groups. Groups already in the database whose
    ID is absent from `groups` will be deleted; groups with a non-null ID are
    updated; groups with a null ID are created.
  properties:
    groups:
      type: array
      items:
        $ref: '#/DesiredHostGroup'

SetUserHostGrantsRequest:
  type: object
  properties:
    bypass:
      type: boolean
    host_ids:
      type: array
      items:
        type: integer
    group_ids:
      type: array
      items:
        type: integer

IgnoredHostSuggestion:
  type: object
  required:
    - id
    - fqdn
    - created_at
  properties:
    id:
      $ref: './common.yaml#/ID'
    fqdn:
      type: string
      maxLength: 253
    created_at:
      type: string
      format: date-time
      x-go-type: UTCTime

HostSuggestion:
  type: object
  required:
    - fqdn
    - first_seen
    - allowed_hits
    - denied_hits
  properties:
    fqdn:
      type: string
      maxLength: 253
    first_seen:
      type: string
      format: date-time
      x-go-type: UTCTime
    allowed_hits:
      type: integer
    denied_hits:
      type: integer

IgnoreSuggestionRequest:
  type: object
  required:
    - fqdn
  properties:
    fqdn:
      type: string
      minLength: 3
      maxLength: 253
      pattern: '^[a-zA-Z0-9]([a-zA-Z0-9-]{0,61}[a-zA-Z0-9])?(\.[a-zA-Z0-9]([a-zA-Z0-9-]{0,61}[a-zA-Z0-9])?)+$'
      description: FQDN to add to the ignore list.

HostSuggestionsPage:
  type: object
  required:
    - suggestions
    - ignored
  properties:
    suggestions:
      type: array
      items:
        $ref: '#/HostSuggestion'
    ignored:
      type: array
      items:
        $ref: '#/IgnoredHostSuggestion'

UserHostAccessSummary:
  type: object
  required:
    - id
    - display_name
    - email
    - role
    - bypass
    - direct_host_count
    - groups
  properties:
    id:
      $ref: './common.yaml#/ID'
    display_name:
      type: string
    email:
      type: string
      format: email
    role:
      $ref: './users.yaml#/UserRole'
    bypass:
      type: boolean
      description: When true the user can reach every known host.
    direct_host_count:
      type: integer
      description: Number of hosts granted directly via user_allowed_hosts.
    groups:
      type: array
      items:
        $ref: '#/GroupRef'

UserHostDetails:
  type: object
  required:
    - id
    - display_name
    - email
    - role
    - bypass
    - groups
    - hosts
  properties:
    id:
      $ref: './common.yaml#/ID'
    display_name:
      type: string
    email:
      type: string
      format: email
    role:
      $ref: './users.yaml#/UserRole'
    bypass:
      type: boolean
    groups:
      type: array
      items:
        $ref: '#/UserHostDetailsGroup'
    hosts:
      type: array
      items:
        $ref: '#/UserHostDetailsHost'

UserHostDetailsGroup:
  type: object
  required:
    - id
    - name
    - granted
    - hosts
  properties:
    id:
      $ref: './common.yaml#/ID'
    name:
      type: string
    icon:
      type: string
      nullable: true
    granted:
      type: boolean
      description: Whether this group is granted to the user.
    hosts:
      type: array
      items:
        $ref: '#/KnownHostRef'

UserHostDetailsHost:
  type: object
  required:
    - id
    - fqdn
    - directly_granted
  properties:
    id:
      $ref: './common.yaml#/ID'
    fqdn:
      type: string
      maxLength: 253
    icon:
      type: string
      nullable: true
    directly_granted:
      type: boolean
      description: Whether this host is directly granted to the user.
    via_group:
      nullable: true
      allOf:
        - $ref: '#/GroupRef'
      description: First (alphabetically) granted group that covers this host, if any.
