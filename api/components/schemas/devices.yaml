CreateDeviceRequest:
  type: object
  required:
    - name
  properties:
    name:
      type: string
      example: Personal phone
      minLength: 1
      maxLength: 50
      description: "User-friendly name for the device"
    owner_id:
      type: integer
      nullable: true
      description: "Admin only. Owner to assign the device to. Ignored for regular users (always assigned to self). When omitted by an admin, defaults to the calling admin's own ID."

UpdateDeviceRequest:
  type: object
  properties:
    name:
      type: string
      minLength: 1
      maxLength: 50
      description: "New name for the device"
    device_type:
      type: string
      enum: [static, mobile]
      description: Network behaviour classification.
    description:
      type: string
      nullable: true
      maxLength: 200
      x-go-type: NullableString
      x-go-type-skip-optional-pointer: true
      description: Free-form note. Pass null to clear.
    icon:
      type: string
      nullable: true
      maxLength: 80
      x-go-type: NullableString
      x-go-type-skip-optional-pointer: true
      description: Tabler icon name override. Pass null to clear.
    owner_id:
      type: integer
      nullable: true
      description: "Admin only. Reassign device ownership to another user."

CreateDeviceResponse:
  type: object
  required:
    - device
  properties:
    device:
      $ref: '#/Device'

DeviceAPIKeyResponse:
  type: object
  required:
    - device
    - api_key
  properties:
    device:
      $ref: '#/Device'
    api_key:
      type: string
      description: Secret key for the device.

Device:
  type: object
  required:
    - id
    - name
    - created_at
    - device_type
    - updated_at
    - owner_id
  properties:
    created_at:
      type: string
      format: date-time
      x-go-type: UTCTime
    updated_at:
      type: string
      format: date-time
      x-go-type: UTCTime
      description: Last time the device profile was modified.
    id:
      $ref: './common.yaml#/ID'
    name:
      description: "User-friendly name for the device"
      type: string
      minLength: 1
      maxLength: 50
    device_type:
      type: string
      enum: [static, mobile]
      description: Network behaviour classification. Defaults to "static".
    description:
      type: string
      nullable: true
      maxLength: 200
      description: Free-form note about the device.
    icon:
      type: string
      nullable: true
      maxLength: 80
      description: Tabler icon name override (e.g. "IconRouter").
    api_key_prefix:
      type: string
      nullable: true
      description: Prefix of the device API key (for display only). Null if no API key has been generated yet.
    address_count:
      type: integer
      minimum: 0
      readOnly: true
      description: Number of currently enabled addresses for this device.
    last_seen_at:
      type: string
      format: date-time
      nullable: true
      readOnly: true
      x-go-type: UTCTime
      description: Most recent address activity for this device (heartbeat or manual update).
    owner_id:
      readOnly: true
      $ref: './common.yaml#/ID'
      description: ID of the user who owns this device.
    owner_name:
      type: string
      readOnly: true
      description: Display name of the owning user (for display only).

DeviceTypeItem:
  type: object
  required:
    - value
    - label
  properties:
    value:
      type: string
    label:
      type: string

DeviceHeartbeatByApiKeyRequest:
  type: object
  properties:
    ip:
      $ref: './common.yaml#/IPAddress'

DeviceState:
  type: string
  enum: [healthy, stale, pending-claim, expired-claim]
  description: >
    Derived lifecycle state of a device.
    healthy: has at least one live address.
    stale: no live addresses.
    pending-claim / expired-claim: awaiting or failed device pairing (future feature).

HostGroupSummary:
  type: object
  required: [id, name, color, icon]
  properties:
    id:
      $ref: './common.yaml#/ID'
    name:
      type: string
    color:
      type: string
      description: Hex color string (e.g. "#4C6EF5").
    icon:
      type: string
      description: Tabler icon name.

DeviceRuleSummary:
  type: object
  required: [type, enabled]
  properties:
    type:
      type: string
      enum: [auto_expiry, max_active]
    enabled:
      type: boolean
    ttl_seconds:
      type: integer
      nullable: true
      description: TTL in seconds. Present for auto_expiry rules.
    limit:
      type: integer
      nullable: true
      description: Maximum allowed live-address count. Present for max_active rules.

DevicePairingSummary:
  type: object
  required: [expires_at]
  properties:
    expires_at:
      type: string
      format: date-time
      x-go-type: UTCTime
      description: When the pairing code expires.

DeviceListEntry:
  type: object
  required: [id, name, created_at, state, live_address_count, rules]
  properties:
    id:
      $ref: './common.yaml#/ID'
    name:
      type: string
    icon:
      type: string
      nullable: true
      description: Tabler icon name override.
    key_prefix:
      type: string
      nullable: true
      description: First characters of the API key (display only).
    created_at:
      type: string
      format: date-time
      x-go-type: UTCTime
      description: When the device was created.
    last_seen_at:
      type: string
      format: date-time
      nullable: true
      x-go-type: UTCTime
      description: Most recent address heartbeat for this device.
    state:
      $ref: '#/DeviceState'
    live_address_count:
      type: integer
      minimum: 0
    rules:
      type: array
      items:
        $ref: '#/DeviceRuleSummary'
    pairing:
      nullable: true
      allOf:
        - $ref: '#/DevicePairingSummary'

DeviceListOwner:
  type: object
  required: [id, username, display_name, role, bypass_hosts_check, host_groups, device_count, live_address_count]
  properties:
    id:
      $ref: './common.yaml#/ID'
    username:
      type: string
    display_name:
      type: string
    role:
      $ref: './users.yaml#/UserRole'
    bypass_hosts_check:
      type: boolean
    host_groups:
      type: array
      items:
        $ref: '#/HostGroupSummary'
      description: Host groups the owner belongs to. Always returned; frontend hides them when bypass_hosts_check is true.
    device_count:
      type: integer
      minimum: 0
    live_address_count:
      type: integer
      minimum: 0
      description: Aggregate count of live addresses across all owner's devices.

DeviceOwnerGroup:
  type: object
  required: [owner, devices]
  properties:
    owner:
      $ref: '#/DeviceListOwner'
    devices:
      type: array
      items:
        $ref: '#/DeviceListEntry'
