NetworkPolicyListItem:
  type: object
  required: [id, name, cidr, enabled, groups, host_count, bypass_host_check, created_at]
  description: Network policy summary for the access management list page.
  properties:
    id:
      $ref: './common.yaml#/ID'
    name:
      type: string
      example: Home LAN
    cidr:
      type: string
      description: Normalized CIDR notation, e.g. "192.168.1.0/24"
    enabled:
      type: boolean
    groups:
      type: array
      items:
        $ref: './host-groups.yaml#/GroupRef'
    host_count:
      type: integer
      minimum: 0
      description: Total hosts accessible across all assigned groups.
    bypass_host_check:
      type: boolean
    created_at:
      type: string
      format: date-time
      x-go-type: UTCTime

NetworkPolicyDetail:
  type: object
  required: [id, name, cidr, enabled, groups, bypass_host_check, created_at, updated_at]
  description: Full network policy detail including group assignments.
  properties:
    id:
      $ref: './common.yaml#/ID'
    name:
      type: string
      example: Home LAN
    cidr:
      type: string
      description: Normalized CIDR notation, e.g. "192.168.1.0/24"
    description:
      type: string
      nullable: true
    enabled:
      type: boolean
    groups:
      type: array
      description: All groups with their hosts and assignment status.
      items:
        $ref: './host-groups.yaml#/SubjectGroupDetail'
    bypass_host_check:
      type: boolean
    created_at:
      type: string
      format: date-time
      x-go-type: UTCTime
    updated_at:
      type: string
      format: date-time
      x-go-type: UTCTime

CreateNetworkPolicyRequest:
  type: object
  required: [name, cidr]
  properties:
    name:
      type: string
      minLength: 1
      maxLength: 100
    cidr:
      type: string
      description: CIDR notation. Host bits are zeroed automatically by the server.
    description:
      type: string
      nullable: true
      maxLength: 500

ModifyNetworkPolicyRequest:
  type: object
  required: [name, cidr, enabled, description]
  properties:
    name:
      type: string
      minLength: 1
      maxLength: 100
    cidr:
      type: string
    description:
      type: string
      nullable: true
      maxLength: 500
    enabled:
      type: boolean
