CreateRegistrationRequest:
  type: object
  required:
    - device_name
    - heartbeat_server_url
    - interval_seconds
    - expires_in_hours
    - owner_id
  properties:
    owner_id:
      $ref: 'common.yaml#/ID'
      description: ID of the user who will own the registered device.
    device_name:
      type: string
      minLength: 1
      maxLength: 100
      example: "Dad's Phone"
    heartbeat_server_url:
      type: string
      format: uri
      example: "https://pulse.home.lan"
    interval_seconds:
      type: integer
      minimum: 60
      example: 900
    app_biometric_enabled:
      type: boolean
      default: false
    app_settings_locked:
      type: boolean
      default: false
    expires_in_hours:
      type: integer
      enum: [1, 24, 48, 168]
      example: 24

PendingRegistration:
  type: object
  required:
    - id
    - device_name
    - owner_id
    - heartbeat_server_url
    - interval_seconds
    - app_biometric_enabled
    - app_settings_locked
    - expires_at
    - created_at
    - status
  properties:
    id:
      $ref: 'common.yaml#/ID'
    device_name:
      type: string
    owner_id:
      $ref: 'common.yaml#/ID'
      description: ID of the user who owns the registered device.
    registration_code:
      type: string
      nullable: true
      description: Present only while unclaimed. Null after the invite is used.
    heartbeat_server_url:
      type: string
    interval_seconds:
      type: integer
    app_biometric_enabled:
      type: boolean
    app_settings_locked:
      type: boolean
    expires_at:
      type: string
      format: date-time
      x-go-type: UTCTime
    created_at:
      type: string
      format: date-time
      x-go-type: UTCTime
    used_at:
      type: string
      format: date-time
      x-go-type: UTCTime
      nullable: true
    invalidated_at:
      type: string
      format: date-time
      x-go-type: UTCTime
      nullable: true
    created_device_id:
      $ref: 'common.yaml#/ID'
      nullable: true
      description: Set after the invite is claimed and the device is created.
    status:
      type: string
      enum: [pending, used, expired, invalidated]

ClaimRegistrationRequest:
  type: object
  required:
    - code
  properties:
    code:
      type: string
      description: The full registration code as received (not decoded).

ClaimRegistrationResponse:
  type: object
  required:
    - server_url
    - interval_seconds
    - app_biometric_enabled
    - app_settings_locked
    - api_key
  properties:
    server_url:
      type: string
    interval_seconds:
      type: integer
    app_biometric_enabled:
      type: boolean
    app_settings_locked:
      type: boolean
    api_key:
      type: string
      description: Plaintext device API key — one time only.
