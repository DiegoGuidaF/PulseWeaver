AccessLogResponse:
  type: object
  required:
    - total
    - next_cursor
    - rows
  properties:
    total:
      type: integer
      description: Total rows matching the current filters (excludes cursor, useful for "N results" UI)
    next_cursor:
      type: string
      nullable: true
      description: >
        Opaque, server-issued pagination token. Pass it back verbatim as the
        `cursor` param to fetch the next page. Null when there are no more rows.
        Encodes the active sort, so it is only valid for the sort it was issued under.
    rows:
      type: array
      items:
        $ref: '#/AccessLogRow'

AccessLogFilterOperator:
  type: string
  description: >
    Filter operator for a value column. Supplied as the sibling `{field}_op` query
    param; defaults to `in` when omitted. Allowed operators vary per column.
  enum:
    - in
    - not_in
    - contains
    - not_contains
    - is_null
    - not_null

AccessLogContributor:
  type: object
  description: >
    One device/user/address that the request's client IP resolved to. A single IP
    (shared router/home network) can resolve to several, so each entry carries a list.
  properties:
    device_id:
      $ref: './common.yaml#/ID'
    device_name:
      type: string
    user_id:
      $ref: './common.yaml#/ID'
    user_name:
      type: string
    address_id:
      $ref: './common.yaml#/ID'

AccessLogCountryStats:
  type: object
  required: [country_code, total, allowed, denied]
  properties:
    country_code:
      type: string
    country_name:
      type: string
    continent_code:
      type: string
    total:
      type: integer
    allowed:
      type: integer
    denied:
      type: integer

AccessLogRow:
  type: object
  required: [id, created_at, outcome, client_ip, headers, contributors, contributor_count]
  properties:
    id:
      $ref: './common.yaml#/ID'
    client_ip:
      $ref: './common.yaml#/IPAddress'
    outcome:
      type: boolean
    deny_reason:
      allOf:
        - $ref: './common.yaml#/PolicyDenyReason'
      nullable: true
    contributors:
      type: array
      description: >
        All devices/users/addresses this request's client IP resolved to. Empty
        when no device matched (e.g. a denied request from an unknown IP).
      items:
        $ref: '#/AccessLogContributor'
    contributor_count:
      type: integer
      description: >
        Denormalized count of contributor rows (device×address×user tuples). The
        coarse "is this ambiguous?" signal; > 1 means the IP resolved to several.
    created_at:
      type: string
      format: date-time
      x-go-type: UTCTime
    xff_chain:
      type: string
    target_host:
      type: string
    target_uri:
      type: string
    http_method:
      type: string
    country_code:
      type: string
      description: ISO 3166-1 alpha-2, e.g. "DE"
    country_name:
      type: string
      description: e.g. "Germany"
    continent_code:
      type: string
      description: e.g. "EU"
    asn:
      type: integer
      description: Autonomous System Number
    asn_org:
      type: string
      description: e.g. "Cloudflare, Inc."
    duration_us:
      type: integer
      format: int64
      description: Request processing duration in microseconds
    headers:
      type: object
      additionalProperties:
        type: array
        items:
          type: string
    network_policy_id:
      allOf:
        - $ref: './common.yaml#/ID'
      nullable: true
      description: >
        ID of the network policy that authorized this request, when the match was
        via CIDR containment rather than a device address. Null for device-matched
        or denied requests.
    network_policy_name:
      type: string
      nullable: true
      description: Display name of the matching network policy at log time.
