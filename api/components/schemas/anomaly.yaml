AnomalyKind:
  type: string
  description: >
    The detector output that produced an anomaly, grouped by family: rules
    (expired_access, invalid_token), volume (deny_spike, entity_drift,
    geo_denied, host_probing, address_churn), and novelty (new_user_agent,
    new_country, impossible_travel).
  enum:
    - expired_access
    - invalid_token
    - deny_spike
    - entity_drift
    - geo_denied
    - host_probing
    - address_churn
    - new_user_agent
    - new_country
    - impossible_travel

AnomalySeverity:
  type: string
  description: How much an operator should care about a finding.
  enum:
    - info
    - warning
    - critical

AnomalyStatus:
  type: string
  description: >
    Lifecycle of a persisted anomaly. Dedup keeps at most one open row per
    fingerprint; acknowledging a row lets a later recurrence open a new one.
  enum:
    - open
    - acknowledged

Anomaly:
  type: object
  required: [id, kind, severity, status, first_seen_at, last_seen_at, evidence, summary]
  properties:
    id:
      $ref: './common.yaml#/ID'
    kind:
      $ref: '#/AnomalyKind'
    severity:
      $ref: '#/AnomalySeverity'
    status:
      $ref: '#/AnomalyStatus'
    first_seen_at:
      type: string
      format: date-time
      x-go-type: UTCTime
      description: When the condition was first observed.
    last_seen_at:
      type: string
      format: date-time
      x-go-type: UTCTime
      description: When the condition was most recently re-observed.
    device_id:
      allOf:
        - $ref: './common.yaml#/ID'
      nullable: true
      description: >
        Attributed device, when the finding is device-scoped. Null once the
        device is deleted (the name is retained).
    device_name:
      type: string
      description: Device name at detection time; retained after device deletion.
    user_id:
      allOf:
        - $ref: './common.yaml#/ID'
      nullable: true
      description: Attributed user; null once the user is deleted.
    user_name:
      type: string
      description: User name at detection time; retained after user deletion.
    client_ip:
      type: string
      nullable: true
      description: Source IP the finding relates to, when applicable.
    target_host:
      type: string
      nullable: true
      description: Target host the finding relates to, when applicable.
    country_code:
      type: string
      nullable: true
      description: ISO 3166-1 alpha-2 country the finding relates to, when applicable.
    evidence:
      type: object
      additionalProperties: true
      description: >
        Kind-specific supporting detail (counts, thresholds, involved values). A
        free-form object shaped by the detector that produced the finding.
    summary:
      type: string
      description: >
        One-line, presentation-ready description of the finding, rendered by
        the backend from the evidence. Kind-specific wording; safe to display
        as-is.

AnomalyListResponse:
  type: object
  required: [anomalies]
  properties:
    anomalies:
      type: array
      items:
        $ref: '#/Anomaly'
