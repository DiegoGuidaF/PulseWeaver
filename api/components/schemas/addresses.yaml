AddAddressRequest:
  required:
    - ip
  type: object
  properties:
    ip:
      $ref: './common.yaml#/IPAddress'

Address:
  type: object
  required:
    - id
    - device_id
    - ip
    - is_enabled
    - source
    - created_at
    - updated_at
  properties:
    id:
      $ref: './common.yaml#/ID'
    device_id:
      $ref: './common.yaml#/ID'
    ip:
      $ref: './common.yaml#/IPAddress'
    is_enabled:
      type: boolean
      description: The latest state of this address, enabled or disabled
    source:
      $ref: '#/AddressEventSource'
      description: What triggered the last state change.
    created_at:
      type: string
      format: date-time
      x-go-type: UTCTime
    updated_at:
      type: string
      format: date-time
      x-go-type: UTCTime
      description: Last time it was enabled or disabled
    expires_at:
      type: string
      format: date-time
      x-go-type: UTCTime
      nullable: true
      readOnly: true
      description: >
        UTC timestamp when this address will auto-expire, if an auto-expiry rule
        is enabled for the device. Null if no expiry is scheduled.

AddressHistoryResponse:
  type: object
  required:
    - buckets
    - events
    - total_events
  properties:
    buckets:
      type: array
      items:
        $ref: '#/AddressHistoryBucket'
    events:
      type: array
      items:
        $ref: '#/AddressHistoryEvent'
    total_events:
      type: integer
      description: Total number of events matching the filters (for pagination)
    next_cursor:
      allOf:
        - $ref: './common.yaml#/ID'
      nullable: true

AddressHistoryBucket:
  type: object
  required:
    - timestamp
    - active_count
    - gap_count
    - event_count
  properties:
    timestamp:
      type: string
      format: date-time
      x-go-type: UTCTime
    active_count:
      type: integer
      description: Count of addresses whose last event in this bucket was enabled (active at end of period)
    gap_count:
      type: integer
      description: Count of addresses that had at least one expiry event in this bucket
    event_count:
      type: integer
      description: Total address events in this time bucket

AddressEventSource:
  type: string
  description: What triggered an address state change
  enum:
    - heartbeat
    - manual
    - expiry
    - limit_exceeded

AddressHistoryEvent:
  type: object
  required:
    - id
    - timestamp
    - ip
    - is_enabled
    - source
    - device_id
    - device_name
    - ip_changed
    - is_refresh
  properties:
    id:
      $ref: './common.yaml#/ID'
    timestamp:
      type: string
      format: date-time
      x-go-type: UTCTime
    ip:
      $ref: './common.yaml#/IPAddress'
    is_enabled:
      type: boolean
      description: Whether the address was enabled or disabled
    source:
      $ref: '#/AddressEventSource'
    device_id:
      $ref: './common.yaml#/ID'
    device_name:
      type: string
      description: Name of the device
    time_gap_seconds:
      type: integer
      format: int64
      nullable: true
      description: >
        Seconds since the previous address event for this device, across all of
        its addresses. Null when there is no prior event in the queried range.
    ip_changed:
      type: boolean
      description: >
        Whether the IP differs from the previous address event for this device.
        False for the first event in the queried range.
    is_refresh:
      type: boolean
      description: >
        Whether this event repeats the previous one for this device with no
        change in IP or enabled state (a pure heartbeat refresh).
    ttl_seconds:
      type: integer
      format: int64
      nullable: true
      description: >
        The device's configured address-lease TTL in seconds, if an auto-expiry
        rule is enabled for the device. Null otherwise.
