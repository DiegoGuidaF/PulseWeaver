PolicyUserMapAudit:
  type: object
  required: [refreshed_at, refresh_duration_ms, total_ip_count, total_device_count, total_host_count, shared_ip_count, users, total_network_policy_count, network_policies]
  properties:
    refreshed_at:
      type: string
      format: date-time
      x-go-type: UTCTime
      description: When the cache was last fully refreshed.
    refresh_duration_ms:
      type: integer
      description: How long the last refresh took in milliseconds.
    total_ip_count:
      type: integer
      description: Distinct IPs currently in the policy cache.
    total_device_count:
      type: integer
      description: Total distinct device contributors across all IPs in the cache.
    total_host_count:
      type: integer
      description: >
        Distinct hosts across the union of all users' pre-intersection allowed
        host lists. Denominator for the allowed_host_count / total_host_count ratio.
    shared_ip_count:
      type: integer
      description: Distinct IPs shared between two or more users.
    users:
      type: array
      items:
        $ref: '#/PolicyUserEntry'
    total_network_policy_count:
      type: integer
      description: Number of enabled network policies currently in the cache.
    network_policies:
      type: array
      items:
        $ref: '#/PolicyNetworkPolicyEntry'
      description: >
        All enabled network policies currently in the cache.

PolicyUserStatus:
  type: string
  enum:
    - bypass
    - live_with_access
    - live_no_host_access
    - no_live_ips
    - no_access
  description: >
    Effective access classification along two orthogonal axes: reachability
    (does the user have live IPs in the cache?) and authorization (does the user
    have host grants?).
      - bypass: host allowlist is bypassed; the host check does not apply.
      - live_with_access: has live IPs and host grants.
      - live_no_host_access: has live IPs but no host grants — the device is
        active yet every request is denied.
      - no_live_ips: no live IPs, but host grants exist.
      - no_access: no live IPs and no host grants.

PolicyUserEntry:
  type: object
  required:
    - user_id
    - display_name
    - is_admin
    - bypass_allowlist
    - status
    - on_shared_ip
    - intersection_applied
    - device_count
    - ip_count
    - allowed_host_count
    - user_allowed_hosts
    - ips
  properties:
    user_id:
      $ref: './common.yaml#/ID'
    display_name:
      type: string
      description: User display name.
    is_admin:
      type: boolean
      description: True when the user has an admin or superadmin role.
    bypass_allowlist:
      type: boolean
      description: True when this user has the host allowlist bypass enabled.
    status:
      allOf:
        - $ref: '#/PolicyUserStatus'
      description: >
        Effective access classification, computed server-side from
        bypass_allowlist, ip_count and allowed_host_count.
    on_shared_ip:
      type: boolean
      description: >
        True when at least one of this user's IPs is shared with another
        user.
    intersection_applied:
      type: boolean
      description: >
        True when at least one of this user's IPs had its effective host set
        reduced by deny-wins intersection with another user at that IP.
    device_count:
      type: integer
      description: >
        Distinct devices owned by this user that contribute to the cache.
        Zero for no-access users.
    ip_count:
      type: integer
      description: >
        Distinct IPs this user currently contributes to. Zero for no-access
        users.
    allowed_host_count:
      type: integer
      description: >
        Size of user_allowed_hosts (pre-intersection). Zero when
        bypass_allowlist is true; the UI should render "All".
    last_seen_at:
      type: string
      format: date-time
      x-go-type: UTCTime
      nullable: true
      description: >
        Most recent address.updated_at across this user's addresses. Null
        when the user has no enabled IPs.
    user_allowed_hosts:
      type: array
      items:
        type: string
      description: >
        Pre-intersection allowed host list for this user. Empty when
        bypass_allowlist is true.
    ips:
      type: array
      items:
        $ref: '#/PolicyUserIP'
      description: >
        IPs this user currently contributes to. Empty for no-access users
        (never null — empty array, for client ergonomics).

PolicyIPDevice:
  type: object
  required: [device_id, device_name]
  properties:
    device_id:
      $ref: './common.yaml#/ID'
    device_name:
      type: string

PolicyUserIPSharedUser:
  type: object
  required: [user_id, username, user_name, devices]
  properties:
    user_id:
      $ref: './common.yaml#/ID'
    username:
      type: string
      description: Login username of the co-located user.
    user_name:
      type: string
      description: Display name of the co-located user.
    devices:
      type: array
      items:
        $ref: '#/PolicyIPDevice'
      description: Devices this user has at this IP.

PolicyUserIP:
  type: object
  required:
    - ip
    - shared_with_users
    - bypass_at_ip
    - effective_hosts
    - trimmed_hosts
    - addresses
  properties:
    ip:
      $ref: './common.yaml#/IPAddress'
    shared_with_users:
      type: array
      items:
        $ref: '#/PolicyUserIPSharedUser'
      description: >
        Other users (excluding self) that also contribute to this IP. Empty
        means this user is the sole owner of the IP.
    bypass_at_ip:
      type: boolean
      description: >
        True when the IP entry as a whole bypasses the host allowlist (every
        contributor at this IP has bypass set). When true, effective_hosts
        is empty and means "All".
    effective_hosts:
      type: array
      items:
        type: string
      description: >
        Hosts actually allowed for THIS user at THIS IP after deny-wins
        intersection. Equals user_allowed_hosts when the user is the sole
        contributor; intersected with other restricted contributors
        otherwise. Empty when bypass_at_ip is true.
    trimmed_hosts:
      type: array
      items:
        type: string
      description: >
        Hosts the user had pre-intersection that were removed by intersection
        at this IP. Empty when no trimming occurred. Always empty when the
        user has bypass_allowlist true (their grants are not subject to
        intersection).
    addresses:
      type: array
      items:
        $ref: '#/PolicyUserAddress'
      description: >
        The user's own addresses sitting at this IP. Multiple entries when
        the same user has several devices behind the same NAT.
    geo:
      allOf:
        - $ref: './common.yaml#/GeoInfo'
      nullable: true
      description: >
        GeoIP metadata resolved on read for this IP. Null when the IP is
        unresolvable or GeoIP enrichment is disabled.

PolicyUserAddress:
  type: object
  required: [address_id, device_id, device_name, updated_at]
  properties:
    address_id:
      $ref: './common.yaml#/ID'
    device_id:
      $ref: './common.yaml#/ID'
    device_name:
      type: string
    updated_at:
      type: string
      format: date-time
      x-go-type: UTCTime
      description: Last heartbeat or manual update time for this address.

PolicySimulateDenyReason:
  type: string
  enum:
    - ip_not_registered
    - host_not_allowed
  description: Reason for denial.

PolicyNetworkPolicyEntry:
  type: object
  required: [policy_id, policy_name, cidr, enabled, bypass_host_check,
             effective_host_count, total_host_count]
  properties:
    policy_id:
      $ref: './common.yaml#/ID'
    policy_name:
      type: string
    cidr:
      type: string
    enabled:
      type: boolean
      description: >
        False when the policy is present in the snapshot but currently disabled.
        Disabled policies are cached but bypassed in verify decisions.
    bypass_host_check:
      type: boolean
    effective_host_count:
      type: integer
      description: >
        Hosts reachable through this policy. Equals total_host_count when
        bypass_host_check is true.
    total_host_count:
      type: integer

PolicySimulateResult:
  type: object
  required:
    - ip
    - host
    - allowed
  properties:
    ip:
      $ref: './common.yaml#/IPAddress'
    host:
      type: string
    allowed:
      type: boolean
    deny_reason:
      allOf:
        - $ref: '#/PolicySimulateDenyReason'
      nullable: true
      description: Reason for denial; null when allowed is true.
    match_source:
      type: string
      enum: [device, network_policy]
      nullable: true
      description: >
        Which mechanism authorized the request. Null when allowed is false.
    network_policy_id:
      allOf:
        - $ref: './common.yaml#/ID'
      nullable: true
      description: ID of the matching policy when match_source is 'network_policy'.
    network_policy_name:
      type: string
      nullable: true
      description: Name of the matching policy when match_source is 'network_policy'.
