Username:
  type: string
  description: "Unique username. Lowercase alphanumeric, underscores, and hyphens only. Uppercase letters are not accepted."
  minLength: 3
  maxLength: 32
  pattern: '^[a-z0-9_-]+$'
  example: "john_doe"

UserRole:
  type: string
  enum:
    - superadmin
    - admin
    - user
  description: The user's role. User role cannot login. Only superadmin can manage users.

DisplayName:
  type: string
  description: "User's public name. Unicode allowed."
  minLength: 1
  maxLength: 50
  example: "John Doe"

Password:
  type: string
  format: password
  minLength: 8
  maxLength: 72
  example: "123ASecretPassword"

User:
  type: object
  required:
    - id
    - username
    - display_name
    - email
    - role
    - must_change_password
    - bypass_host_allowlist
    - created_at
  properties:
    id:
      $ref: './common.yaml#/ID'
    username:
      $ref: '#/Username'
    display_name:
      $ref: '#/DisplayName'
    email:
      type: string
      format: email
    role:
      $ref: '#/UserRole'
      readOnly: true
    must_change_password:
      type: boolean
      readOnly: true
      description: When true, the user must change their password before using the app.
    bypass_host_allowlist:
      type: boolean
      description: When true the user bypasses the host allowlist and can reach every known host.
    created_at:
      type: string
      format: date-time
      x-go-type: UTCTime

AuthRequest:
  type: object
  required:
    - username
    - password
  properties:
    username:
      $ref: '#/Username'
    password:
      $ref: '#/Password'

CreateUserRequest:
  type: object
  required:
    - username
    - display_name
    - email
  properties:
    username:
      $ref: '#/Username'
    display_name:
      $ref: '#/DisplayName'
    email:
      type: string
      format: email
      example: "user@example.com"

PromoteUserRequest:
  type: object
  required:
    - password
  properties:
    password:
      $ref: '#/Password'

UpdateProfileRequest:
  type: object
  anyOf:
    - required: [ display_name ]
    - required: [ username ]
    - required: [ email ]
  properties:
    display_name:
      $ref: '#/DisplayName'
    username:
      type: string
      minLength: 3
      maxLength: 32
      pattern: '^[a-z0-9_-]+$'
    email:
      type: string
      format: email

ChangePasswordRequest:
  type: object
  required:
    - current_password
    - password
  properties:
    current_password:
      type: string
    password:
      type: string
      minLength: 8
      maxLength: 72

# ── Access management views ────────────────────────────────────────────────────

DeviceListItem:
  type: object
  required: [id, name, live_ip_count]
  description: Device summary shown on user access detail.
  properties:
    id:
      $ref: './common.yaml#/ID'
    name:
      type: string
      example: macbook-maya
    icon:
      type: string
      nullable: true
    live_ip_count:
      type: integer
      minimum: 0
    api_key_prefix:
      type: string
      nullable: true
      description: Non-null when an API key is configured; the full key is never returned.
      example: pw_abc123

UserListItem:
  type: object
  required: [id, username, display_name, groups, host_count, device_count, live_ip_count, bypass_host_check]
  description: User summary for the access management list page.
  properties:
    id:
      $ref: './common.yaml#/ID'
    username:
      type: string
      example: maya.patel
    display_name:
      type: string
      example: Maya Patel
    groups:
      type: array
      items:
        $ref: './groups.yaml#/GroupRef'
    host_count:
      type: integer
      minimum: 0
      description: Total hosts accessible across all assigned groups.
    device_count:
      type: integer
      minimum: 0
    live_ip_count:
      type: integer
      minimum: 0
    bypass_host_check:
      type: boolean

UserAccessDetail:
  type: object
  required: [id, username, display_name, devices, groups, bypass_host_check]
  description: Full user access detail including devices and group assignments.
  properties:
    id:
      $ref: './common.yaml#/ID'
    username:
      type: string
      example: maya.patel
    display_name:
      type: string
      example: Maya Patel
    email:
      type: string
      format: email
      nullable: true
    devices:
      type: array
      items:
        $ref: '#/DeviceListItem'
    groups:
      type: array
      description: All groups with their hosts and assignment status.
      items:
        $ref: './groups.yaml#/SubjectGroupDetail'
    bypass_host_check:
      type: boolean
