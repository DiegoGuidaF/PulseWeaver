DashboardDenyByReason:
  type: object
  description: >
    Denied requests split by reason. The three buckets partition deny_count:
    ip_not_registered + host_not_allowed + other always equals deny_count.
  required:
    - ip_not_registered
    - host_not_allowed
    - other
  properties:
    ip_not_registered:
      type: integer
      format: int64
      description: Denials from IPs with no registered device — unknown IPs (internet noise).
    host_not_allowed:
      type: integer
      format: int64
      description: Denials of a known IP reaching a host it is not granted — a configured user blocked.
    other:
      type: integer
      format: int64
      description: Denials with any other or unrecorded reason, so the split reconciles to deny_count.

DashboardStats:
  type: object
  required:
    - total_requests
    - allow_count
    - deny_count
    - deny_by_reason
    - unique_ips
    - avg_duration_us
  properties:
    total_requests:
      type: integer
      format: int64
    allow_count:
      type: integer
      format: int64
    deny_count:
      type: integer
      format: int64
    deny_by_reason:
      $ref: '#/DashboardDenyByReason'
    unique_ips:
      type: integer
      format: int64
    avg_duration_us:
      type: integer
      format: int64
      description: Average request processing duration in microseconds over the time window

DashboardTrafficBucket:
  type: object
  required:
    - timestamp
    - allow_count
    - deny_count
  properties:
    timestamp:
      type: string
      format: date-time
      x-go-type: UTCTime
    allow_count:
      type: integer
      format: int64
    deny_count:
      type: integer
      format: int64

DashboardTrafficResponse:
  type: object
  required:
    - buckets
  properties:
    buckets:
      type: array
      items:
        $ref: '#/DashboardTrafficBucket'

DashboardServiceCount:
  type: object
  required:
    - host
    - allow_count
    - deny_count
  properties:
    host:
      type: string
    allow_count:
      type: integer
      format: int64
    deny_count:
      type: integer
      format: int64

DashboardServicesResponse:
  type: object
  required:
    - services
  properties:
    services:
      type: array
      items:
        $ref: '#/DashboardServiceCount'

DashboardTopDeniedIp:
  type: object
  required:
    - ip
    - count
  properties:
    ip:
      $ref: './common.yaml#/IPAddress'
    count:
      type: integer
      format: int64
    geo:
      allOf:
        - $ref: './common.yaml#/GeoInfo'
      nullable: true
      description: >
        GeoIP metadata resolved on read for this IP. Null when the IP is
        unresolvable or GeoIP enrichment is disabled.

DashboardTopDeniedIpsResponse:
  type: object
  required:
    - ips
  properties:
    ips:
      type: array
      items:
        $ref: '#/DashboardTopDeniedIp'

DashboardAttributionCount:
  type: object
  required:
    - entity_name
    - allow_count
    - deny_count
  properties:
    entity_id:
      allOf:
        - $ref: './common.yaml#/ID'
      nullable: true
      description: >
        Entity ID (network policy, user, or device, per the requested kind), or
        null when the entity has since been deleted (its traffic is still
        reported under the retained entity_name).
    entity_name:
      type: string
    allow_count:
      type: integer
      format: int64
    deny_count:
      type: integer
      format: int64

DashboardAttributionSplitResponse:
  type: object
  required:
    - entities
  properties:
    entities:
      type: array
      items:
        $ref: '#/DashboardAttributionCount'

DashboardPostureUsers:
  type: object
  description: User counts bucketed by their effective policy status.
  required:
    - bypass
    - live_with_access
    - live_no_host_access
    - no_live_ips
    - no_access
  properties:
    bypass:
      type: integer
      description: Users who bypass the host allowlist and can reach every host.
    live_with_access:
      type: integer
      description: Users with live IPs in the policy cache and at least one host grant.
    live_no_host_access:
      type: integer
      description: >
        Users with live IPs but no host grants — every request from their
        assigned IPs is denied. A true lockout signal.
    no_live_ips:
      type: integer
      description: Users with host grants but no live IPs in the policy cache (never ran the client).
    no_access:
      type: integer
      description: Users with neither live IPs nor host grants.

DashboardPostureNetworkPolicies:
  type: object
  required:
    - enabled
    - bypass_host_check
  properties:
    enabled:
      type: integer
      description: Number of enabled network policies.
    bypass_host_check:
      type: integer
      description: Enabled network policies that bypass the host check (reach every host).

DashboardPosture:
  type: object
  description: >
    Current-state posture counts for the dashboard landing page. All fields
    except pending_suggestion_count are derived from the policy cache snapshot
    taken at refreshed_at; pending_suggestion_count is a live database read and
    is therefore not covered by refreshed_at.
  required:
    - refreshed_at
    - users
    - network_policies
    - shared_ip_count
    - known_host_count
    - pending_suggestion_count
  properties:
    refreshed_at:
      type: string
      format: date-time
      x-go-type: UTCTime
      description: >
        Timestamp of the policy cache snapshot these counts reduce. Applies to
        every field except pending_suggestion_count.
    users:
      $ref: '#/DashboardPostureUsers'
    network_policies:
      $ref: '#/DashboardPostureNetworkPolicies'
    shared_ip_count:
      type: integer
      description: IPs shared by two or more users (intersection-trimming precondition).
    known_host_count:
      type: integer
      description: Distinct known hosts across all user allowlists.
    pending_suggestion_count:
      type: integer
      description: >
        Unknown hosts receiving real traffic that are neither registered nor
        ignored. A live database read, fresher than refreshed_at.
