ErrorResponse:
  type: object
  properties:
    error:
      type: string
      example: device not found

ID:
  type: integer
  format: int64

IPAddress:
  type: string
  description: "IPv4 or IPv6 address"
  anyOf:
    - type: string
      format: ipv4
    - type: string
      format: ipv6
  example: "192.168.1.132"

GeoInfo:
  type: object
  description: >
    GeoIP-derived metadata for an IP, resolved on read. Every field is optional:
    individual fields are absent when the database has no value for that IP, and
    the whole object is absent (null) when the IP is unresolvable (private range,
    unknown) or GeoIP enrichment is disabled.
  properties:
    country_code:
      type: string
      description: "ISO 3166-1 alpha-2 country code, e.g. \"DE\"."
      example: "DE"
    country_name:
      type: string
      description: "Country name in English, e.g. \"Germany\"."
      example: "Germany"
    continent_code:
      type: string
      description: "Continent code, e.g. \"EU\"."
      example: "EU"
    asn:
      type: integer
      format: int64
      description: "Autonomous System Number, e.g. 13335."
      example: 13335
    asn_org:
      type: string
      description: "Autonomous System organization, e.g. \"Cloudflare, Inc.\"."
      example: "Cloudflare, Inc."
