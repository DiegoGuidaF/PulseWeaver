DeviceAddressLeaseRule:
  type: object
  required:
    - id
    - device_id
    - enabled
    - ttl_seconds
    - created_at
    - updated_at
  properties:
    id:
      $ref: './common.yaml#/ID'
    device_id:
      $ref: './common.yaml#/ID'
    enabled:
      type: boolean
      description: Whether the lease rule is active
    ttl_seconds:
      type: integer
      minimum: 1
      description: Seconds after which an enabled device address lease expires
    created_at:
      type: string
      format: date-time
      x-go-type: UTCTime
    updated_at:
      type: string
      format: date-time
      x-go-type: UTCTime

PutDeviceAddressLeaseRuleRequest:
  type: object
  required:
    - ttl_seconds
  properties:
    ttl_seconds:
      type: integer
      minimum: 1
      description: Seconds after which an enabled device address lease expires

MaxActiveAddressesRule:
  type: object
  required:
    - id
    - device_id
    - enabled
    - max_addresses
    - created_at
    - updated_at
  properties:
    id:
      $ref: './common.yaml#/ID'
    device_id:
      $ref: './common.yaml#/ID'
    enabled:
      type: boolean
      description: Whether the max active addresses rule is active
    max_addresses:
      type: integer
      minimum: 1
      description: Maximum number of simultaneously enabled IP addresses
    created_at:
      type: string
      format: date-time
      x-go-type: UTCTime
    updated_at:
      type: string
      format: date-time
      x-go-type: UTCTime

PutMaxActiveAddressesRuleRequest:
  type: object
  required:
    - max_addresses
  properties:
    max_addresses:
      type: integer
      minimum: 1
      description: Maximum number of simultaneously enabled IP addresses
