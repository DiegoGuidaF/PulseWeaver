openapi: 3.0.1
info:
  title: PulseWeaver Device Management API
  description: Device and IP address management system
  version: '1.0'
servers:
  - url: /api/v1
security:
  - cookieAuth: []
paths:
  /admin/users:
    get:
      operationId: listUsers
      tags:
        - admin
      summary: List all users
      description: Returns all non-deleted users.
      responses:
        '200':
          description: Users list
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/User'
        '401':
          description: Invalid credentials
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '403':
          description: Forbidden - Only admins can list users
        '500':
          description: Internal Server Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
    post:
      operationId: createUser
      tags:
        - admin
      summary: Superadmin only. Register a new user. Creation role is always "user", to create an admin promote it after creation
      description: Creates a new user account.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateUserRequest'
      responses:
        '201':
          description: User created successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/User'
        '400':
          description: Bad Request
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '401':
          description: Invalid credentials
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '403':
          description: Forbidden - Only admins can create users
        '409':
          description: Username or email already registered
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '500':
          description: Internal Server Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
  /admin/users/{user_id}:
    delete:
      operationId: deleteUser
      tags:
        - admin
      summary: Delete a user
      description: Superadmin only. Soft-deletes a user and revokes all user sessions.
      parameters:
        - name: user_id
          in: path
          required: true
          schema:
            $ref: '#/components/schemas/ID'
      responses:
        '204':
          description: User deleted successfully
        '401':
          description: Invalid credentials
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '403':
          description: Forbidden - cannot delete self
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '404':
          description: User not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '500':
          description: Internal Server Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
  /admin/users/{user_id}/promote:
    post:
      operationId: promoteUser
      tags:
        - admin
      summary: Superadmin only. Promote a user to admin
      description: Promotes another user to the admin role and sets their initial password. Cannot promote oneself.
      parameters:
        - name: user_id
          in: path
          required: true
          schema:
            $ref: '#/components/schemas/ID'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/PromoteUserRequest'
      responses:
        '200':
          description: User promoted successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/User'
        '400':
          description: Invalid password
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '401':
          description: Invalid credentials
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '403':
          description: Forbidden - admin credentials required or self-promotion attempted
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '404':
          description: User not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '500':
          description: Internal Server Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
  /admin/users/{user_id}/demote:
    post:
      operationId: demoteUser
      tags:
        - admin
      summary: Superadmin only. Demote an admin to regular user
      description: Demotes another admin to the user role. Cannot demote oneself.
      parameters:
        - name: user_id
          in: path
          required: true
          schema:
            $ref: '#/components/schemas/ID'
      responses:
        '200':
          description: User demoted successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/User'
        '401':
          description: Invalid credentials
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '403':
          description: Forbidden - admin credentials required, self-demotion
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '404':
          description: User not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '500':
          description: Internal Server Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
  /auth/login:
    post:
      operationId: login
      tags:
        - auth
      summary: Login user
      description: Authenticates user and sets a strict HTTP-only session cookie.
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AuthRequest'
      responses:
        '200':
          description: Logged in successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/User'
          headers:
            Set-Cookie:
              schema:
                type: string
        '401':
          description: Invalid credentials
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '500':
          description: Internal Server Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
  /auth/logout:
    post:
      operationId: logout
      tags:
        - auth
      summary: Logout user
      description: Invalidates the session cookie.
      responses:
        '204':
          description: Logged out successfully
          headers:
            Set-Cookie:
              schema:
                type: string
  /auth/me:
    get:
      operationId: getCurrentUser
      tags:
        - auth
      summary: Get current user
      description: Returns the currently authenticated user's details.
      responses:
        '200':
          description: Current user details
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/User'
        '401':
          description: Not authenticated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '500':
          description: Internal Server Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
  /users/me:
    patch:
      operationId: updateMe
      tags:
        - users
      summary: Update current user profile
      description: Updates display name, username, and/or email for the authenticated user.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateProfileRequest'
      responses:
        '200':
          description: User profile updated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/User'
        '400':
          description: Bad Request
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '401':
          description: Not authenticated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '409':
          description: Username or email already registered
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '500':
          description: Internal Server Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
  /users/me/password:
    post:
      operationId: changePassword
      tags:
        - users
      summary: Change current user password. Only administrators can change their password
      description: Validates current password, updates password, and revokes all other sessions.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ChangePasswordRequest'
      responses:
        '204':
          description: Password changed successfully
        '400':
          description: Current password is wrong or new password is invalid
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '401':
          description: Not authenticated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '500':
          description: Internal Server Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
  /devices:
    get:
      operationId: getDevices
      tags:
        - devices
      summary: List all devices grouped by owner
      description: Returns all devices grouped by their owning user. Each group includes owner metadata (host groups, bypass flag, aggregate counts) and the devices' live-address counts, rule summaries, and derived state.
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/DeviceOwnerGroup'
        '500':
          description: Internal Server Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
    post:
      operationId: createDevice
      tags:
        - devices
      summary: Create a device
      description: Create a new device for the authenticated user.
      requestBody:
        description: Device creation request
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateDeviceRequest'
        required: true
      responses:
        '201':
          description: Created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CreateDeviceResult'
        '400':
          description: Bad Request
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '409':
          description: Conflict - Device name already in use
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '500':
          description: Internal Server Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
  /devices/{device_id}:
    delete:
      operationId: deleteDevice
      tags:
        - devices
      summary: Delete a device
      description: Soft-deletes a device. The device is hidden from lists and cannot receive addresses.
      parameters:
        - name: device_id
          in: path
          description: Device id
          required: true
          schema:
            $ref: '#/components/schemas/ID'
      responses:
        '204':
          description: No Content - Device deleted successfully
        '404':
          description: Device not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '500':
          description: Internal Server Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
    patch:
      operationId: updateDevice
      tags:
        - devices
      summary: Update device profile
      description: Update one or more profile fields for a device. Omitted fields are left unchanged. Pass null for description or icon to clear them.
      parameters:
        - name: device_id
          in: path
          description: Device id
          required: true
          schema:
            $ref: '#/components/schemas/ID'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateDeviceRequest'
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Device'
        '400':
          description: Bad Request
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '403':
          description: Forbidden - admin credentials required for owner reassignment
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '404':
          description: Device not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '409':
          description: Conflict - Device name already in use
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '500':
          description: Internal Server Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
  /devices/{device_id}/api-key:
    delete:
      operationId: deleteDeviceAPIKey
      summary: Delete device API key
      description: |
        Permanently removes the API key for the device. Any currently connected device using this key will immediately stop being able to send heartbeats.
      tags:
        - devices
      parameters:
        - name: device_id
          in: path
          description: Device id
          required: true
          schema:
            $ref: '#/components/schemas/ID'
      responses:
        '204':
          description: No Content - API key deleted successfully
        '404':
          description: Device not found or device has no API key
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '500':
          description: Internal Server Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
  /devices/{device_id}/api-key/regenerate:
    post:
      operationId: regenerateDeviceAPIKey
      summary: Generate or regenerate device API key
      description: |
        Generates a new API key for the device. If a key already exists, it is immediately invalidated and replaced. Works as both the first-time generation and rotation endpoint. The raw key is returned once and cannot be retrieved again. Admin-only.
      tags:
        - devices
      parameters:
        - name: device_id
          in: path
          description: Device id
          required: true
          schema:
            $ref: '#/components/schemas/ID'
      responses:
        '200':
          description: API key generated or regenerated successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DeviceAPIKeyResponse'
        '404':
          description: Device not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '500':
          description: Internal Server Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
  /devices/{device_id}/disable:
    post:
      operationId: disableDevice
      summary: Disable a device
      description: |
        Reversibly freezes a device: disables all active addresses (removing its IPs from the access allowlist) and marks the device "Disabled", which blocks address enable/refresh until it is re-enabled via the enable endpoint. The API key is kept — disable is a safety toggle, not a de-credentialing (use the delete-api-key endpoint for that). Distinct from delete (permanent). Admin-only.
      tags:
        - devices
      parameters:
        - name: device_id
          in: path
          description: Device id
          required: true
          schema:
            $ref: '#/components/schemas/ID'
      responses:
        '200':
          description: Device disabled successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Device'
        '404':
          description: Device not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '500':
          description: Internal Server Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
  /devices/{device_id}/enable:
    post:
      operationId: enableDevice
      summary: Re-enable a disabled device
      description: |
        Clears the "Disabled" flag set by disableDevice, re-permitting address enable/refresh. The API key was never removed, so the device heartbeats its addresses back to enabled on its next check-in; addresses disabled at freeze time are not re-enabled by this call. Admin-only.
      tags:
        - devices
      parameters:
        - name: device_id
          in: path
          description: Device id
          required: true
          schema:
            $ref: '#/components/schemas/ID'
      responses:
        '200':
          description: Device enabled successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Device'
        '404':
          description: Device not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '500':
          description: Internal Server Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
  /devices/{device_id}/heartbeat:
    post:
      operationId: deviceHeartbeat
      tags:
        - devices
      summary: Device heartbeat
      description: Device reports its current IP address. Extracts the client IP from the request and ensures it is enabled. Requires API Token or Session.
      parameters:
        - name: device_id
          in: path
          description: Device Id
          required: true
          schema:
            $ref: '#/components/schemas/ID'
      responses:
        '200':
          description: Address enabled
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Address'
        '201':
          description: New address created and enabled
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Address'
        '400':
          description: Invalid IP address format
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '404':
          description: Device not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '409':
          description: Device is disabled; addresses cannot be enabled
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '500':
          description: Internal Server Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
  /heartbeat:
    post:
      operationId: deviceHeartbeatByAPIKey
      tags:
        - devices
      security:
        - apiKeyAuth: []
      summary: Performs a heartbeat with the given api key header
      description: Same as /devices/{device_id}/heartbeat but authentication is provided via api-key for the device to update
      responses:
        '200':
          description: Address enabled
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Address'
        '201':
          description: New address created and enabled
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Address'
        '400':
          description: Invalid IP address format
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '404':
          description: Device not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '409':
          description: Device is disabled; addresses cannot be enabled
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '500':
          description: Internal Server Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
  /devices/{device_id}/addresses:
    get:
      operationId: getDeviceAddresses
      tags:
        - addresses
      summary: Get addresses for a device
      description: Get all enabled addresses for a specific device.
      parameters:
        - name: device_id
          in: path
          description: Device Id
          required: true
          schema:
            $ref: '#/components/schemas/ID'
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Address'
        '400':
          description: Bad Request
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '404':
          description: Device id not Found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '500':
          description: Internal Server Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
    post:
      operationId: addAddress
      tags:
        - addresses
      summary: Assign address to device
      description: Add a new address to a device.
      parameters:
        - name: device_id
          in: path
          description: Device id
          required: true
          schema:
            $ref: '#/components/schemas/ID'
      requestBody:
        description: Address assignment request
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AddAddressRequest'
        required: true
      responses:
        '200':
          description: Address already existed, enabled status set
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Address'
        '201':
          description: Created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Address'
        '400':
          description: Invalid address format
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '404':
          description: Device not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '409':
          description: Device is disabled; addresses cannot be enabled
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '500':
          description: Internal Server Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
  /address-history:
    get:
      operationId: getAddressHistory
      tags:
        - addresses
      summary: Get address activity history
      description: |
        Returns time-bucketed active IP counts and paginated address events. When device_id is omitted, returns history for all devices. When device_id is provided, filters to those devices only.
      parameters:
        - name: device_id
          in: query
          required: false
          description: Filter by device ID(s). Empty means all devices.
          schema:
            type: array
            items:
              $ref: '#/components/schemas/ID'
        - name: from
          in: query
          required: false
          schema:
            type: string
            format: date-time
          description: RFC3339 start of time window (default 24h ago)
        - name: to
          in: query
          required: false
          schema:
            type: string
            format: date-time
          description: RFC3339 end of time window (default now)
        - name: granularity
          in: query
          required: false
          schema:
            type: string
            enum:
              - hour
              - day
            default: hour
          description: Time bucket granularity (default hour)
        - name: source
          in: query
          required: false
          schema:
            $ref: '#/components/schemas/AddressEventSource'
          description: Filter events by source
        - name: is_enabled
          in: query
          required: false
          schema:
            type: boolean
          description: Filter events by enabled/disabled state
        - name: ip
          in: query
          required: false
          schema:
            type: string
          description: Filter events by IP address (substring match)
        - name: limit
          in: query
          required: false
          schema:
            type: integer
            default: 50
            maximum: 200
          description: Maximum number of events to return (default 50, max 200)
        - name: before_id
          in: query
          required: false
          schema:
            type: integer
            format: int64
          description: Cursor for pagination — return events with id < before_id
        - name: include_all
          in: query
          required: false
          schema:
            type: boolean
            default: false
          description: |
            When false (default), returns only state-change events (created, enabled, disabled). When true, includes all events including repeated heartbeat refreshes.
      responses:
        '200':
          description: Address history with time-series buckets and paginated events
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AddressHistoryResponse'
        '400':
          description: Invalid query parameters (e.g. bad granularity)
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '403':
          description: Forbidden - admin credentials required
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '500':
          description: Internal Server Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
  /devices/{device_id}/addresses/{address_id}:
    delete:
      operationId: disableAddress
      tags:
        - addresses
      summary: Disable address
      description: Disables the address for the device.
      parameters:
        - name: device_id
          in: path
          description: Device Id
          required: true
          schema:
            $ref: '#/components/schemas/ID'
        - name: address_id
          in: path
          description: Address id
          required: true
          schema:
            $ref: '#/components/schemas/ID'
      responses:
        '200':
          description: Address successfully disabled
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Address'
        '400':
          description: Missing device id or address id
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '404':
          description: Address or device not found.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '500':
          description: Internal Server Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
  /access-log:
    get:
      operationId: getAccessLog
      tags:
        - access-log
      summary: List access log entries
      description: |
        Returns paginated request log entries to review access-control decisions. Admin-only.
      parameters:
        - name: client_ip
          in: query
          required: false
          schema:
            type: array
            maxItems: 200
            items:
              type: string
          description: Client IP filter values (operators in, not_in, contains, not_contains).
        - name: client_ip_op
          in: query
          required: false
          schema:
            $ref: '#/components/schemas/AccessLogFilterOperator'
        - name: target_host
          in: query
          required: false
          schema:
            type: array
            maxItems: 200
            items:
              type: string
          description: Target host filter values (in, not_in, contains, not_contains, is_null, not_null).
        - name: target_host_op
          in: query
          required: false
          schema:
            $ref: '#/components/schemas/AccessLogFilterOperator'
        - name: target_uri
          in: query
          required: false
          schema:
            type: array
            maxItems: 200
            items:
              type: string
          description: Target URI filter values (in, not_in, contains, not_contains, is_null, not_null).
        - name: target_uri_op
          in: query
          required: false
          schema:
            $ref: '#/components/schemas/AccessLogFilterOperator'
        - name: http_method
          in: query
          required: false
          schema:
            type: array
            maxItems: 200
            items:
              type: string
          description: HTTP method filter values (in, not_in).
        - name: http_method_op
          in: query
          required: false
          schema:
            $ref: '#/components/schemas/AccessLogFilterOperator'
        - name: deny_reason
          in: query
          required: false
          schema:
            type: array
            maxItems: 200
            items:
              type: string
          description: Deny reason filter values (in, not_in, is_null, not_null). See GET /access-log/deny-reasons.
        - name: deny_reason_op
          in: query
          required: false
          schema:
            $ref: '#/components/schemas/AccessLogFilterOperator'
        - name: country_code
          in: query
          required: false
          schema:
            type: array
            maxItems: 200
            items:
              type: string
          description: ISO 3166-1 alpha-2 country codes (in, not_in, is_null, not_null). is_null = no GeoIP row.
        - name: country_code_op
          in: query
          required: false
          schema:
            $ref: '#/components/schemas/AccessLogFilterOperator'
        - name: continent_code
          in: query
          required: false
          schema:
            type: array
            maxItems: 200
            items:
              type: string
          description: Continent codes e.g. "EU" (in, not_in, is_null, not_null).
        - name: continent_code_op
          in: query
          required: false
          schema:
            $ref: '#/components/schemas/AccessLogFilterOperator'
        - name: device_id
          in: query
          required: false
          schema:
            type: array
            maxItems: 200
            items:
              $ref: '#/components/schemas/ID'
          description: Device IDs that contributed to the request (in, not_in, is_null, not_null).
        - name: device_id_op
          in: query
          required: false
          schema:
            $ref: '#/components/schemas/AccessLogFilterOperator'
        - name: user_id
          in: query
          required: false
          schema:
            type: array
            maxItems: 200
            items:
              $ref: '#/components/schemas/ID'
          description: Owning user IDs of contributing devices (in, not_in).
        - name: user_id_op
          in: query
          required: false
          schema:
            $ref: '#/components/schemas/AccessLogFilterOperator'
        - name: network_policy_id
          in: query
          required: false
          schema:
            type: array
            maxItems: 200
            items:
              $ref: '#/components/schemas/ID'
          description: Authorizing network policy IDs (in, not_in, is_null, not_null).
        - name: network_policy_id_op
          in: query
          required: false
          schema:
            $ref: '#/components/schemas/AccessLogFilterOperator'
        - name: outcome
          in: query
          required: false
          schema:
            type: boolean
          description: Filter by allow (true) / deny (false).
        - name: ambiguous
          in: query
          required: false
          schema:
            type: boolean
          description: When true, return only entries whose IP resolved to more than one contributor.
        - name: from
          in: query
          required: false
          schema:
            type: string
            format: date-time
          description: RFC3339 start of time window (default 24h ago)
        - name: to
          in: query
          required: false
          schema:
            type: string
            format: date-time
          description: RFC3339 end of time window (default now)
        - name: sort
          in: query
          required: false
          schema:
            type: string
            default: created_at
            enum:
              - created_at
              - client_ip
              - target_host
              - http_method
              - country_code
              - deny_reason
              - duration_us
              - outcome
          description: Sort column (default created_at). Join-derived columns are not sortable.
        - name: order
          in: query
          required: false
          schema:
            type: string
            default: desc
            enum:
              - asc
              - desc
          description: Sort direction (default desc).
        - name: limit
          in: query
          required: false
          schema:
            type: integer
            default: 50
            maximum: 200
          description: Page size (default 50, max 200)
        - name: cursor
          in: query
          required: false
          schema:
            type: string
          description: |
            Opaque pagination token from a previous response's next_cursor. Pass it back verbatim; do not construct it. Encodes the active sort.
      responses:
        '200':
          description: Access log entries
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AccessLogResponse'
        '400':
          description: Invalid filter, sort, operator, or cursor
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '401':
          description: Not authenticated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '403':
          description: Forbidden - admin credentials required
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '500':
          description: Internal Server Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
