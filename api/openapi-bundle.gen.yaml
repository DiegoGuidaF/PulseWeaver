components:
  securitySchemes:
    cookieAuth:
      type: apiKey
      in: cookie
      name: __Host-wdc_session
    apiKeyAuth:
      type: apiKey
      in: header
      name: X-API-Key
      description: API key for device authentication (e.g. heartbeat)
  schemas:
    ErrorResponse:
      type: object
      properties:
        error:
          type: string
          example: device not found
    ID:
      type: integer
      format: int64
    IPAddress:
      type: string
      description: IPv4 or IPv6 address
      anyOf:
        - type: string
          format: ipv4
        - type: string
          format: ipv6
      example: 192.168.1.132
    Username:
      type: string
      description: Unique username. Lowercase alphanumeric, underscores, and hyphens only. Uppercase letters are not accepted.
      minLength: 3
      maxLength: 32
      pattern: ^[a-z0-9_-]+$
      example: john_doe
    UserRole:
      type: string
      enum:
        - superadmin
        - admin
        - user
      description: The user's role. User role cannot login. Only superadmin can manage users.
    DisplayName:
      type: string
      description: User's public name. Unicode allowed.
      minLength: 1
      maxLength: 50
      example: John Doe
    Password:
      type: string
      format: password
      minLength: 8
      maxLength: 72
      example: 123ASecretPassword
    User:
      type: object
      required:
        - id
        - username
        - display_name
        - role
        - must_change_password
        - bypass_host_check
        - created_at
      properties:
        id:
          $ref: '#/components/schemas/ID'
        username:
          $ref: '#/components/schemas/Username'
        display_name:
          $ref: '#/components/schemas/DisplayName'
        email:
          type: string
          format: email
          nullable: true
        role:
          $ref: '#/components/schemas/UserRole'
          readOnly: true
        must_change_password:
          type: boolean
          readOnly: true
          description: When true, the user must change their password before using the app.
        bypass_host_check:
          type: boolean
          description: When true the user bypasses the host check and can reach every host.
        created_at:
          type: string
          format: date-time
          x-go-type: UTCTime
    AuthRequest:
      type: object
      required:
        - username
        - password
      properties:
        username:
          $ref: '#/components/schemas/Username'
        password:
          $ref: '#/components/schemas/Password'
    CreateUserRequest:
      type: object
      required:
        - username
        - display_name
      properties:
        username:
          $ref: '#/components/schemas/Username'
        display_name:
          $ref: '#/components/schemas/DisplayName'
        email:
          type: string
          format: email
          nullable: true
          example: user@example.com
    PromoteUserRequest:
      type: object
      required:
        - password
      properties:
        password:
          $ref: '#/components/schemas/Password'
    UpdateProfileRequest:
      type: object
      anyOf:
        - required:
            - display_name
        - required:
            - username
        - required:
            - email
      properties:
        display_name:
          $ref: '#/components/schemas/DisplayName'
        username:
          $ref: '#/components/schemas/Username'
        email:
          type: string
          format: email
          nullable: true
          x-go-type: NullableString
          x-go-type-skip-optional-pointer: true
          description: New email. Pass null to clear.
    ChangePasswordRequest:
      type: object
      required:
        - current_password
        - password
      properties:
        current_password:
          type: string
        password:
          type: string
          minLength: 8
          maxLength: 72
    CreateDeviceRequest:
      type: object
      required:
        - name
      properties:
        name:
          type: string
          example: Personal phone
          minLength: 1
          maxLength: 50
          description: User-friendly name for the device
        owner_id:
          type: integer
          nullable: true
          description: Admin only. Owner to assign the device to. Ignored for regular users (always assigned to self). When omitted by an admin, defaults to the calling admin's own ID.
        description:
          type: string
          nullable: true
          maxLength: 200
          x-go-type: NullableString
          x-go-type-skip-optional-pointer: true
          description: Free-form note about the device.
        icon:
          type: string
          nullable: true
          maxLength: 80
          x-go-type: NullableString
          x-go-type-skip-optional-pointer: true
          description: Tabler icon name override (e.g. "IconRouter").
        generate_api_key:
          type: boolean
          description: When true, an API key is minted in the same transaction and returned once in the response. Use for the "API key" credential choice; pairing-code devices are created without a key (the key is minted on claim).
    CreateDeviceResult:
      type: object
      required:
        - device
      properties:
        device:
          $ref: '#/components/schemas/Device'
        api_key:
          type: string
          nullable: true
          description: The raw device API key. Present once, only when generate_api_key was set; cannot be retrieved again.
    UpdateDeviceRequest:
      type: object
      properties:
        name:
          type: string
          minLength: 1
          maxLength: 50
          description: New name for the device
        description:
          type: string
          nullable: true
          maxLength: 200
          x-go-type: NullableString
          x-go-type-skip-optional-pointer: true
          description: Free-form note. Pass null to clear.
        icon:
          type: string
          nullable: true
          maxLength: 80
          x-go-type: NullableString
          x-go-type-skip-optional-pointer: true
          description: Tabler icon name override. Pass null to clear.
        owner_id:
          type: integer
          nullable: true
          description: Admin only. Reassign device ownership to another user.
    Device:
      type: object
      required:
        - id
        - name
        - created_at
        - updated_at
        - owner_id
      properties:
        created_at:
          type: string
          format: date-time
          x-go-type: UTCTime
        updated_at:
          type: string
          format: date-time
          x-go-type: UTCTime
          description: Last time the device profile was modified.
        id:
          $ref: '#/components/schemas/ID'
        name:
          description: User-friendly name for the device
          type: string
          minLength: 1
          maxLength: 50
        description:
          type: string
          nullable: true
          maxLength: 200
          description: Free-form note about the device.
        icon:
          type: string
          nullable: true
          maxLength: 80
          description: Tabler icon name override (e.g. "IconRouter").
        api_key_prefix:
          type: string
          nullable: true
          description: Prefix of the device API key (for display only). Null if no API key has been generated yet.
        disabled_at:
          type: string
          format: date-time
          nullable: true
          readOnly: true
          x-go-type: UTCTime
          description: When the device was disabled, or null if active. A disabled device has all its addresses disabled and cannot enable/refresh addresses until it is re-enabled. Its API key is kept.
        live_address_count:
          type: integer
          minimum: 0
          readOnly: true
          description: Number of currently enabled addresses for this device.
        last_seen_at:
          type: string
          format: date-time
          nullable: true
          readOnly: true
          x-go-type: UTCTime
          description: Most recent address activity for this device (heartbeat or manual update).
        owner_id:
          readOnly: true
          $ref: '#/components/schemas/ID'
          description: ID of the user who owns this device.
        owner_name:
          type: string
          readOnly: true
          description: Display name of the owning user (for display only).
    DeviceAPIKeyResponse:
      type: object
      required:
        - device
        - api_key
      properties:
        device:
          $ref: '#/components/schemas/Device'
        api_key:
          type: string
          description: Secret key for the device.
    DeviceState:
      type: string
      enum:
        - healthy
        - stale
        - disabled
        - pending-claim
        - expired-claim
      description: |
        Derived lifecycle state of a device. healthy: has at least one live address. stale: no live addresses. disabled: all addresses disabled and address enable/refresh blocked until re-enabled; API key kept. pending-claim / expired-claim: awaiting or failed device pairing (future feature).
    DeviceRuleSummary:
      type: object
      required:
        - type
        - enabled
      properties:
        type:
          type: string
          enum:
            - auto_expiry
            - max_active
        enabled:
          type: boolean
        ttl_seconds:
          type: integer
          nullable: true
          description: TTL in seconds. Present for auto_expiry rules.
        limit:
          type: integer
          nullable: true
          description: Maximum allowed live-address count. Present for max_active rules.
    DevicePairingSummary:
      type: object
      required:
        - status
        - expires_at
        - updated_at
      properties:
        status:
          $ref: '#/components/schemas/DevicePairingStatus'
        expires_at:
          type: string
          format: date-time
          x-go-type: UTCTime
          description: When the pairing code expires (or expired).
        updated_at:
          type: string
          format: date-time
          x-go-type: UTCTime
          description: When the status last changed.
    DeviceListEntry:
      type: object
