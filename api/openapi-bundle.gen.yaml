      properties:
        ip:
          $ref: '#/components/schemas/IPAddress'
    Address:
      type: object
      required:
        - id
        - device_id
        - ip
        - is_enabled
        - source
        - created_at
        - updated_at
      properties:
        id:
          $ref: '#/components/schemas/ID'
        device_id:
          $ref: '#/components/schemas/ID'
        ip:
          $ref: '#/components/schemas/IPAddress'
        is_enabled:
          type: boolean
          description: The latest state of this address, enabled or disabled
        source:
          $ref: '#/components/schemas/AddressEventSource'
          description: What triggered the last state change.
        created_at:
          type: string
          format: date-time
          x-go-type: UTCTime
        updated_at:
          type: string
          format: date-time
          x-go-type: UTCTime
          description: Last time it was enabled or disabled
        expires_at:
          type: string
          format: date-time
          x-go-type: UTCTime
          nullable: true
          readOnly: true
          description: |
            UTC timestamp when this address will auto-expire, if an auto-expiry rule is enabled for the device. Null if no expiry is scheduled.
    AddressHistoryResponse:
      type: object
      required:
        - buckets
        - events
        - total_events
      properties:
        buckets:
          type: array
          items:
            $ref: '#/components/schemas/AddressHistoryBucket'
        events:
          type: array
          items:
            $ref: '#/components/schemas/AddressHistoryEvent'
        total_events:
          type: integer
          description: Total number of events matching the filters (for pagination)
        next_cursor:
          allOf:
            - $ref: '#/components/schemas/ID'
          nullable: true
    AddressHistoryBucket:
      type: object
      required:
        - timestamp
        - active_count
        - gap_count
        - event_count
      properties:
        timestamp:
          type: string
          format: date-time
          x-go-type: UTCTime
        active_count:
          type: integer
          description: Count of addresses whose last event in this bucket was enabled (active at end of period)
        gap_count:
          type: integer
          description: Count of addresses that had at least one expiry event in this bucket
        event_count:
          type: integer
          description: Total address events in this time bucket
    AddressEventSource:
      type: string
      description: What triggered an address state change
      enum:
        - heartbeat
        - manual
        - expiry
        - limit_exceeded
    AddressHistoryEvent:
      type: object
      required:
        - id
        - timestamp
        - ip
        - is_enabled
        - source
        - device_id
        - device_name
        - ip_changed
        - is_refresh
      properties:
        id:
          $ref: '#/components/schemas/ID'
        timestamp:
          type: string
          format: date-time
          x-go-type: UTCTime
        ip:
          $ref: '#/components/schemas/IPAddress'
        is_enabled:
          type: boolean
          description: Whether the address was enabled or disabled
        source:
          $ref: '#/components/schemas/AddressEventSource'
        device_id:
          $ref: '#/components/schemas/ID'
        device_name:
          type: string
          description: Name of the device
        time_gap_seconds:
          type: integer
          format: int64
          nullable: true
          description: |
            Seconds since the previous address event for this device, across all of its addresses. Null when there is no prior event in the queried range.
        ip_changed:
          type: boolean
          description: |
            Whether the IP differs from the previous address event for this device. False for the first event in the queried range.
        is_refresh:
          type: boolean
          description: |
            Whether this event repeats the previous one for this device with no change in IP or enabled state (a pure heartbeat refresh).
        ttl_seconds:
          type: integer
          format: int64
          nullable: true
          description: |
            The device's configured address-lease TTL in seconds, if an auto-expiry rule is enabled for the device. Null otherwise.
    AccessLogResponse:
      type: object
      required:
        - total
        - next_cursor
        - rows
      properties:
        total:
          type: integer
          description: Total rows matching the current filters (excludes cursor, useful for "N results" UI)
        next_cursor:
          type: string
          nullable: true
          description: |
            Opaque, server-issued pagination token. Pass it back verbatim as the `cursor` param to fetch the next page. Null when there are no more rows. Encodes the active sort, so it is only valid for the sort it was issued under.
        rows:
          type: array
          items:
            $ref: '#/components/schemas/AccessLogRow'
    AccessLogCountryStats:
      type: object
      required:
        - country_code
        - total
        - allowed
        - denied
      properties:
        country_code:
          type: string
        country_name:
          type: string
        continent_code:
          type: string
        total:
          type: integer
        allowed:
          type: integer
        denied:
          type: integer
    AccessLogRow:
      type: object
      required:
        - id
        - created_at
        - outcome
        - client_ip
        - headers
        - contributors
        - contributor_count
      properties:
        id:
          $ref: '#/components/schemas/ID'
        client_ip:
          $ref: '#/components/schemas/IPAddress'
        outcome:
          type: boolean
        deny_reason:
          type: string
          nullable: true
        contributors:
          type: array
          description: |
            All devices/users/addresses this request's client IP resolved to. Empty when no device matched (e.g. a denied request from an unknown IP).
          items:
            $ref: '#/components/schemas/AccessLogContributor'
        contributor_count:
          type: integer
          description: |
            Denormalized count of contributor rows (device×address×user tuples). The coarse "is this ambiguous?" signal; > 1 means the IP resolved to several.
        created_at:
          type: string
          format: date-time
          x-go-type: UTCTime
        xff_chain:
          type: string
        target_host:
          type: string
        target_uri:
          type: string
        http_method:
          type: string
        country_code:
          type: string
          description: ISO 3166-1 alpha-2, e.g. "DE"
        country_name:
          type: string
          description: e.g. "Germany"
        continent_code:
          type: string
          description: e.g. "EU"
        asn:
          type: integer
          description: Autonomous System Number
        asn_org:
          type: string
          description: e.g. "Cloudflare, Inc."
        duration_us:
          type: integer
          format: int64
          description: Request processing duration in microseconds
        headers:
          type: object
          additionalProperties:
            type: array
            items:
              type: string
        network_policy_id:
          allOf:
            - $ref: '#/components/schemas/ID'
          nullable: true
          description: |
            ID of the network policy that authorized this request, when the match was via CIDR containment rather than a device address. Null for device-matched or denied requests.
        network_policy_name:
          type: string
          nullable: true
          description: Display name of the matching network policy at log time.
    DeviceAddressLeaseRule:
