      properties:
        name:
          type: string
          minLength: 1
          maxLength: 100
        cidr:
          type: string
        description:
          type: string
          nullable: true
          maxLength: 500
        enabled:
          type: boolean
    PolicyUserMapAudit:
      type: object
      required:
        - refreshed_at
        - refresh_duration_ms
        - total_ip_count
        - total_device_count
        - total_host_count
        - shared_ip_count
        - users
        - total_network_policy_count
        - network_policies
      properties:
        refreshed_at:
          type: string
          format: date-time
          x-go-type: UTCTime
          description: When the cache was last fully refreshed.
        refresh_duration_ms:
          type: integer
          description: How long the last refresh took in milliseconds.
        total_ip_count:
          type: integer
          description: Distinct IPs currently in the policy cache.
        total_device_count:
          type: integer
          description: Total distinct device contributors across all IPs in the cache.
        total_host_count:
          type: integer
          description: |
            Distinct hosts across the union of all users' pre-intersection allowed host lists. Denominator for the allowed_host_count / total_host_count ratio.
        shared_ip_count:
          type: integer
          description: Distinct IPs shared between two or more users.
        users:
          type: array
          items:
            $ref: '#/components/schemas/PolicyUserEntry'
        total_network_policy_count:
          type: integer
          description: Number of enabled network policies currently in the cache.
        network_policies:
          type: array
          items:
            $ref: '#/components/schemas/PolicyNetworkPolicyEntry'
          description: |
            All enabled network policies currently in the cache.
    PolicyUserEntry:
      type: object
      required:
        - user_id
        - display_name
        - is_admin
        - bypass_allowlist
        - status
        - on_shared_ip
        - intersection_applied
        - device_count
        - ip_count
        - allowed_host_count
        - user_allowed_hosts
        - ips
      properties:
        user_id:
          $ref: '#/components/schemas/ID'
        display_name:
          type: string
          description: User display name.
        is_admin:
          type: boolean
          description: True when the user has an admin or superadmin role.
        bypass_allowlist:
          type: boolean
          description: True when this user has the host allowlist bypass enabled.
        status:
          allOf:
            - $ref: '#/components/schemas/PolicyUserStatus'
          description: |
            Effective access classification, computed server-side from bypass_allowlist, ip_count and allowed_host_count.
        on_shared_ip:
          type: boolean
          description: |
            True when at least one of this user's IPs is shared with another user.
        intersection_applied:
          type: boolean
          description: |
            True when at least one of this user's IPs had its effective host set reduced by deny-wins intersection with another user at that IP.
        device_count:
          type: integer
          description: |
            Distinct devices owned by this user that contribute to the cache. Zero for no-access users.
        ip_count:
          type: integer
          description: |
            Distinct IPs this user currently contributes to. Zero for no-access users.
        allowed_host_count:
          type: integer
          description: |
            Size of user_allowed_hosts (pre-intersection). Zero when bypass_allowlist is true; the UI should render "All".
        last_seen_at:
          type: string
          format: date-time
          x-go-type: UTCTime
          nullable: true
          description: |
            Most recent address.updated_at across this user's addresses. Null when the user has no enabled IPs.
        user_allowed_hosts:
          type: array
          items:
            type: string
          description: |
            Pre-intersection allowed host list for this user. Empty when bypass_allowlist is true.
        ips:
          type: array
          items:
            $ref: '#/components/schemas/PolicyUserIP'
          description: |
            IPs this user currently contributes to. Empty for no-access users (never null — empty array, for client ergonomics).
    PolicyIPDevice:
      type: object
      required:
        - device_id
        - device_name
      properties:
        device_id:
          $ref: '#/components/schemas/ID'
        device_name:
          type: string
    PolicyUserIPSharedUser:
      type: object
      required:
        - user_id
        - username
        - user_name
        - devices
      properties:
        user_id:
          $ref: '#/components/schemas/ID'
        username:
          type: string
          description: Login username of the co-located user.
        user_name:
          type: string
          description: Display name of the co-located user.
        devices:
          type: array
          items:
            $ref: '#/components/schemas/PolicyIPDevice'
          description: Devices this user has at this IP.
    PolicyUserIP:
      type: object
      required:
        - ip
        - shared_with_users
        - bypass_at_ip
        - effective_hosts
        - trimmed_hosts
        - addresses
      properties:
        ip:
          $ref: '#/components/schemas/IPAddress'
        shared_with_users:
          type: array
          items:
            $ref: '#/components/schemas/PolicyUserIPSharedUser'
          description: |
            Other users (excluding self) that also contribute to this IP. Empty means this user is the sole owner of the IP.
        bypass_at_ip:
          type: boolean
          description: |
            True when the IP entry as a whole bypasses the host allowlist (every contributor at this IP has bypass set). When true, effective_hosts is empty and means "All".
        effective_hosts:
          type: array
          items:
            type: string
          description: |
            Hosts actually allowed for THIS user at THIS IP after deny-wins intersection. Equals user_allowed_hosts when the user is the sole contributor; intersected with other restricted contributors otherwise. Empty when bypass_at_ip is true.
        trimmed_hosts:
          type: array
          items:
            type: string
          description: |
            Hosts the user had pre-intersection that were removed by intersection at this IP. Empty when no trimming occurred. Always empty when the user has bypass_allowlist true (their grants are not subject to intersection).
        addresses:
          type: array
          items:
            $ref: '#/components/schemas/PolicyUserAddress'
          description: |
            The user's own addresses sitting at this IP. Multiple entries when the same user has several devices behind the same NAT.
    PolicyUserAddress:
      type: object
      required:
        - address_id
        - device_id
        - device_name
        - updated_at
      properties:
        address_id:
          $ref: '#/components/schemas/ID'
        device_id:
          $ref: '#/components/schemas/ID'
        device_name:
          type: string
        updated_at:
          type: string
          format: date-time
          x-go-type: UTCTime
          description: Last heartbeat or manual update time for this address.
    PolicySimulateDenyReason:
      type: string
      enum:
        - ip_not_registered
        - host_not_allowed
      description: Reason for denial.
    PolicySimulateResult:
      type: object
      required:
        - ip
        - host
        - allowed
      properties:
        ip:
          $ref: '#/components/schemas/IPAddress'
        host:
          type: string
        allowed:
          type: boolean
        deny_reason:
          allOf:
            - $ref: '#/components/schemas/PolicySimulateDenyReason'
          nullable: true
          description: Reason for denial; null when allowed is true.
        match_source:
          type: string
          enum:
            - device
            - network_policy
          nullable: true
          description: |
            Which mechanism authorized the request. Null when allowed is false.
        network_policy_id:
          allOf:
            - $ref: '#/components/schemas/ID'
          nullable: true
          description: ID of the matching policy when match_source is 'network_policy'.
        network_policy_name:
          type: string
          nullable: true
          description: Name of the matching policy when match_source is 'network_policy'.
    PolicyNetworkPolicyEntry:
      type: object
      required:
        - policy_id
        - policy_name
        - cidr
        - enabled
        - bypass_host_check
        - effective_host_count
        - total_host_count
      properties:
        policy_id:
          $ref: '#/components/schemas/ID'
        policy_name:
          type: string
        cidr:
          type: string
        enabled:
          type: boolean
          description: |
            False when the policy is present in the snapshot but currently disabled. Disabled policies are cached but bypassed in verify decisions.
        bypass_host_check:
          type: boolean
        effective_host_count:
          type: integer
          description: |
            Hosts reachable through this policy. Equals total_host_count when bypass_host_check is true.
        total_host_count:
          type: integer
    GroupRef:
      type: object
      required:
        - id
        - name
      description: Minimal group reference for read responses.
      properties:
        id:
          $ref: '#/components/schemas/ID'
        name:
          type: string
    GroupSummary:
      type: object
      required:
        - id
        - name
        - color
        - icon
      description: Group display reference used in host list rows (renders group pills).
      properties:
        id:
          $ref: '#/components/schemas/ID'
        name:
          type: string
        color:
          type: string
          example: '#6366f1'
        icon:
          type: string
          example: server
    HostSummary:
      type: object
      required:
        - id
        - fqdn
      description: Minimal host reference embedded in group responses.
      properties:
        id:
          $ref: '#/components/schemas/ID'
        fqdn:
          type: string
          example: immich.home.org
    UserSummary:
      type: object
      required:
        - id
        - username
        - display_name
      description: Minimal user reference embedded in group responses.
      properties:
        id:
          $ref: '#/components/schemas/ID'
        username:
          type: string
          example: maya.patel
        display_name:
          type: string
          example: Maya Patel
    NetworkPolicyRef:
      type: object
      required:
        - id
        - name
        - cidr
      description: Minimal network policy reference embedded in group responses.
      properties:
        id:
          $ref: '#/components/schemas/ID'
        name:
          type: string
          example: Home LAN
        cidr:
          type: string
          example: 192.168.1.0/24
    GroupDetail:
      type: object
      required:
        - id
        - name
        - icon
        - color
        - hosts
        - network_policies
        - created_at
        - updated_at
      description: Full group representation returned by GET.
      properties:
        id:
          $ref: '#/components/schemas/ID'
        name:
          type: string
          example: Data
        icon:
          type: string
          description: Icon key (e.g. "database", "film").
          example: database
        color:
          type: string
          description: CSS hex color for the group badge.
          example: '#4C6EF5'
        description:
          type: string
          nullable: true
        hosts:
          type: array
          items:
            $ref: '#/components/schemas/HostSummary'
        network_policies:
          type: array
          description: Network policies with access to this group (read-only, managed via subjects).
          items:
            $ref: '#/components/schemas/NetworkPolicyRef'
        created_at:
          type: string
          format: date-time
          x-go-type: UTCTime
        updated_at:
          type: string
          format: date-time
          x-go-type: UTCTime
          description: Last time the device profile was modified.
    GroupDetailWithUsers:
      allOf:
        - $ref: '#/components/schemas/GroupDetail'
        - type: object
          properties:
            users:
              type: array
              description: Users with access to this group (read-only, managed via subjects).
              items:
                $ref: '#/components/schemas/UserSummary'
    SubjectGroupDetail:
      type: object
      required:
        - id
        - name
        - icon
        - color
        - hosts
        - granted
        - created_at
        - updated_at
      description: Group representation with assignment status, used in user and policy detail responses.
      properties:
        id:
          $ref: '#/components/schemas/ID'
        name:
          type: string
          example: Data
        icon:
          type: string
          description: Icon key (e.g. "database", "film").
          example: database
        color:
          type: string
          description: CSS hex color for the group badge.
          example: '#4C6EF5'
        description:
          type: string
          nullable: true
        hosts:
          type: array
          items:
            $ref: '#/components/schemas/HostSummary'
        granted:
          type: boolean
          description: Whether this group is assigned to the subject.
        created_at:
          type: string
          format: date-time
          x-go-type: UTCTime
        updated_at:
          type: string
          format: date-time
          x-go-type: UTCTime
          description: Last time the device profile was modified.
    GroupWrite:
      type: object
      required:
        - name
        - icon
        - color
        - host_ids
      description: |
        Group write payload for reconcile. Omit id (or set null) to create; include id to update.
        The host_ids array defines the complete desired membership after the call.
      properties:
        id:
          nullable: true
          allOf:
            - $ref: '#/components/schemas/ID'
        name:
          type: string
          example: Data
        icon:
          type: string
          example: database
        color:
          type: string
          example: '#4C6EF5'
        description:
          type: string
          nullable: true
        host_ids:
          type: array
          items:
            $ref: '#/components/schemas/ID'
    GroupListResponse:
      type: object
      required:
        - groups
      properties:
        groups:
          type: array
          items:
            $ref: '#/components/schemas/GroupDetailWithUsers'
    ReconcileGroupsRequest:
      type: object
      required:
        - groups
      description: Exhaustive list of all desired groups. Groups absent from this list are deleted.
      properties:
        groups:
          type: array
          items:
            $ref: '#/components/schemas/GroupWrite'
    ModifyAccessRequest:
      type: object
      required:
        - bypass_host_check
        - group_ids
      description: Atomically replaces bypass flag and full group assignment list. Shared by users and policies.
      properties:
        bypass_host_check:
          type: boolean
          description: When true, grants access to all hosts regardless of group configuration.
        group_ids:
          type: array
          items:
            $ref: '#/components/schemas/ID'
    Host:
      type: object
      required:
        - id
        - fqdn
        - groups
        - created_at
      description: Host record with group memberships.
      properties:
        id:
          $ref: '#/components/schemas/ID'
        fqdn:
          type: string
          example: immich.home.org
        groups:
          type: array
          description: Group memberships. Empty array means unassigned.
          items:
            $ref: '#/components/schemas/GroupSummary'
        created_at:
          type: string
          format: date-time
          x-go-type: UTCTime
    HostInput:
      type: object
      required:
        - fqdn
        - group_ids
      description: Host entry in a reconcile request. Omit id to create a new host.
      properties:
        id:
          nullable: true
          allOf:
            - $ref: '#/components/schemas/ID'
        fqdn:
          type: string
          example: immich.home.org
        group_ids:
          type: array
          description: Group memberships by ID. Empty array means unassigned.
          items:
            $ref: '#/components/schemas/ID'
    HostListResponse:
      type: object
      required:
        - hosts
      properties:
        hosts:
          type: array
          items:
            $ref: '#/components/schemas/Host'
    ReconcileHostsRequest:
      type: object
      required:
        - hosts
      description: Exhaustive list of all hosts. Hosts absent from this list are deleted.
      properties:
        hosts:
          type: array
          items:
            $ref: '#/components/schemas/HostInput'
    HostSuggestion:
      type: object
      required:
        - fqdn
        - first_seen
        - allowed_hits
        - denied_hits
      properties:
        fqdn:
          type: string
          maxLength: 253
        first_seen:
          type: string
          format: date-time
          x-go-type: UTCTime
        allowed_hits:
          type: integer
        denied_hits:
          type: integer
    IgnoredHostSuggestion:
      type: object
      required:
        - id
        - fqdn
        - created_at
      properties:
        id:
          $ref: '#/components/schemas/ID'
        fqdn:
          type: string
          maxLength: 253
        created_at:
          type: string
          format: date-time
          x-go-type: UTCTime
    IgnoreSuggestionRequest:
      type: object
      required:
        - fqdn
      properties:
        fqdn:
          type: string
          minLength: 3
          maxLength: 253
          pattern: ^[a-zA-Z0-9]([a-zA-Z0-9-]{0,61}[a-zA-Z0-9])?(\.[a-zA-Z0-9]([a-zA-Z0-9-]{0,61}[a-zA-Z0-9])?)+$
          description: FQDN to add to the ignore list.
    HostSuggestionsPage:
      type: object
      required:
        - suggestions
        - ignored
      properties:
        suggestions:
          type: array
          items:
            $ref: '#/components/schemas/HostSuggestion'
        ignored:
          type: array
          items:
            $ref: '#/components/schemas/IgnoredHostSuggestion'
    DeviceListItem:
      type: object
      required:
        - id
        - name
        - live_address_count
      description: Device summary shown on user access detail.
      properties:
        id:
          $ref: '#/components/schemas/ID'
        name:
          type: string
          example: macbook-maya
        icon:
          type: string
          nullable: true
        live_address_count:
          type: integer
          minimum: 0
        api_key_prefix:
          type: string
          nullable: true
          description: Non-null when an API key is configured; the full key is never returned.
          example: pw_abc123
    UserListItem:
      type: object
      required:
        - id
        - username
        - display_name
        - role
        - groups
        - host_count
        - device_count
        - live_address_count
        - bypass_host_check
      description: User summary for the access management list page.
      properties:
        id:
          $ref: '#/components/schemas/ID'
        username:
          type: string
          example: maya.patel
        display_name:
          type: string
          example: Maya Patel
        role:
          $ref: '#/components/schemas/UserRole'
        groups:
          type: array
          items:
            $ref: '#/components/schemas/GroupSummary'
        host_count:
          type: integer
          minimum: 0
          description: Total hosts accessible across all assigned groups.
        device_count:
          type: integer
          minimum: 0
        live_address_count:
          type: integer
          minimum: 0
        bypass_host_check:
          type: boolean
    UserAccessDetail:
      type: object
      required:
        - id
        - username
        - display_name
        - role
        - devices
        - groups
        - bypass_host_check
      description: Full user access detail including devices and group assignments.
      properties:
        id:
          $ref: '#/components/schemas/ID'
        username:
          type: string
          example: maya.patel
        display_name:
          type: string
          example: Maya Patel
        role:
          $ref: '#/components/schemas/UserRole'
        email:
          type: string
          format: email
          nullable: true
        devices:
          type: array
          items:
            $ref: '#/components/schemas/DeviceListItem'
        groups:
          type: array
          description: All groups with their hosts and assignment status.
          items:
            $ref: '#/components/schemas/SubjectGroupDetail'
        bypass_host_check:
          type: boolean
    DevicePairingStatus:
      type: string
      enum:
        - pending
        - used
        - expired
        - invalidated
        - replaced
      description: |
        Lifecycle state of a device pairing. pending: issued and not yet redeemed (expires_at in the future). expired: issued but the expiry window passed before it was claimed (derived, never stored). used: successfully redeemed by the heartbeat app. invalidated: explicitly cancelled by an administrator. replaced: superseded when a new pairing was issued for the same device.
    AccessLogFilterOperator:
      type: string
      description: |
        Filter operator for a value column. Supplied as the sibling `{field}_op` query param; defaults to `in` when omitted. Allowed operators vary per column.
      enum:
        - in
        - not_in
        - contains
        - not_contains
        - is_null
        - not_null
    AccessLogContributor:
      type: object
      description: |
        One device/user/address that the request's client IP resolved to. A single IP (shared router/home network) can resolve to several, so each entry carries a list.
      properties:
        device_id:
          $ref: '#/components/schemas/ID'
        device_name:
          type: string
        user_id:
          $ref: '#/components/schemas/ID'
        user_name:
          type: string
        address_id:
          $ref: '#/components/schemas/ID'
    PolicyUserStatus:
      type: string
      enum:
        - bypass
        - live_with_access
        - live_no_host_access
        - no_live_ips
        - no_access
      description: |
        Effective access classification along two orthogonal axes: reachability (does the user have live IPs in the cache?) and authorization (does the user have host grants?).
          - bypass: host allowlist is bypassed; the host check does not apply.
          - live_with_access: has live IPs and host grants.
          - live_no_host_access: has live IPs but no host grants — the device is
            active yet every request is denied.
          - no_live_ips: no live IPs, but host grants exist.
          - no_access: no live IPs and no host grants.
