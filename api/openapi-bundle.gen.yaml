      responses:
        '201':
          description: Suggestion ignored
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/IgnoredHostSuggestion'
        '400':
          description: Bad Request
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '401':
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '403':
          description: Forbidden
        '409':
          description: FQDN already ignored
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '500':
          description: Internal Server Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
  /admin/host-suggestions/ignore/{fqdn}:
    delete:
      operationId: unignoreSuggestion
      tags:
        - host-access
      summary: Remove a host suggestion from the ignore list
      parameters:
        - name: fqdn
          in: path
          required: true
          schema:
            type: string
      responses:
        '204':
          description: Suggestion unignored
        '401':
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '403':
          description: Forbidden
        '404':
          description: Ignored suggestion not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '500':
          description: Internal Server Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
  /admin/host-access/users:
    get:
      operationId: listUsersHostAccess
      tags:
        - host-access
      summary: List all users with host access summary (bypass, direct host count, groups)
      responses:
        '200':
          description: Users host access summary list
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/UserHostAccessSummary'
        '401':
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '403':
          description: Forbidden
        '500':
          description: Internal Server Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
  /admin/host-access/users/{user_id}:
    get:
      operationId: getUserHostDetails
      tags:
        - host-access
      summary: Get full host access details for a single user (drawer data)
      parameters:
        - name: user_id
          in: path
          required: true
          schema:
            $ref: '#/components/schemas/ID'
      responses:
        '200':
          description: Full user host access details
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UserHostDetails'
        '401':
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '403':
          description: Forbidden
        '404':
          description: User not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '500':
          description: Internal Server Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
  /admin/policy-map:
    get:
      operationId: getPolicyUserMap
      tags:
        - admin
      summary: Get the current policy cache snapshot (user-pivoted)
      description: |
        Returns the in-memory policy cache enriched with device, user, and address
        metadata. Lists every non-deleted user with their per-IP policy state,
        effective and trimmed host sets, and refresh telemetry.
      responses:
        '200':
          description: Policy cache snapshot (user-pivoted)
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PolicyUserMapAudit'
        '401':
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '403':
          description: Forbidden
        '500':
          description: Internal Server Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
  /admin/policy-simulate:
    get:
      operationId: simulatePolicyAccess
      tags:
        - admin
      summary: Simulate an access decision for a given IP and host
      description: |
        Runs the same decision logic as the forward-auth verify endpoint against
        the live cache, without bearer-token verification and without writing to
        the access log. Useful for validating grants before triggering real traffic.
      parameters:
        - name: ip
          in: query
          required: true
          schema:
            type: string
          description: Client IP to simulate.
        - name: host
          in: query
          required: true
          schema:
            type: string
          description: Target host FQDN to simulate.
      responses:
        '200':
          description: Decision result
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PolicySimulateResult'
        '400':
          description: Bad Request — missing or invalid query parameters
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '401':
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '403':
          description: Forbidden
        '500':
          description: Internal Server Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
components:
  securitySchemes:
    cookieAuth:
      type: apiKey
      in: cookie
      name: __Host-wdc_session
    apiKeyAuth:
      type: apiKey
      in: header
      name: X-API-Key
      description: API key for device authentication (e.g. heartbeat)
  schemas:
    ErrorResponse:
      type: object
      properties:
        error:
          type: string
          example: device not found
    ID:
      type: integer
      format: int64
    IPAddress:
      type: string
      description: IPv4 or IPv6 address
      anyOf:
        - type: string
          format: ipv4
        - type: string
          format: ipv6
      example: 192.168.1.132
    Username:
      type: string
      description: Unique username. Lowercase alphanumeric, underscores, and hyphens only. Uppercase letters are not accepted.
      minLength: 3
      maxLength: 32
      pattern: ^[a-z0-9_-]+$
      example: john_doe
    UserRole:
      type: string
      enum:
        - superadmin
        - admin
        - user
      description: The user's role. User role cannot login. Only superadmin can manage users.
    DisplayName:
      type: string
      description: User's public name. Unicode allowed.
      minLength: 1
      maxLength: 50
      example: John Doe
    Password:
      type: string
      format: password
      minLength: 8
      maxLength: 72
      example: 123ASecretPassword
    User:
      type: object
      required:
        - id
        - username
        - display_name
        - email
        - role
        - must_change_password
        - bypass_host_allowlist
        - created_at
      properties:
        id:
          $ref: '#/components/schemas/ID'
        username:
          $ref: '#/components/schemas/Username'
        display_name:
          $ref: '#/components/schemas/DisplayName'
        email:
          type: string
          format: email
        role:
          $ref: '#/components/schemas/UserRole'
          readOnly: true
        must_change_password:
          type: boolean
          readOnly: true
          description: When true, the user must change their password before using the app.
        bypass_host_allowlist:
          type: boolean
          description: When true the user bypasses the host allowlist and can reach every known host.
        created_at:
          type: string
          format: date-time
          x-go-type: UTCTime
    AuthRequest:
      type: object
      required:
        - username
        - password
      properties:
        username:
          $ref: '#/components/schemas/Username'
        password:
          $ref: '#/components/schemas/Password'
    CreateUserRequest:
      type: object
      required:
        - username
        - display_name
        - email
      properties:
        username:
          $ref: '#/components/schemas/Username'
        display_name:
          $ref: '#/components/schemas/DisplayName'
        email:
          type: string
          format: email
          example: user@example.com
    UpdateProfileRequest:
      type: object
      anyOf:
        - required:
            - display_name
        - required:
            - username
        - required:
            - email
      properties:
        display_name:
          $ref: '#/components/schemas/DisplayName'
        username:
          type: string
          minLength: 3
          maxLength: 32
          pattern: ^[a-z0-9_-]+$
        email:
          type: string
          format: email
    ChangePasswordRequest:
      type: object
      required:
        - current_password
        - password
      properties:
        current_password:
          type: string
        password:
          type: string
          minLength: 8
          maxLength: 72
    CreateDeviceRequest:
      type: object
      required:
        - name
      properties:
        name:
          type: string
          example: Personal phone
          minLength: 1
          maxLength: 50
          description: User-friendly name for the device
        owner_id:
          type: integer
          nullable: true
          description: Admin only. Owner to assign the device to. Ignored for regular users (always assigned to self). When omitted by an admin, defaults to the calling admin's own ID.
    UpdateDeviceRequest:
      type: object
      properties:
        name:
          type: string
          minLength: 1
          maxLength: 50
          description: New name for the device
        device_type:
          type: string
          enum:
            - static
            - mobile
          description: Network behaviour classification.
        description:
          type: string
          nullable: true
          maxLength: 200
          x-go-type: NullableString
          x-go-type-skip-optional-pointer: true
          description: Free-form note. Pass null to clear.
        icon:
          type: string
          nullable: true
          maxLength: 80
          x-go-type: NullableString
          x-go-type-skip-optional-pointer: true
          description: Tabler icon name override. Pass null to clear.
        owner_id:
          type: integer
          nullable: true
          description: Admin only. Reassign device ownership to another user.
    CreateDeviceResponse:
      type: object
      required:
        - device
      properties:
        device:
          $ref: '#/components/schemas/Device'
    Device:
      type: object
      required:
        - id
        - name
        - created_at
        - device_type
        - updated_at
        - owner_id
      properties:
        created_at:
          type: string
          format: date-time
          x-go-type: UTCTime
        updated_at:
          type: string
          format: date-time
          x-go-type: UTCTime
          description: Last time the device profile was modified.
        id:
          $ref: '#/components/schemas/ID'
        name:
          description: User-friendly name for the device
          type: string
          minLength: 1
          maxLength: 50
        device_type:
          type: string
          enum:
            - static
            - mobile
          description: Network behaviour classification. Defaults to "static".
        description:
          type: string
          nullable: true
          maxLength: 200
          description: Free-form note about the device.
        icon:
          type: string
          nullable: true
          maxLength: 80
          description: Tabler icon name override (e.g. "IconRouter").
        api_key_prefix:
          type: string
          nullable: true
          description: Prefix of the device API key (for display only). Null if no API key has been generated yet.
        address_count:
          type: integer
          minimum: 0
          readOnly: true
          description: Number of currently enabled addresses for this device.
        last_seen_at:
          type: string
          format: date-time
          nullable: true
          readOnly: true
          x-go-type: UTCTime
          description: Most recent address activity for this device (heartbeat or manual update).
        owner_id:
          readOnly: true
          $ref: '#/components/schemas/ID'
          description: ID of the user who owns this device.
        owner_name:
          type: string
          readOnly: true
          description: Display name of the owning user (for display only).
    DeviceTypeItem:
      type: object
      required:
        - value
        - label
      properties:
        value:
          type: string
        label:
          type: string
    DeviceHeartbeatByApiKeyRequest:
      type: object
      properties:
        ip:
          $ref: '#/components/schemas/IPAddress'
    AddAddressRequest:
      required:
        - ip
      type: object
      properties:
        ip:
          $ref: '#/components/schemas/IPAddress'
    Address:
      type: object
      required:
        - id
        - device_id
        - ip
        - is_enabled
        - created_at
        - updated_at
      properties:
        id:
          $ref: '#/components/schemas/ID'
        device_id:
          $ref: '#/components/schemas/ID'
        ip:
          $ref: '#/components/schemas/IPAddress'
        is_enabled:
          type: boolean
          description: The latest state of this address, enabled or disabled
        created_at:
          type: string
          format: date-time
          x-go-type: UTCTime
        updated_at:
          type: string
          format: date-time
          x-go-type: UTCTime
          description: Last time it was enabled or disabled
        expires_at:
          type: string
          format: date-time
          x-go-type: UTCTime
          nullable: true
          readOnly: true
          description: |
            UTC timestamp when this address will auto-expire, if an auto-expiry rule is enabled for the device. Null if no expiry is scheduled.
    AddressHistoryResponse:
      type: object
      required:
        - buckets
        - events
        - total_events
      properties:
        buckets:
          type: array
          items:
            $ref: '#/components/schemas/AddressHistoryBucket'
        events:
          type: array
          items:
            $ref: '#/components/schemas/AddressHistoryEvent'
        total_events:
          type: integer
          description: Total number of events matching the filters (for pagination)
        next_cursor:
          allOf:
            - $ref: '#/components/schemas/ID'
          nullable: true
    AddressHistoryBucket:
      type: object
      required:
        - timestamp
        - active_count
        - event_count
      properties:
        timestamp:
          type: string
          format: date-time
          x-go-type: UTCTime
        active_count:
          type: integer
          description: Maximum active IPs seen in this time bucket
        event_count:
          type: integer
          description: Total address events in this time bucket
    AddressEventSource:
      type: string
      description: What triggered an address state change
      enum:
        - heartbeat
        - manual
        - expiry
        - limit_exceeded
    AddressHistoryEvent:
      type: object
      required:
        - id
        - timestamp
        - ip
        - is_enabled
        - source
        - device_id
        - device_name
      properties:
        id:
          $ref: '#/components/schemas/ID'
        timestamp:
          type: string
          format: date-time
          x-go-type: UTCTime
        ip:
          type: string
          description: IP address
        is_enabled:
          type: boolean
          description: Whether the address was enabled or disabled
        source:
          $ref: '#/components/schemas/AddressEventSource'
        device_id:
          $ref: '#/components/schemas/ID'
        device_name:
          type: string
          description: Name of the device
    AccessLogResponse:
      type: object
      required:
        - total
        - next_cursor
        - rows
      properties:
        total:
          type: integer
          description: Total rows matching the current filters (excludes cursor, useful for "N results" UI)
        next_cursor:
          allOf:
            - $ref: '#/components/schemas/ID'
          nullable: true
        rows:
          type: array
          items:
            $ref: '#/components/schemas/AccessLogRow'
    AccessLogCountryStats:
      type: object
      required:
        - country_code
        - total
        - allowed
        - denied
      properties:
        country_code:
          type: string
        country_name:
          type: string
        continent_code:
          type: string
        total:
          type: integer
        allowed:
          type: integer
        denied:
          type: integer
    AccessLogRow:
      type: object
      required:
        - id
        - created_at
        - outcome
        - client_ip
        - headers
      properties:
        id:
          $ref: '#/components/schemas/ID'
        client_ip:
          $ref: '#/components/schemas/IPAddress'
        outcome:
          type: boolean
        deny_reason:
          type: string
        device_id:
          $ref: '#/components/schemas/ID'
        device_name:
          type: string
        address_id:
          $ref: '#/components/schemas/ID'
        created_at:
          type: string
          format: date-time
          x-go-type: UTCTime
        xff_chain:
          type: string
        target_host:
          type: string
        target_uri:
          type: string
        http_method:
          type: string
        country_code:
          type: string
          description: ISO 3166-1 alpha-2, e.g. "DE"
        country_name:
          type: string
          description: e.g. "Germany"
        continent_code:
          type: string
          description: e.g. "EU"
        asn:
          type: integer
          description: Autonomous System Number
        asn_org:
          type: string
          description: e.g. "Cloudflare, Inc."
        duration_us:
          type: integer
          format: int64
          description: Request processing duration in microseconds
        headers:
          type: object
          additionalProperties:
            type: array
            items:
              type: string
    DeviceAddressLeaseRule:
      type: object
      required:
        - id
        - device_id
        - enabled
        - ttl_seconds
        - created_at
        - updated_at
      properties:
        id:
          $ref: '#/components/schemas/ID'
        device_id:
          $ref: '#/components/schemas/ID'
        enabled:
          type: boolean
          description: Whether the lease rule is active
        ttl_seconds:
          type: integer
          minimum: 1
          description: Seconds after which an enabled device address lease expires
        created_at:
          type: string
          format: date-time
          x-go-type: UTCTime
        updated_at:
          type: string
          format: date-time
          x-go-type: UTCTime
    PutDeviceAddressLeaseRuleRequest:
      type: object
      required:
        - ttl_seconds
      properties:
        ttl_seconds:
          type: integer
          minimum: 1
          description: Seconds after which an enabled device address lease expires
    MaxActiveAddressesRule:
      type: object
      required:
        - id
        - device_id
        - enabled
        - max_addresses
        - created_at
        - updated_at
      properties:
        id:
          $ref: '#/components/schemas/ID'
        device_id:
          $ref: '#/components/schemas/ID'
        enabled:
          type: boolean
          description: Whether the max active addresses rule is active
        max_addresses:
          type: integer
          minimum: 1
          description: Maximum number of simultaneously enabled IP addresses
        created_at:
          type: string
          format: date-time
          x-go-type: UTCTime
        updated_at:
          type: string
          format: date-time
          x-go-type: UTCTime
    PutMaxActiveAddressesRuleRequest:
      type: object
      required:
        - max_addresses
      properties:
        max_addresses:
          type: integer
          minimum: 1
          description: Maximum number of simultaneously enabled IP addresses
    DashboardStats:
      type: object
      required:
        - total_requests
        - allowed_count
        - denied_count
        - unique_ips
        - avg_duration_us
      properties:
        total_requests:
          type: integer
          format: int64
        allowed_count:
          type: integer
          format: int64
        denied_count:
          type: integer
          format: int64
        unique_ips:
          type: integer
          format: int64
        avg_duration_us:
          type: integer
          format: int64
          description: Average request processing duration in microseconds over the time window
    DashboardTrafficBucket:
      type: object
      required:
        - timestamp
        - allow_count
        - deny_count
      properties:
        timestamp:
          type: string
          format: date-time
          x-go-type: UTCTime
        allow_count:
          type: integer
          format: int64
        deny_count:
          type: integer
          format: int64
    DashboardTrafficResponse:
      type: object
      required:
        - buckets
      properties:
        buckets:
          type: array
          items:
            $ref: '#/components/schemas/DashboardTrafficBucket'
    DashboardServiceCount:
      type: object
      required:
        - host
        - allow_count
        - deny_count
      properties:
        host:
          type: string
        allow_count:
          type: integer
          format: int64
        deny_count:
          type: integer
          format: int64
    DashboardServicesResponse:
      type: object
      required:
        - services
      properties:
        services:
          type: array
          items:
            $ref: '#/components/schemas/DashboardServiceCount'
    DashboardTopDeniedIp:
      type: object
      required:
        - ip
        - count
      properties:
        ip:
          type: string
        count:
          type: integer
          format: int64
    DashboardTopDeniedIpsResponse:
      type: object
      required:
        - ips
      properties:
        ips:
          type: array
          items:
            $ref: '#/components/schemas/DashboardTopDeniedIp'
    CreateRegistrationRequest:
      type: object
      required:
        - device_name
        - heartbeat_server_url
        - interval_seconds
        - expires_in_hours
        - owner_id
      properties:
        owner_id:
          $ref: '#/components/schemas/ID'
          description: ID of the user who will own the registered device.
        device_name:
          type: string
          minLength: 1
          maxLength: 100
          example: Dad's Phone
        heartbeat_server_url:
          type: string
          format: uri
          example: https://pulse.home.lan
        interval_seconds:
          type: integer
          minimum: 60
          example: 900
        app_biometric_enabled:
          type: boolean
          default: false
        app_settings_locked:
          type: boolean
          default: false
        expires_in_hours:
          type: integer
          enum:
            - 1
            - 24
            - 48
            - 168
          example: 24
    PendingRegistration:
      type: object
      required:
        - id
        - device_name
        - owner_id
        - heartbeat_server_url
        - interval_seconds
        - app_biometric_enabled
        - app_settings_locked
        - expires_at
        - created_at
        - status
      properties:
        id:
          $ref: '#/components/schemas/ID'
        device_name:
          type: string
        owner_id:
          $ref: '#/components/schemas/ID'
          description: ID of the user who owns the registered device.
        registration_code:
          type: string
          nullable: true
          description: Present only while unclaimed. Null after the invite is used.
        heartbeat_server_url:
          type: string
        interval_seconds:
          type: integer
        app_biometric_enabled:
          type: boolean
        app_settings_locked:
          type: boolean
        expires_at:
          type: string
          format: date-time
          x-go-type: UTCTime
        created_at:
          type: string
          format: date-time
          x-go-type: UTCTime
        used_at:
          type: string
          format: date-time
          x-go-type: UTCTime
          nullable: true
        invalidated_at:
          type: string
          format: date-time
          x-go-type: UTCTime
          nullable: true
        created_device_id:
          $ref: '#/components/schemas/ID'
          nullable: true
          description: Set after the invite is claimed and the device is created.
        status:
          type: string
          enum:
            - pending
            - used
            - expired
            - invalidated
    ClaimRegistrationRequest:
      type: object
      required:
        - code
      properties:
        code:
          type: string
          description: The full registration code as received (not decoded).
    ClaimRegistrationResponse:
      type: object
      required:
        - server_url
        - interval_seconds
        - app_biometric_enabled
        - app_settings_locked
        - api_key
      properties:
        server_url:
          type: string
        interval_seconds:
          type: integer
        app_biometric_enabled:
          type: boolean
        app_settings_locked:
          type: boolean
        api_key:
          type: string
          description: Plaintext device API key — one time only.
    GroupRef:
      type: object
      required:
        - id
        - name
      properties:
        id:
          $ref: '#/components/schemas/ID'
        name:
          type: string
    KnownHostRef:
      type: object
      required:
        - id
        - fqdn
      properties:
        id:
          $ref: '#/components/schemas/ID'
        fqdn:
          type: string
          maxLength: 253
        icon:
          type: string
          nullable: true
    KnownHostWithStats:
      type: object
      required:
        - id
        - fqdn
        - created_at
        - user_count
        - groups
      properties:
        id:
          $ref: '#/components/schemas/ID'
        fqdn:
          type: string
          maxLength: 253
        icon:
          type: string
          nullable: true
        created_at:
          type: string
          format: date-time
          x-go-type: UTCTime
        user_count:
          type: integer
          description: Number of distinct users with access to this host.
        groups:
          type: array
          items:
            $ref: '#/components/schemas/GroupRef'
          description: Host groups this host belongs to.
    DesiredKnownHost:
      type: object
      required:
        - fqdn
        - group_ids
      description: |
        A single known host inside a reconcile request. A null `id` marks a
        brand-new host; a non-null `id` must match an existing row. `fqdn` is
        immutable on updates — a mismatch is rejected. `group_ids` replaces the
        host's full group membership.
      properties:
        id:
          nullable: true
          allOf:
            - $ref: '#/components/schemas/ID'
        fqdn:
          type: string
          minLength: 3
          maxLength: 253
        icon:
          type: string
          nullable: true
        group_ids:
          type: array
          description: Host group IDs this host should belong to. Replaces the host's full group membership.
          items:
            $ref: '#/components/schemas/ID'
    ReconcileKnownHostsRequest:
      type: object
      required:
        - hosts
      description: |
        Full desired image of all known hosts. Hosts already in the database whose
        ID is absent from `hosts` will be deleted; hosts with a non-null ID are
        updated (icon only); hosts with a null ID are created. An empty `hosts`
        array deletes every known host.
      properties:
        hosts:
          type: array
          items:
            $ref: '#/components/schemas/DesiredKnownHost'
    HostGroupWithMembers:
      type: object
      required:
        - id
        - name
        - created_at
        - hosts
        - member_ids
      properties:
        id:
          $ref: '#/components/schemas/ID'
        name:
          type: string
        color:
          type: string
          nullable: true
          description: UI accent colour for the group. Null means "not chosen".
        description:
          type: string
          nullable: true
        icon:
          type: string
          nullable: true
        created_at:
          type: string
          format: date-time
          x-go-type: UTCTime
        hosts:
          type: array
          description: Hydrated member hosts (id + fqdn + icon) for display.
          items:
            $ref: '#/components/schemas/KnownHostRef'
        member_ids:
          type: array
          description: Plain list of member host IDs, parallel to `hosts`. Useful to round-trip into a reconcile request.
          items:
            $ref: '#/components/schemas/ID'
    DesiredHostGroup:
      type: object
      required:
        - name
      description: |
        A single host group inside a reconcile request. A null `id` marks a
        brand-new group; a non-null `id` must match an existing group.
      properties:
        id:
          nullable: true
          allOf:
            - $ref: '#/components/schemas/ID'
        name:
          type: string
          minLength: 1
          maxLength: 100
        color:
          type: string
          nullable: true
          description: UI accent colour. Null means "not chosen".
        description:
          type: string
          nullable: true
          maxLength: 500
        icon:
          type: string
          nullable: true
        host_ids:
          type: array
          description: Known-host IDs that should be members of this group.
          items:
            $ref: '#/components/schemas/ID'
    ReconcileHostGroupsRequest:
      type: object
      required:
        - groups
      description: |
        Full desired image of all host groups. Groups already in the database whose
        ID is absent from `groups` will be deleted; groups with a non-null ID are
        updated; groups with a null ID are created.
      properties:
        groups:
          type: array
          items:
            $ref: '#/components/schemas/DesiredHostGroup'
    SetUserHostGrantsRequest:
      type: object
      properties:
        bypass:
          type: boolean
        host_ids:
          type: array
          items:
            type: integer
        group_ids:
          type: array
          items:
            type: integer
    IgnoredHostSuggestion:
      type: object
      required:
        - id
        - fqdn
        - created_at
      properties:
        id:
          $ref: '#/components/schemas/ID'
        fqdn:
          type: string
          maxLength: 253
        created_at:
          type: string
          format: date-time
          x-go-type: UTCTime
    HostSuggestion:
      type: object
      required:
        - fqdn
        - first_seen
        - allowed_hits
        - denied_hits
      properties:
        fqdn:
          type: string
          maxLength: 253
        first_seen:
          type: string
          format: date-time
          x-go-type: UTCTime
        allowed_hits:
          type: integer
        denied_hits:
          type: integer
    IgnoreSuggestionRequest:
      type: object
      required:
        - fqdn
      properties:
        fqdn:
          type: string
          minLength: 3
          maxLength: 253
          pattern: ^[a-zA-Z0-9]([a-zA-Z0-9-]{0,61}[a-zA-Z0-9])?(\.[a-zA-Z0-9]([a-zA-Z0-9-]{0,61}[a-zA-Z0-9])?)+$
          description: FQDN to add to the ignore list.
    HostSuggestionsPage:
      type: object
      required:
        - suggestions
        - ignored
      properties:
        suggestions:
          type: array
          items:
            $ref: '#/components/schemas/HostSuggestion'
        ignored:
          type: array
          items:
            $ref: '#/components/schemas/IgnoredHostSuggestion'
    UserHostAccessSummary:
      type: object
      required:
        - id
        - display_name
        - email
        - role
        - bypass
        - direct_host_count
        - groups
      properties:
        id:
          $ref: '#/components/schemas/ID'
        display_name:
          type: string
        email:
          type: string
          format: email
        role:
          $ref: '#/components/schemas/UserRole'
        bypass:
          type: boolean
          description: When true the user can reach every known host.
        direct_host_count:
          type: integer
          description: Number of hosts granted directly via user_allowed_hosts.
        groups:
          type: array
          items:
            $ref: '#/components/schemas/GroupRef'
    UserHostDetails:
      type: object
      required:
        - id
        - display_name
        - email
        - role
        - bypass
        - groups
        - hosts
      properties:
        id:
          $ref: '#/components/schemas/ID'
        display_name:
          type: string
        email:
          type: string
          format: email
        role:
          $ref: '#/components/schemas/UserRole'
        bypass:
          type: boolean
        groups:
          type: array
          items:
            $ref: '#/components/schemas/UserHostDetailsGroup'
        hosts:
          type: array
          items:
            $ref: '#/components/schemas/UserHostDetailsHost'
    UserHostDetailsGroup:
      type: object
      required:
        - id
        - name
        - granted
        - hosts
      properties:
        id:
          $ref: '#/components/schemas/ID'
        name:
          type: string
        icon:
          type: string
          nullable: true
        granted:
          type: boolean
          description: Whether this group is granted to the user.
        hosts:
          type: array
          items:
            $ref: '#/components/schemas/KnownHostRef'
    UserHostDetailsHost:
      type: object
      required:
        - id
        - fqdn
        - directly_granted
      properties:
        id:
          $ref: '#/components/schemas/ID'
        fqdn:
          type: string
          maxLength: 253
        icon:
          type: string
          nullable: true
        directly_granted:
          type: boolean
          description: Whether this host is directly granted to the user.
        via_group:
          nullable: true
          allOf:
            - $ref: '#/components/schemas/GroupRef'
          description: First (alphabetically) granted group that covers this host, if any.
    PromoteUserRequest:
      type: object
      required:
        - password
      properties:
        password:
          $ref: '#/components/schemas/Password'
    DeviceAPIKeyResponse:
      type: object
      required:
        - device
        - api_key
      properties:
        device:
          $ref: '#/components/schemas/Device'
        api_key:
          type: string
          description: Secret key for the device.
    PolicyIPDevice:
      type: object
      required:
        - device_id
        - device_name
      properties:
        device_id:
          $ref: '#/components/schemas/ID'
        device_name:
          type: string
    PolicyUserIPSharedUser:
      type: object
      required:
        - user_id
        - username
        - user_name
        - devices
      properties:
        user_id:
          $ref: '#/components/schemas/ID'
        username:
          type: string
          description: Login username of the co-located user.
        user_name:
          type: string
          description: Display name of the co-located user.
        devices:
          type: array
          items:
            $ref: '#/components/schemas/PolicyIPDevice'
          description: Devices this user has at this IP.
    PolicyUserAddress:
      type: object
      required:
        - address_id
        - device_id
        - device_name
        - updated_at
      properties:
        address_id:
          $ref: '#/components/schemas/ID'
        device_id:
          $ref: '#/components/schemas/ID'
        device_name:
          type: string
        updated_at:
          type: string
          format: date-time
          x-go-type: UTCTime
          description: Last heartbeat or manual update time for this address.
    PolicyUserIP:
      type: object
      required:
        - ip
        - shared_with_users
        - bypass_at_ip
        - effective_hosts
        - trimmed_hosts
        - addresses
      properties:
        ip:
          type: string
          description: The IP address.
        shared_with_users:
          type: array
          items:
            $ref: '#/components/schemas/PolicyUserIPSharedUser'
          description: |
            Other users (excluding self) that also contribute to this IP. Empty means this user is the sole owner of the IP.
        bypass_at_ip:
          type: boolean
          description: |
            True when the IP entry as a whole bypasses the host allowlist (every contributor at this IP has bypass set). When true, effective_hosts is empty and means "All".
        effective_hosts:
          type: array
          items:
            type: string
          description: |
            Hosts actually allowed for THIS user at THIS IP after deny-wins intersection. Equals user_allowed_hosts when the user is the sole contributor; intersected with other restricted contributors otherwise. Empty when bypass_at_ip is true.
        trimmed_hosts:
          type: array
          items:
            type: string
          description: |
            Hosts the user had pre-intersection that were removed by intersection at this IP. Empty when no trimming occurred. Always empty when the user has bypass_allowlist true (their grants are not subject to intersection).
        addresses:
          type: array
          items:
            $ref: '#/components/schemas/PolicyUserAddress'
          description: |
            The user's own addresses sitting at this IP. Multiple entries when the same user has several devices behind the same NAT.
    PolicyUserEntry:
      type: object
      required:
        - user_id
        - user_name
        - is_admin
        - bypass_allowlist
        - on_shared_ip
        - intersection_applied
        - device_count
        - ip_count
        - allowed_host_count
        - user_allowed_hosts
        - ips
      properties:
        user_id:
          $ref: '#/components/schemas/ID'
        user_name:
          type: string
          description: User display name.
        is_admin:
          type: boolean
          description: True when the user has an admin or superadmin role.
        bypass_allowlist:
          type: boolean
          description: True when this user has the host allowlist bypass enabled.
        on_shared_ip:
          type: boolean
          description: |
            True when at least one of this user's IPs is shared with another user.
        intersection_applied:
          type: boolean
          description: |
            True when at least one of this user's IPs had its effective host set reduced by deny-wins intersection with another user at that IP.
        device_count:
          type: integer
          description: |
            Distinct devices owned by this user that contribute to the cache. Zero for no-access users.
        ip_count:
          type: integer
          description: |
            Distinct IPs this user currently contributes to. Zero for no-access users.
        allowed_host_count:
          type: integer
          description: |
            Size of user_allowed_hosts (pre-intersection). Zero when bypass_allowlist is true; the UI should render "All".
        last_seen_at:
          type: string
          format: date-time
          x-go-type: UTCTime
          nullable: true
          description: |
            Most recent address.updated_at across this user's addresses. Null when the user has no enabled IPs.
        user_allowed_hosts:
          type: array
          items:
            type: string
          description: |
            Pre-intersection allowed host list for this user. Empty when bypass_allowlist is true.
        ips:
          type: array
          items:
            $ref: '#/components/schemas/PolicyUserIP'
          description: |
            IPs this user currently contributes to. Empty for no-access users (never null — empty array, for client ergonomics).
    PolicyUserMapAudit:
      type: object
      required:
        - refreshed_at
        - refresh_duration_ms
        - total_ip_count
        - total_device_count
        - total_host_count
        - shared_ip_count
        - users
      properties:
        refreshed_at:
          type: string
          format: date-time
          x-go-type: UTCTime
          description: When the cache was last fully refreshed.
        refresh_duration_ms:
          type: integer
          description: How long the last refresh took in milliseconds.
        total_ip_count:
          type: integer
          description: Distinct IPs currently in the policy cache.
        total_device_count:
          type: integer
          description: Total distinct device contributors across all IPs in the cache.
        total_host_count:
          type: integer
          description: |
            Distinct hosts across the union of all users' pre-intersection allowed host lists. Denominator for the allowed_host_count / total_host_count ratio.
        shared_ip_count:
          type: integer
          description: Distinct IPs shared between two or more users.
        users:
          type: array
          items:
            $ref: '#/components/schemas/PolicyUserEntry'
    PolicySimulateDenyReason:
      type: string
      enum:
        - ip_not_registered
        - host_not_allowed
      description: Reason for denial.
    PolicySimulateResult:
      type: object
      required:
        - ip
        - host
        - allowed
      properties:
        ip:
          type: string
        host:
          type: string
        allowed:
          type: boolean
        deny_reason:
          allOf:
            - $ref: '#/components/schemas/PolicySimulateDenyReason'
          nullable: true
          description: Reason for denial; null when allowed is true.
