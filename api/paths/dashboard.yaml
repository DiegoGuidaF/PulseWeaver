topDeniedIps:
  get:
    operationId: getDashboardTopDeniedIps
    tags:
      - dashboard
    summary: Dashboard top denied IPs
    description: >
      Returns the IPs with the most denied requests for the threat surface table.
    parameters:
      - name: from
        in: query
        required: false
        schema:
          type: string
          format: date-time
        description: RFC3339 start of time window (default 24h ago)
      - name: to
        in: query
        required: false
        schema:
          type: string
          format: date-time
        description: RFC3339 end of time window (default now)
      - name: limit
        in: query
        required: false
        schema:
          type: integer
          default: 10
          maximum: 100
        description: Maximum number of IPs to return (default 10, max 100)
    responses:
      "200":
        description: Top denied IPs
        content:
          application/json:
            schema:
              $ref: '../components/schemas/dashboard.yaml#/DashboardTopDeniedIpsResponse'
      "401":
        description: Not authenticated
        content:
          application/json:
            schema:
              $ref: '../components/schemas/common.yaml#/ErrorResponse'
      "403":
        description: Forbidden - admin credentials required
        content:
          application/json:
            schema:
              $ref: '../components/schemas/common.yaml#/ErrorResponse'
      "500":
        description: Internal Server Error
        content:
          application/json:
            schema:
              $ref: '../components/schemas/common.yaml#/ErrorResponse'
