addressLeaseRule:
  get:
    operationId: getDeviceAddressLeaseRule
    tags:
      - rules
    summary: Get address lease rule for a device
    description: Returns the address lease rule for the device if configured.
    parameters:
      - name: device_id
        in: path
        description: Device id
        required: true
        schema:
          $ref: '../components/schemas/common.yaml#/ID'
    responses:
      "200":
        description: OK
        content:
          application/json:
            schema:
              $ref: '../components/schemas/rules.yaml#/DeviceAddressLeaseRule'
      "500":
        description: Internal Server Error
        content:
          application/json:
            schema:
              $ref: '../components/schemas/common.yaml#/ErrorResponse'
  put:
    operationId: putDeviceAddressLeaseRule
    tags:
      - rules
    summary: Create or update IP auto-expiry rule for a device
    description: Creates or updates the ip_auto_expiry rule for the device. ttl_seconds must be positive.
    parameters:
      - name: device_id
        in: path
        description: Device id
        required: true
        schema:
          $ref: '../components/schemas/common.yaml#/ID'
    requestBody:
      required: true
      content:
        application/json:
          schema:
            $ref: '../components/schemas/rules.yaml#/PutDeviceAddressLeaseRuleRequest'
    responses:
      "200":
        description: Rule updated or created
        content:
          application/json:
            schema:
              $ref: '../components/schemas/rules.yaml#/DeviceAddressLeaseRule'
      "400":
        description: Bad Request
        content:
          application/json:
            schema:
              $ref: '../components/schemas/common.yaml#/ErrorResponse'
      "404":
        description: Device not found
        content:
          application/json:
            schema:
              $ref: '../components/schemas/common.yaml#/ErrorResponse'
      "500":
        description: Internal Server Error
        content:
          application/json:
            schema:
              $ref: '../components/schemas/common.yaml#/ErrorResponse'
  delete:
    operationId: disableDeviceAddressLeaseRule
    tags:
      - rules
    summary: Disable device lease rule for a device
    description: Disables the device lease rule for the device (sets enabled to false).
    parameters:
      - name: device_id
        in: path
        description: Device id
        required: true
        schema:
          $ref: '../components/schemas/common.yaml#/ID'
    responses:
      "204":
        description: Rule disabled
      "404":
        description: Device or rule not found
        content:
          application/json:
            schema:
              $ref: '../components/schemas/common.yaml#/ErrorResponse'
      "500":
        description: Internal Server Error
        content:
          application/json:
            schema:
              $ref: '../components/schemas/common.yaml#/ErrorResponse'

