claimRegistration:
  post:
    operationId: claimRegistration
    tags:
      - registration
    security: []
    summary: Claim a registration code
    description: |
      Public endpoint — no auth required. The registration code is the credential.
      Validates and claims a pending registration, creates the device, and returns
      the full configuration payload including the device API key (one-time only).
    requestBody:
      required: true
      content:
        application/json:
          schema:
            $ref: '../components/schemas/registration.yaml#/ClaimRegistrationRequest'
    responses:
      "200":
        description: Registration successful — device created and config returned
        content:
          application/json:
            schema:
              $ref: '../components/schemas/registration.yaml#/ClaimRegistrationResponse'
      "404":
        description: Code not found, already used, or expired (deliberately vague)
        content:
          application/json:
            schema:
              $ref: '../components/schemas/common.yaml#/ErrorResponse'
      "500":
        description: Internal Server Error
        content:
          application/json:
            schema:
              $ref: '../components/schemas/common.yaml#/ErrorResponse'

adminRegistrations:
  get:
    operationId: listRegistrations
    tags:
      - registration
    summary: List pending registrations (Admin only)
    description: |
      Returns registration invites. By default returns only pending (unclaimed,
      non-expired) invites. Pass `?status=all` to include used and expired.
      Never returns device_api_key.
    parameters:
      - name: status
        in: query
        required: false
        schema:
          type: string
          enum: [pending, all]
          default: pending
    responses:
      "200":
        description: List of registrations
        content:
          application/json:
            schema:
              type: array
              items:
                $ref: '../components/schemas/registration.yaml#/PendingRegistration'
      "401":
        description: Not authenticated
      "403":
        description: Admin credentials required
      "500":
        description: Internal Server Error
        content:
          application/json:
            schema:
              $ref: '../components/schemas/common.yaml#/ErrorResponse'
  post:
    operationId: createRegistration
    tags:
      - registration
    summary: Create a registration invite (Admin only)
    requestBody:
      required: true
      content:
        application/json:
          schema:
            $ref: '../components/schemas/registration.yaml#/CreateRegistrationRequest'
    responses:
      "201":
        description: Registration invite created — includes registration_code
        content:
          application/json:
            schema:
              $ref: '../components/schemas/registration.yaml#/PendingRegistration'
      "400":
        description: Invalid request body
        content:
          application/json:
            schema:
              $ref: '../components/schemas/common.yaml#/ErrorResponse'
      "401":
        description: Not authenticated
      "403":
        description: Admin credentials required
      "500":
        description: Internal Server Error
        content:
          application/json:
            schema:
              $ref: '../components/schemas/common.yaml#/ErrorResponse'

adminRegistrationById:
  get:
    operationId: getRegistration
    tags:
      - registration
    summary: Get a single registration invite (Admin only)
    description: Returns the invite including registration_code if not yet claimed.
    parameters:
      - name: registration_id
        in: path
        required: true
        schema:
          type: string
    responses:
      "200":
        description: Registration invite
        content:
          application/json:
            schema:
              $ref: '../components/schemas/registration.yaml#/PendingRegistration'
      "401":
        description: Not authenticated
      "403":
        description: Admin credentials required
      "404":
        description: Not found
        content:
          application/json:
            schema:
              $ref: '../components/schemas/common.yaml#/ErrorResponse'
      "500":
        description: Internal Server Error
        content:
          application/json:
            schema:
              $ref: '../components/schemas/common.yaml#/ErrorResponse'
  delete:
    operationId: deleteRegistration
    tags:
      - registration
    summary: Invalidate and delete an unclaimed invite (Admin only)
    description: Hard-deletes an unclaimed registration invite. Returns 404 if already used or not found.
    parameters:
      - name: registration_id
        in: path
        required: true
        schema:
          type: string
    responses:
      "204":
        description: Invite deleted
      "401":
        description: Not authenticated
      "403":
        description: Admin credentials required
      "404":
        description: Not found or already used
        content:
          application/json:
            schema:
              $ref: '../components/schemas/common.yaml#/ErrorResponse'
      "500":
        description: Internal Server Error
        content:
          application/json:
            schema:
              $ref: '../components/schemas/common.yaml#/ErrorResponse'
