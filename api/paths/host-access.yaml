hosts:
  get:
    operationId: listKnownHosts
    tags:
      - host-access
    summary: List known hosts with access stats
    responses:
      "200":
        description: Known hosts list with stats
        content:
          application/json:
            schema:
              type: array
              items:
                $ref: '../components/schemas/host-access.yaml#/KnownHostWithStats'
      "401":
        description: Unauthorized
        content:
          application/json:
            schema:
              $ref: '../components/schemas/common.yaml#/ErrorResponse'
      "403":
        description: Forbidden
      "500":
        description: Internal Server Error
        content:
          application/json:
            schema:
              $ref: '../components/schemas/common.yaml#/ErrorResponse'
  post:
    operationId: createKnownHosts
    tags:
      - host-access
    summary: Register one or more known hosts
    requestBody:
      required: true
      content:
        application/json:
          schema:
            $ref: '../components/schemas/host-access.yaml#/BulkCreateKnownHostsRequest'
    responses:
      "201":
        description: Hosts created
        content:
          application/json:
            schema:
              type: array
              items:
                $ref: '../components/schemas/host-access.yaml#/KnownHost'
      "400":
        description: Bad Request
        content:
          application/json:
            schema:
              $ref: '../components/schemas/common.yaml#/ErrorResponse'
      "401":
        description: Unauthorized
        content:
          application/json:
            schema:
              $ref: '../components/schemas/common.yaml#/ErrorResponse'
      "403":
        description: Forbidden
      "409":
        description: One or more FQDNs already registered
        content:
          application/json:
            schema:
              $ref: '../components/schemas/common.yaml#/ErrorResponse'
      "500":
        description: Internal Server Error
        content:
          application/json:
            schema:
              $ref: '../components/schemas/common.yaml#/ErrorResponse'

hostById:
  put:
    operationId: updateKnownHost
    tags:
      - host-access
    summary: Update a known host (icon)
    parameters:
      - name: host_id
        in: path
        required: true
        schema:
          $ref: '../components/schemas/common.yaml#/ID'
    requestBody:
      required: true
      content:
        application/json:
          schema:
            $ref: '../components/schemas/host-access.yaml#/UpdateKnownHostRequest'
    responses:
      "200":
        description: Host updated
        content:
          application/json:
            schema:
              $ref: '../components/schemas/host-access.yaml#/KnownHost'
      "401":
        description: Unauthorized
        content:
          application/json:
            schema:
              $ref: '../components/schemas/common.yaml#/ErrorResponse'
      "403":
        description: Forbidden
      "404":
        description: Host not found
        content:
          application/json:
            schema:
              $ref: '../components/schemas/common.yaml#/ErrorResponse'
      "500":
        description: Internal Server Error
        content:
          application/json:
            schema:
              $ref: '../components/schemas/common.yaml#/ErrorResponse'
  delete:
    operationId: deleteKnownHost
    tags:
      - host-access
    summary: Delete a known host
    parameters:
      - name: host_id
        in: path
        required: true
        schema:
          $ref: '../components/schemas/common.yaml#/ID'
    responses:
      "204":
        description: Host deleted
      "401":
        description: Unauthorized
        content:
          application/json:
            schema:
              $ref: '../components/schemas/common.yaml#/ErrorResponse'
      "403":
        description: Forbidden
      "404":
        description: Host not found
        content:
          application/json:
            schema:
              $ref: '../components/schemas/common.yaml#/ErrorResponse'
      "500":
        description: Internal Server Error
        content:
          application/json:
            schema:
              $ref: '../components/schemas/common.yaml#/ErrorResponse'

hostsReconcile:
  put:
    operationId: reconcileKnownHosts
    tags:
      - host-access
    summary: Reconcile the full desired image of known hosts
    description: |
      Atomically converges the database to the desired image. Sends a single
      transaction that creates new hosts, updates icons on existing ones, and
      deletes hosts absent from the request. An empty `hosts` array deletes
      every known host.
    requestBody:
      required: true
      content:
        application/json:
          schema:
            $ref: '../components/schemas/host-access.yaml#/ReconcileKnownHostsRequest'
    responses:
      "204":
        description: Reconciliation applied
      "400":
        description: Bad Request (invalid FQDN, duplicate ID or FQDN, immutable FQDN change)
        content:
          application/json:
            schema:
              $ref: '../components/schemas/common.yaml#/ErrorResponse'
      "401":
        description: Unauthorized
        content:
          application/json:
            schema:
              $ref: '../components/schemas/common.yaml#/ErrorResponse'
      "403":
        description: Forbidden
      "404":
        description: One or more referenced hosts not found
        content:
          application/json:
            schema:
              $ref: '../components/schemas/common.yaml#/ErrorResponse'
      "409":
        description: FQDN already exists
        content:
          application/json:
            schema:
              $ref: '../components/schemas/common.yaml#/ErrorResponse'
      "500":
        description: Internal Server Error
        content:
          application/json:
            schema:
              $ref: '../components/schemas/common.yaml#/ErrorResponse'

hostGroups:
  get:
    operationId: listHostGroups
    tags:
      - host-access
    summary: List host groups with their member host IDs
    responses:
      "200":
        description: Host groups list
        content:
          application/json:
            schema:
              type: array
              items:
                $ref: '../components/schemas/host-access.yaml#/HostGroupWithMembers'
      "401":
        description: Unauthorized
        content:
          application/json:
            schema:
              $ref: '../components/schemas/common.yaml#/ErrorResponse'
      "403":
        description: Forbidden
      "500":
        description: Internal Server Error
        content:
          application/json:
            schema:
              $ref: '../components/schemas/common.yaml#/ErrorResponse'

hostGroupsReconcile:
  put:
    operationId: reconcileHostGroups
    tags:
      - host-access
    summary: Reconcile the full desired image of host groups and their members
    description: |
      Atomically converges the database to the desired image. Sends a single
      transaction that creates new groups, updates existing ones, and deletes
      groups absent from the request.
    requestBody:
      required: true
      content:
        application/json:
          schema:
            $ref: '../components/schemas/host-access.yaml#/ReconcileHostGroupsRequest'
    responses:
      "204":
        description: Reconciliation applied
      "400":
        description: Bad Request (invalid name, duplicate group ID, etc.)
        content:
          application/json:
            schema:
              $ref: '../components/schemas/common.yaml#/ErrorResponse'
      "401":
        description: Unauthorized
        content:
          application/json:
            schema:
              $ref: '../components/schemas/common.yaml#/ErrorResponse'
      "403":
        description: Forbidden
      "404":
        description: One or more referenced groups or hosts not found
        content:
          application/json:
            schema:
              $ref: '../components/schemas/common.yaml#/ErrorResponse'
      "409":
        description: Group name already taken
        content:
          application/json:
            schema:
              $ref: '../components/schemas/common.yaml#/ErrorResponse'
      "500":
        description: Internal Server Error
        content:
          application/json:
            schema:
              $ref: '../components/schemas/common.yaml#/ErrorResponse'

userHostGrants:
