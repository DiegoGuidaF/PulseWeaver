hosts:
  get:
    operationId: listKnownHosts
    tags:
      - host-access
    summary: List known hosts with access stats
    responses:
      "200":
        description: Known hosts list with stats
        content:
          application/json:
            schema:
              type: array
              items:
                $ref: '../components/schemas/host-access.yaml#/KnownHostWithStats'
      "401":
        description: Unauthorized
        content:
          application/json:
            schema:
              $ref: '../components/schemas/common.yaml#/ErrorResponse'
      "403":
        description: Forbidden
      "500":
        description: Internal Server Error
        content:
          application/json:
            schema:
              $ref: '../components/schemas/common.yaml#/ErrorResponse'
  post:
    operationId: createKnownHosts
    tags:
      - host-access
    summary: Register one or more known hosts
    requestBody:
      required: true
      content:
        application/json:
          schema:
            $ref: '../components/schemas/host-access.yaml#/BulkCreateKnownHostsRequest'
    responses:
      "201":
        description: Hosts created
        content:
          application/json:
            schema:
              type: array
              items:
                $ref: '../components/schemas/host-access.yaml#/KnownHost'
      "400":
        description: Bad Request
        content:
          application/json:
            schema:
              $ref: '../components/schemas/common.yaml#/ErrorResponse'
      "401":
        description: Unauthorized
        content:
          application/json:
            schema:
              $ref: '../components/schemas/common.yaml#/ErrorResponse'
      "403":
        description: Forbidden
      "409":
        description: One or more FQDNs already registered
        content:
          application/json:
            schema:
              $ref: '../components/schemas/common.yaml#/ErrorResponse'
      "500":
        description: Internal Server Error
        content:
          application/json:
            schema:
              $ref: '../components/schemas/common.yaml#/ErrorResponse'

hostById:
  put:
    operationId: updateKnownHost
    tags:
      - host-access
    summary: Update a known host (icon)
    parameters:
      - name: host_id
        in: path
        required: true
        schema:
          $ref: '../components/schemas/common.yaml#/ID'
    requestBody:
      required: true
      content:
        application/json:
          schema:
            $ref: '../components/schemas/host-access.yaml#/UpdateKnownHostRequest'
    responses:
      "200":
        description: Host updated
        content:
          application/json:
            schema:
              $ref: '../components/schemas/host-access.yaml#/KnownHost'
      "401":
        description: Unauthorized
        content:
          application/json:
            schema:
              $ref: '../components/schemas/common.yaml#/ErrorResponse'
      "403":
        description: Forbidden
      "404":
        description: Host not found
        content:
          application/json:
            schema:
              $ref: '../components/schemas/common.yaml#/ErrorResponse'
      "500":
        description: Internal Server Error
        content:
          application/json:
            schema:
              $ref: '../components/schemas/common.yaml#/ErrorResponse'
  delete:
    operationId: deleteKnownHost
    tags:
      - host-access
    summary: Delete a known host
    parameters:
      - name: host_id
        in: path
        required: true
        schema:
          $ref: '../components/schemas/common.yaml#/ID'
    responses:
      "204":
        description: Host deleted
      "401":
        description: Unauthorized
        content:
          application/json:
            schema:
              $ref: '../components/schemas/common.yaml#/ErrorResponse'
      "403":
        description: Forbidden
      "404":
        description: Host not found
        content:
          application/json:
            schema:
              $ref: '../components/schemas/common.yaml#/ErrorResponse'
      "500":
        description: Internal Server Error
        content:
          application/json:
            schema:
              $ref: '../components/schemas/common.yaml#/ErrorResponse'

