    operationId: setUserHostGrants
    tags:
      - host-access
    summary: Atomically replace a user's host grants and bypass flag
    parameters:
      - name: user_id
        in: path
        required: true
        schema:
          $ref: '../components/schemas/common.yaml#/ID'
    requestBody:
      required: true
      content:
        application/json:
          schema:
            $ref: '../components/schemas/host-access.yaml#/SetUserHostGrantsRequest'
    responses:
      "204":
        description: Grants updated
      "400":
        description: Bad Request
        content:
          application/json:
            schema:
              $ref: '../components/schemas/common.yaml#/ErrorResponse'
      "401":
        description: Unauthorized
        content:
          application/json:
            schema:
              $ref: '../components/schemas/common.yaml#/ErrorResponse'
      "403":
        description: Forbidden
      "404":
        description: User or one of the referenced hosts/groups not found
        content:
          application/json:
            schema:
              $ref: '../components/schemas/common.yaml#/ErrorResponse'
      "500":
        description: Internal Server Error
        content:
          application/json:
            schema:
              $ref: '../components/schemas/common.yaml#/ErrorResponse'

