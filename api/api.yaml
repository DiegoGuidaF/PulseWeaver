openapi: 3.0.1
info:
  title: WallyDic Device Management API
  description: Device and IP address management system
  version: "1.0"
servers:
  - url: /api/v1
paths:
  /devices:
    get:
      operationId: getDevices
      tags:
        - devices
      summary: List all devices
      description: Get all devices in the system
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Device'
        "500":
          description: Internal Server Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
    post:
      operationId: createDevice
      tags:
        - devices
      summary: Create a device
      description: Create a new device with the given name
      requestBody:
        description: Device creation request
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateDeviceRequest'
        required: true
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Device'
        "400":
          description: Bad Request
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        "500":
          description: Internal Server Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
components:
  schemas:
    #################
    # Requests
    #################
    CreateDeviceRequest:
      required:
        - name
      type: object
      properties:
        name:
          type: string
          example: Personal phone
          minLength: 3
          maxLength: 50
    #################
    # Responses
    #################
    ErrorResponse:
      type: object
      properties:
        error:
          type: string
          example: device not found
    #################
    # Domain Entities
    #################
    Device:
      type: object
      required:
        - id
        - name
        - created_at
      properties:
        created_at:
          type: string
          format: date-time
        id:
          type: integer
          format: int64
        name:
          type: string
    DeviceIP:
      type: object
      required:
        - id
        - device_id
        - ip_address
        - created_at
      properties:
        id:
          type: integer
          format: int64
        device_id:
          type: integer
          format: int64
        ip_address:
          type: string
          format: ipv4
        disabled_at:
          type: string
          format: date-time
          nullable: true
        created_at:
          type: string
          format: date-time
