openapi: 3.0.1
info:
  title: WallyDic Device Management API
  description: Device and IP address management system
  version: "1.0"
servers:
  - url: /api/v1
paths:
  /devices:
    get:
      operationId: getDevices
      tags:
        - devices
      summary: List all devices
      description: Get all devices in the system
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Device'
        "500":
          description: Internal Server Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
    post:
      operationId: createDevice
      tags:
        - devices
      summary: Create a device
      description: Create a new device with the given name
      requestBody:
        description: Device creation request
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateDeviceRequest'
        required: true
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Device'
        "400":
          description: Bad Request
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        "500":
          description: Internal Server Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
  /devices/{device_id}/addresses:
    get:
      operationId: getDeviceAddresses
      tags:
        - addresses
      summary: Get addresses for a device
      description: Get all enabled addresses for a specific device
      parameters:
        - name: device_id
          in: path
          description: Device Id
          required: true
          schema:
            type: integer
            format: int64
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Address'
        "400":
          description: Bad Request
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        "404":
          description: Device id not Found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        "500":
          description: Internal Server Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
    post:
      operationId: addAddress
      tags:
        - addresses
      summary: Assign address to device
      description: Add a new address to a device
      parameters:
        - name: device_id
          in: path
          description: Device id
          required: true
          schema:
            type: integer
            format: int64
      requestBody:
        description: Address assignment request
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AddAddressRequest'
        required: true
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Address'
        "400":
          description: Invalid address format or IPv6 not supported
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        "404":
          description: Device not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        "500":
          description: Internal Server Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
  /devices/{device_id}/addresses/ping:
    get:
      operationId: pingAddress
      tags:
        - addresses
      summary: Ping endpoint to register/update device IP
      description: Extracts the client IP from the request and upserts it for the device. If IP exists and is enabled, returns existing. If disabled, re-enables it. If new, creates it.
      parameters:
        - name: device_id
          in: path
          description: Device Id
          required: true
          schema:
            type: integer
            format: int64
      responses:
        "200":
          description: Address already exists and is enabled, or was successfully re-enabled
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Address'
        "201":
          description: New address created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Address'
        "400":
          description: Invalid IP address format
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        "404":
          description: Device not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        "500":
          description: Internal Server Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
  /devices/{device_id}/addresses/{address_id}:
    delete:
      operationId: disableAddress
      tags:
        - addresses
      summary: Disable address
      description: Mark an address as disabled for a device
      parameters:
        - name: device_id
          in: path
          description: Device Id
          required: true
          schema:
            type: integer
            format: int64
        - name: address_id
          in: path
          description: Address id
          required: true
          schema:
            type: integer
            format: int64
      responses:
        "200":
          description: Address successfully disabled
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Address'
        "400":
          description: Missing device id or address id
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        "404":
          description: Address not found or wrong device
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        "409":
          description: Address already disabled
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        "500":
          description: Internal Server Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
components:
  schemas:
    #################
    # Requests
    #################
    CreateDeviceRequest:
      required:
        - name
      type: object
      properties:
        name:
          type: string
          example: Personal phone
          minLength: 3
          maxLength: 50
    AddAddressRequest:
      required:
        - ip
      type: object
      properties:
        ip:
          type: string
          format: ipv4
          example: 192.168.1.132
    #################
    # Responses
    #################
    ErrorResponse:
      type: object
      properties:
        error:
          type: string
          example: device not found
    #################
    # Domain Entities
    #################
    Device:
      type: object
      required:
        - id
        - name
        - created_at
      properties:
        created_at:
          type: string
          format: date-time
        id:
          type: integer
          format: int64
          x-go-name: "ID"  # Generator uses camel-case while convention is upper
        name:
          type: string
    Address:
      type: object
      required:
        - id
        - device_id
        - ip
        - created_at
      properties:
        id:
          type: integer
          format: int64
          x-go-name: "ID"  # Generator uses camel-case while convention is upper
        device_id:
          type: integer
          format: int64
        ip:
          type: string
          format: ipv4
          x-go-name: "IP"  # Generator uses camel-case while convention is upper
        disabled_at:
          type: string
          format: date-time
          nullable: true
        created_at:
          type: string
          format: date-time
