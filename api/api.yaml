openapi: 3.0.1
info:
  title: WallyDic Device Management API
  description: Device and IP address management system
  version: "1.0"
servers:
  - url: /api/v1

# 1. Global security requirement (denies access by default)
security:
  - cookieAuth: [ ]
  - bearerAuth: [ ]

paths:
  # --------------------
  # Auth Endpoints
  # --------------------
  /admin/users:
    post:
      operationId: createUser
      tags:
        - admin
      summary: Register a new user (Admin only)
      description: Creates a new user account.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateUserRequest'
      responses:
        "201":
          description: User created successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/User'
        "403":
          description: Forbidden - Only admins can create users
        "409":
          description: Username or email already registered
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        "400":
          description: Bad Request
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        "500":
          description: Internal Server Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /auth/login:
    post:
      operationId: login
      tags:
        - auth
      summary: Login user
      description: Authenticates user and sets a strict HTTP-only session cookie.
      security: [ ] # Public endpoint
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AuthRequest'
      responses:
        "200":
          description: Logged in successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/User'
          headers:
            Set-Cookie:
              schema:
                type: string
        "401":
          description: Invalid credentials
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        "500":
          description: Internal Server Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /auth/logout:
    post:
      operationId: logout
      tags:
        - auth
      summary: Logout user
      description: Invalidates the session cookie.
      responses:
        "204":
          description: Logged out successfully
          headers:
            Set-Cookie:
              schema:
                type: string

  /auth/me:
    get:
      operationId: getCurrentUser
      tags:
        - auth
      summary: Get current user
      description: Returns the currently authenticated user's details.
      responses:
        "200":
          description: Current user details
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/User'
        "500":
          description: Internal Server Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        "401":
          description: Not authenticated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  # --------------------
  # Device Endpoints
  # --------------------
  /devices:
    get:
      operationId: getDevices
      tags:
        - devices
      summary: List all devices
      description: Get all devices belonging to the authenticated user.
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Device'
        "500":
          description: Internal Server Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
    post:
      operationId: createDevice
      tags:
        - devices
      summary: Create a device
      description: Create a new device for the authenticated user.
      requestBody:
        description: Device creation request
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateDeviceRequest'
        required: true
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Device'
        "400":
          description: Bad Request
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        "500":
          description: Internal Server Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /devices/{device_id}/addresses:
    get:
      operationId: getDeviceAddresses
      tags:
        - addresses
      summary: Get addresses for a device
      description: Get all enabled addresses for a specific device.
      parameters:
        - name: device_id
          in: path
          description: Device Id
          required: true
          schema:
            type: integer
            format: int64
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Address'
        "400":
          description: Bad Request
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        "404":
          description: Device id not Found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        "500":
          description: Internal Server Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
    post:
      operationId: addAddress
      tags:
        - addresses
      summary: Assign address to device
      description: Add a new address to a device.
      parameters:
        - name: device_id
          in: path
          description: Device id
          required: true
          schema:
            type: integer
            format: int64
      requestBody:
        description: Address assignment request
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AddAddressRequest'
        required: true
      responses:
        "200":
          description: Address already existed, enabled status set
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Address'
        "201":
          description: Created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Address'
        "400":
          description: Invalid address format
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        "404":
          description: Device not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        "500":
          description: Internal Server Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /devices/{device_id}/heartbeat:
    post:
      operationId: deviceHeartbeat
      tags:
        - devices
      summary: Device heartbeat
      description: Device reports its current IP address. Extracts the client IP from the request and ensures it is enabled. Requires API Token or Session.
      parameters:
        - name: device_id
          in: path
          description: Device Id
          required: true
          schema:
            type: integer
            format: int64
      responses:
        "200":
          description: Address enabled
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Address'
        "201":
          description: New address created and enabled
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Address'
        "400":
          description: Invalid IP address format
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        "404":
          description: Device not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        "500":
          description: Internal Server Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /devices/{device_id}/addresses/{address_id}:
    delete:
      operationId: disableAddress
      tags:
        - addresses
      summary: Disable address
      description: Disables the address for the device.
      parameters:
        - name: device_id
          in: path
          description: Device Id
          required: true
          schema:
            type: integer
            format: int64
        - name: address_id
          in: path
          description: Address id
          required: true
          schema:
            type: integer
            format: int64
      responses:
        "200":
          description: Address successfully disabled
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Address'
        "400":
          description: Missing device id or address id
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        "404":
          description: Address or device not found.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        "500":
          description: Internal Server Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

components:
  securitySchemes:
    cookieAuth:
      type: apiKey
      in: cookie
      name: __Host-wdc_session
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: Opaque # Indicates it's not a JWT

  schemas:
    #################
    # Admin Requests
    #################
    CreateUserRequest:
      type: object
      required:
        - username
        - display_name
        - password
      properties:
        username:
          $ref: '#/components/schemas/Username'
        display_name:
          $ref: '#/components/schemas/DisplayName'
        email:
          type: string
          format: email
          example: "user@example.com"
        password:
          $ref: '#/components/schemas/Password'
    #################
    # Auth Requests
    #################
    AuthRequest:
      type: object
      required:
        - username
        - password
      properties:
        username:
          $ref: '#/components/schemas/Username'
        password:
          $ref: '#/components/schemas/Password'

    #################
    # Device Requests
    #################
    CreateDeviceRequest:
      type: object
      required:
        - name
      properties:
        name:
          type: string
          example: Personal phone
          minLength: 1
          maxLength: 50
          description: "User-friendly name for the device"
    AddAddressRequest:
      required:
        - ip
      type: object
      properties:
        ip:
          $ref: '#/components/schemas/IPAddress'
    #################
    # Responses
    #################
    ErrorResponse:
      type: object
      properties:
        error:
          type: string
          example: device not found

    #################
    # Domain Entities
    #################
    User:
      type: object
      required:
        - id
        - username
        - display_name
        - created_at
      properties:
        id:
          $ref: '#/components/schemas/ID'
        username:
          $ref: '#/components/schemas/Username'
        display_name:
          $ref: '#/components/schemas/DisplayName'
        email:
          type: string
          format: email
        created_at:
          type: string
          format: date-time
    Device:
      type: object
      required:
        - id
        - name
        - created_at
      properties:
        created_at:
          type: string
          format: date-time
        id:
          $ref: '#/components/schemas/ID'
        name:
          description: "User-friendly name for the device"
          type: string
          minLength: 1
          maxLength: 50
    Address:
      type: object
      required:
        - id
        - device_id
        - ip
        - status
        - created_at
        - updated_at
      properties:
        id:
          $ref: '#/components/schemas/ID'
        device_id:
          $ref: '#/components/schemas/ID'
        ip:
          $ref: '#/components/schemas/IPAddress'
        status:
          type: boolean
          description: The latest state of this address, enabled or disabled
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time
          description: Last time it was enabled or disabled

    #################
    # Reused types
    #################
    Username:
      type: string
      description: "Unique username. Alphanumeric, underscores, and hyphens only."
      minLength: 3
      maxLength: 32
      pattern: '^[a-z0-9_-]+$'
      example: "john_doe"
    DisplayName:
      type: string
      description: "User's public name. Unicode allowed."
      minLength: 1
      maxLength: 50
      example: "John Doe"
    Password:
      type: string
      format: password
      minLength: 8
      maxLength: 50
      example: "123ASecretPassword"
    IPAddress:
      type: string
      description: "IPv4 or IPv6 address"
      anyOf:
        - type: string
          format: ipv4
        - type: string
          format: ipv6
      example: "192.168.1.132"
    ID:
      type: integer
      format: int64
