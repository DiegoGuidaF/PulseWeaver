openapi: 3.0.1
info:
  title: PulseWeaver Device Management API
  description: Device and IP address management system
  version: "1.0"
servers:
  - url: /api/v1

# 1. Global security requirement (denies access by default)
security:
  - cookieAuth: [ ]

paths:
  # --------------------
  # Admin Endpoints
  # --------------------
  /admin/users:
    $ref: './paths/admin.yaml#/users'
  /admin/users/{user_id}:
    $ref: './paths/admin.yaml#/userById'
  /admin/users/{user_id}/promote:
    $ref: './paths/admin.yaml#/promoteUser'
  /admin/users/{user_id}/demote:
    $ref: './paths/admin.yaml#/demoteUser'
  /admin/users/{user_id}/devices:
    $ref: './paths/admin.yaml#/userDevices'

  # --------------------
  # Auth Endpoints
  # --------------------
  /auth/login:
    $ref: './paths/auth.yaml#/login'
  /auth/logout:
    $ref: './paths/auth.yaml#/logout'
  /auth/me:
    $ref: './paths/auth.yaml#/me'

  # --------------------
  # User Endpoints
  # --------------------
  /users/me:
    $ref: './paths/users.yaml#/profile'
  /users/me/password:
    $ref: './paths/users.yaml#/password'

  # --------------------
  # Device Endpoints
  # --------------------
  /devices:
    $ref: './paths/devices.yaml#/devices'
  /devices/{device_id}:
    $ref: './paths/devices.yaml#/deviceById'
  /device-types:
    $ref: './paths/devices.yaml#/deviceTypes'
  /devices/{device_id}/api-key:
    $ref: './paths/devices.yaml#/deleteApiKey'
  /devices/{device_id}/api-key/regenerate:
    $ref: './paths/devices.yaml#/regenerateApiKey'
  /devices/{device_id}/heartbeat:
    $ref: './paths/devices.yaml#/heartbeatById'
  /heartbeat:
    $ref: './paths/devices.yaml#/heartbeat'

  # --------------------
  # Address Endpoints
  # --------------------
  /devices/{device_id}/addresses:
    $ref: './paths/addresses.yaml#/deviceAddresses'
  /address-history:
    $ref: './paths/addresses.yaml#/addressHistory'
  /devices/{device_id}/addresses/{address_id}:
    $ref: './paths/addresses.yaml#/addressById'

  # --------------------
  # Access Log Endpoints
  # --------------------
  /access-log:
    $ref: './paths/access-log.yaml#/accessLog'
  /access-log/stats/by-country:
    $ref: './paths/access-log.yaml#/accessLogByCountry'
  /access-log/deny-reasons:
    $ref: './paths/access-log.yaml#/accessLogDenyReasons'

  # --------------------
  # Rules Endpoints
  # --------------------
  /devices/{device_id}/rules/address_lease:
    $ref: './paths/rules.yaml#/addressLeaseRule'
  /devices/{device_id}/rules/max_active_addresses:
    $ref: './paths/rules.yaml#/maxActiveAddressesRule'

  # --------------------
  # Dashboard Endpoints
  # --------------------
  /dashboard/stats:
    $ref: './paths/dashboard.yaml#/stats'
  /dashboard/traffic:
    $ref: './paths/dashboard.yaml#/traffic'
  /dashboard/services:
    $ref: './paths/dashboard.yaml#/services'
  /dashboard/top-denied-ips:
    $ref: './paths/dashboard.yaml#/topDeniedIps'

  # --------------------
  # Registration Endpoints
  # --------------------
  /register:
    $ref: './paths/registration.yaml#/claimRegistration'
  /admin/registrations:
    $ref: './paths/registration.yaml#/adminRegistrations'
  /admin/registrations/{registration_id}:
    $ref: './paths/registration.yaml#/adminRegistrationById'

  # --------------------
  # Host Access Endpoints
  # --------------------
  /admin/hosts:
    $ref: './paths/host-access.yaml#/hosts'
  /admin/hosts/reconcile:
    $ref: './paths/host-access.yaml#/hostsReconcile'
  /admin/host-groups:
    $ref: './paths/host-access.yaml#/hostGroups'
  /admin/host-groups/reconcile:
    $ref: './paths/host-access.yaml#/hostGroupsReconcile'
  /admin/users/{user_id}/host-grants:
    $ref: './paths/host-access.yaml#/userHostGrants'
  /admin/host-suggestions:
    $ref: './paths/host-access.yaml#/hostSuggestions'
  /admin/host-suggestions/ignore:
    $ref: './paths/host-access.yaml#/ignoredSuggestions'
  /admin/host-suggestions/ignore/{fqdn}:
    $ref: './paths/host-access.yaml#/ignoredSuggestionByFqdn'
  /admin/host-access/users:
    $ref: './paths/host-access.yaml#/usersHostAccess'
  /admin/host-access/users/{user_id}:
    $ref: './paths/host-access.yaml#/userHostDetails'

  # --------------------
  # Policy Audit Endpoints
  # --------------------
  /admin/policy-map:
    $ref: './paths/policy-audit.yaml#/policyMap'
  /admin/policy-simulate:
    $ref: './paths/policy-audit.yaml#/policySimulate'

components:
  securitySchemes:
    cookieAuth:
      type: apiKey
      in: cookie
      name: __Host-wdc_session
    apiKeyAuth:
      type: apiKey
      in: header
      name: X-API-Key
      description: API key for device authentication (e.g. heartbeat)

  schemas:
    # --------------------
    # Common
    # --------------------
    ErrorResponse:
      $ref: './components/schemas/common.yaml#/ErrorResponse'
    ID:
      $ref: './components/schemas/common.yaml#/ID'
    IPAddress:
      $ref: './components/schemas/common.yaml#/IPAddress'

    # --------------------
    # Users
    # --------------------
    Username:
      $ref: './components/schemas/users.yaml#/Username'
    UserRole:
      $ref: './components/schemas/users.yaml#/UserRole'
    DisplayName:
      $ref: './components/schemas/users.yaml#/DisplayName'
    Password:
      $ref: './components/schemas/users.yaml#/Password'
    User:
      $ref: './components/schemas/users.yaml#/User'
    AuthRequest:
      $ref: './components/schemas/users.yaml#/AuthRequest'
    CreateUserRequest:
      $ref: './components/schemas/users.yaml#/CreateUserRequest'
    UpdateProfileRequest:
      $ref: './components/schemas/users.yaml#/UpdateProfileRequest'
    ChangePasswordRequest:
      $ref: './components/schemas/users.yaml#/ChangePasswordRequest'

    # --------------------
    # Devices
    # --------------------
    CreateDeviceRequest:
      $ref: './components/schemas/devices.yaml#/CreateDeviceRequest'
    UpdateDeviceRequest:
      $ref: './components/schemas/devices.yaml#/UpdateDeviceRequest'
    CreateDeviceResponse:
      $ref: './components/schemas/devices.yaml#/CreateDeviceResponse'
    Device:
      $ref: './components/schemas/devices.yaml#/Device'
    DeviceTypeItem:
      $ref: './components/schemas/devices.yaml#/DeviceTypeItem'
    DeviceHeartbeatByApiKeyRequest:
      $ref: './components/schemas/devices.yaml#/DeviceHeartbeatByApiKeyRequest'

    # --------------------
    # Addresses
    # --------------------
    AddAddressRequest:
      $ref: './components/schemas/addresses.yaml#/AddAddressRequest'
    Address:
      $ref: './components/schemas/addresses.yaml#/Address'
    AddressHistoryResponse:
      $ref: './components/schemas/addresses.yaml#/AddressHistoryResponse'
    AddressHistoryBucket:
      $ref: './components/schemas/addresses.yaml#/AddressHistoryBucket'
    AddressEventSource:
      $ref: './components/schemas/addresses.yaml#/AddressEventSource'
    AddressHistoryEvent:
      $ref: './components/schemas/addresses.yaml#/AddressHistoryEvent'

    # --------------------
    # Access Log
    # --------------------
    AccessLogResponse:
      $ref: './components/schemas/access-log.yaml#/AccessLogResponse'
    AccessLogCountryStats:
      $ref: './components/schemas/access-log.yaml#/AccessLogCountryStats'
    AccessLogRow:
      $ref: './components/schemas/access-log.yaml#/AccessLogRow'

    # --------------------
    # Rules
    # --------------------
    DeviceAddressLeaseRule:
      $ref: './components/schemas/rules.yaml#/DeviceAddressLeaseRule'
    PutDeviceAddressLeaseRuleRequest:
      $ref: './components/schemas/rules.yaml#/PutDeviceAddressLeaseRuleRequest'
    MaxActiveAddressesRule:
      $ref: './components/schemas/rules.yaml#/MaxActiveAddressesRule'
    PutMaxActiveAddressesRuleRequest:
      $ref: './components/schemas/rules.yaml#/PutMaxActiveAddressesRuleRequest'

    # --------------------
    # Dashboard
    # --------------------
    DashboardStats:
      $ref: './components/schemas/dashboard.yaml#/DashboardStats'
    DashboardTrafficBucket:
      $ref: './components/schemas/dashboard.yaml#/DashboardTrafficBucket'
    DashboardTrafficResponse:
      $ref: './components/schemas/dashboard.yaml#/DashboardTrafficResponse'
    DashboardServiceCount:
      $ref: './components/schemas/dashboard.yaml#/DashboardServiceCount'
    DashboardServicesResponse:
      $ref: './components/schemas/dashboard.yaml#/DashboardServicesResponse'
    DashboardTopDeniedIp:
      $ref: './components/schemas/dashboard.yaml#/DashboardTopDeniedIp'
    DashboardTopDeniedIpsResponse:
      $ref: './components/schemas/dashboard.yaml#/DashboardTopDeniedIpsResponse'

    # --------------------
    # Registration
    # --------------------
    CreateRegistrationRequest:
      $ref: './components/schemas/registration.yaml#/CreateRegistrationRequest'
    PendingRegistration:
      $ref: './components/schemas/registration.yaml#/PendingRegistration'
    ClaimRegistrationRequest:
      $ref: './components/schemas/registration.yaml#/ClaimRegistrationRequest'
    ClaimRegistrationResponse:
      $ref: './components/schemas/registration.yaml#/ClaimRegistrationResponse'

    # --------------------
    # Host Access
    # --------------------
    GroupRef:
      $ref: './components/schemas/host-access.yaml#/GroupRef'
    KnownHostRef:
      $ref: './components/schemas/host-access.yaml#/KnownHostRef'
    KnownHostWithStats:
      $ref: './components/schemas/host-access.yaml#/KnownHostWithStats'
    DesiredKnownHost:
      $ref: './components/schemas/host-access.yaml#/DesiredKnownHost'
    ReconcileKnownHostsRequest:
      $ref: './components/schemas/host-access.yaml#/ReconcileKnownHostsRequest'
    HostGroupWithMembers:
      $ref: './components/schemas/host-access.yaml#/HostGroupWithMembers'
    DesiredHostGroup:
      $ref: './components/schemas/host-access.yaml#/DesiredHostGroup'
    ReconcileHostGroupsRequest:
      $ref: './components/schemas/host-access.yaml#/ReconcileHostGroupsRequest'
    SetUserHostGrantsRequest:
      $ref: './components/schemas/host-access.yaml#/SetUserHostGrantsRequest'
    IgnoredHostSuggestion:
      $ref: './components/schemas/host-access.yaml#/IgnoredHostSuggestion'
    HostSuggestion:
      $ref: './components/schemas/host-access.yaml#/HostSuggestion'
    IgnoreSuggestionRequest:
      $ref: './components/schemas/host-access.yaml#/IgnoreSuggestionRequest'
    HostSuggestionsPage:
      $ref: './components/schemas/host-access.yaml#/HostSuggestionsPage'
    UserHostAccessSummary:
      $ref: './components/schemas/host-access.yaml#/UserHostAccessSummary'
    UserHostDetails:
      $ref: './components/schemas/host-access.yaml#/UserHostDetails'
    UserHostDetailsGroup:
      $ref: './components/schemas/host-access.yaml#/UserHostDetailsGroup'
    UserHostDetailsHost:
      $ref: './components/schemas/host-access.yaml#/UserHostDetailsHost'
