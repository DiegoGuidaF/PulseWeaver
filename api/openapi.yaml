openapi: 3.0.1
info:
  title: WallyDic Device Management API
  description: Device and IP address management system
  version: "1.0"
servers:
  - url: /api/v1

# 1. Global security requirement (denies access by default)
security:
  - cookieAuth: [ ]

paths:
  # --------------------
  # Auth Endpoints
  # --------------------
  /admin/users:
    get:
      operationId: listUsers
      tags:
        - admin
      summary: List all users (Admin only)
      description: Returns all non-deleted users.
      responses:
        "200":
          description: Users list
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/User'
        "403":
          description: Forbidden - Only admins can list users
        "500":
          description: Internal Server Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
    post:
      operationId: createUser
      tags:
        - admin
      summary: Register a new user (Admin only)
      description: Creates a new user account.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateUserRequest'
      responses:
        "201":
          description: User created successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/User'
        "403":
          description: Forbidden - Only admins can create users
        "409":
          description: Username or email already registered
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        "400":
          description: Bad Request
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        "500":
          description: Internal Server Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /admin/users/{user_id}:
    patch:
      operationId: adminUpdateUser
      tags:
        - admin
      summary: Update a user (Admin only)
      description: Admin updates another user's role.
      parameters:
        - name: user_id
          in: path
          required: true
          schema:
            $ref: '#/components/schemas/ID'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AdminUpdateUserRequest'
      responses:
        "200":
          description: User updated successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/User'
        "403":
          description: Forbidden - self role change or last admin lockout
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        "404":
          description: User not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        "400":
          description: Bad Request
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        "500":
          description: Internal Server Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
    delete:
      operationId: deleteUser
      tags:
        - admin
      summary: Delete a user (Admin only)
      description: Soft-deletes a user and revokes all user sessions.
      parameters:
        - name: user_id
          in: path
          required: true
          schema:
            $ref: '#/components/schemas/ID'
      responses:
        "204":
          description: User deleted successfully
        "403":
          description: Forbidden - cannot delete self or last admin
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        "404":
          description: User not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        "500":
          description: Internal Server Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /auth/login:
    post:
      operationId: login
      tags:
        - auth
      summary: Login user
      description: Authenticates user and sets a strict HTTP-only session cookie.
      security: [ ] # Public endpoint
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AuthRequest'
      responses:
        "200":
          description: Logged in successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/User'
          headers:
            Set-Cookie:
              schema:
                type: string
        "401":
          description: Invalid credentials
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        "500":
          description: Internal Server Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /auth/logout:
    post:
      operationId: logout
      tags:
        - auth
      summary: Logout user
      description: Invalidates the session cookie.
      responses:
        "204":
          description: Logged out successfully
          headers:
            Set-Cookie:
              schema:
                type: string

  /auth/me:
    get:
      operationId: getCurrentUser
      tags:
        - auth
      summary: Get current user
      description: Returns the currently authenticated user's details.
      responses:
        "200":
          description: Current user details
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/User'
        "500":
          description: Internal Server Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        "401":
          description: Not authenticated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /users/me:
    patch:
      operationId: updateMe
      tags:
        - users
      summary: Update current user profile
      description: Updates display name, username, and/or email for the authenticated user.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateProfileRequest'
      responses:
        "200":
          description: User profile updated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/User'
        "400":
          description: Bad Request
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        "409":
          description: Username or email already registered
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        "401":
          description: Not authenticated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        "500":
          description: Internal Server Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /users/me/password:
    post:
      operationId: changePassword
      tags:
        - users
      summary: Change current user password
      description: Validates current password, updates password, and revokes all other sessions.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ChangePasswordRequest'
      responses:
        "204":
          description: Password changed successfully
        "400":
          description: Current password is wrong or new password is invalid
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        "401":
          description: Not authenticated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        "500":
          description: Internal Server Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  # --------------------
  # Device Endpoints
  # --------------------
  /devices:
    get:
      operationId: getDevices
      tags:
        - devices
      summary: List all devices
      description: Get all devices belonging to the authenticated user.
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Device'
        "500":
          description: Internal Server Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
    post:
      operationId: createDevice
      tags:
        - devices
      summary: Create a device
      description: Create a new device for the authenticated user.
      requestBody:
        description: Device creation request
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateDeviceRequest'
        required: true
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CreateDeviceResponse'
        "400":
          description: Bad Request
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        "409":
          description: Conflict - Device name already in use
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        "500":
          description: Internal Server Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /devices/{device_id}:
    get:
      operationId: getDevice
      tags:
        - devices
      summary: Get a device
      description: Get a single device by its id.
      parameters:
        - name: device_id
          in: path
          description: Device id
          required: true
          schema:
            $ref: '#/components/schemas/ID'
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Device'
        "404":
          description: Device not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        "500":
          description: Internal Server Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
    delete:
      operationId: deleteDevice
      tags:
        - devices
      summary: Delete a device
      description: Soft-deletes a device. The device is hidden from lists and cannot receive addresses.
      parameters:
        - name: device_id
          in: path
          description: Device id
          required: true
          schema:
            $ref: '#/components/schemas/ID'
      responses:
        "204":
          description: No Content - Device deleted successfully
        "404":
          description: Device not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        "500":
          description: Internal Server Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /devices/{device_id}/api-key/regenerate:
    post:
      operationId: regenerateDeviceAPIKey
      summary: Regenerate device API key
      description: >
        Generates a new API key for the device, immediately invalidating the old one.
        The raw key is returned once. Admin-only.
      tags: [devices]
      security:
        - cookieAuth: []
      parameters:
        - name: device_id
          in: path
          description: Device id
          required: true
          schema:
            $ref: '#/components/schemas/ID'
      responses:
        '200':
          description: New API key generated successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CreateDeviceResponse'
        '404':
          description: Device not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '500':
          description: Internal Server Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /devices/{device_id}/addresses:
    get:
      operationId: getDeviceAddresses
      tags:
        - addresses
      summary: Get addresses for a device
      description: Get all enabled addresses for a specific device.
      parameters:
        - name: device_id
          in: path
          description: Device Id
          required: true
          schema:
            $ref: '#/components/schemas/ID'
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Address'
        "400":
          description: Bad Request
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        "404":
          description: Device id not Found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        "500":
          description: Internal Server Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
    post:
      operationId: addAddress
      tags:
        - addresses
      summary: Assign address to device
      description: Add a new address to a device.
      parameters:
        - name: device_id
          in: path
          description: Device id
          required: true
          schema:
            $ref: '#/components/schemas/ID'
      requestBody:
        description: Address assignment request
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AddAddressRequest'
        required: true
      responses:
        "200":
          description: Address already existed, enabled status set
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Address'
        "201":
          description: Created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Address'
        "400":
          description: Invalid address format
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        "404":
          description: Device not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        "500":
          description: Internal Server Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /devices/{device_id}/heartbeat:
    post:
      operationId: deviceHeartbeat
      tags:
        - devices
      summary: Device heartbeat
      description: Device reports its current IP address. Extracts the client IP from the request and ensures it is enabled. Requires API Token or Session.
      parameters:
        - name: device_id
          in: path
          description: Device Id
          required: true
          schema:
            $ref: '#/components/schemas/ID'
      responses:
        "200":
          description: Address enabled
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Address'
        "201":
          description: New address created and enabled
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Address'
        "400":
          description: Invalid IP address format
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        "404":
          description: Device not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        "500":
          description: Internal Server Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
  /heartbeat:
    post:
      operationId: deviceHeartbeatByAPIKey
      tags:
        - devices
      security:
        - apiKeyAuth: []
      summary: Performs a heartbeat with the given api key header
      description: Same as /devices/{device_id}/heartbeat but authentication is provided via api-key for the device to update
      requestBody:
        required: false
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/DeviceHeartbeatByApiKeyRequest'
      responses:
        "200":
          description: Address enabled
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Address'
        "201":
          description: New address created and enabled
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Address'
        "400":
          description: Invalid IP address format
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        "404":
          description: Device not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        "500":
          description: Internal Server Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /devices/{device_id}/addresses/{address_id}:
    delete:
      operationId: disableAddress
      tags:
        - addresses
      summary: Disable address
      description: Disables the address for the device.
      parameters:
        - name: device_id
          in: path
          description: Device Id
          required: true
          schema:
            $ref: '#/components/schemas/ID'
        - name: address_id
          in: path
          description: Address id
          required: true
          schema:
            $ref: '#/components/schemas/ID'
      responses:
        "200":
          description: Address successfully disabled
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Address'
        "400":
          description: Missing device id or address id
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        "404":
          description: Address or device not found.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        "500":
          description: Internal Server Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
  /devices/{device_id}/rules/address_lease:
    get:
      operationId: getDeviceAddressLeaseRule
      tags:
        - rules
      summary: Get address lease rule for a device
      description: Returns the address lease rule for the device if configured.
      parameters:
        - name: device_id
          in: path
          description: Device id
          required: true
          schema:
            $ref: '#/components/schemas/ID'
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DeviceAddressLeaseRule'
        "404":
          description: Device or rule not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        "500":
          description: Internal Server Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
    put:
      operationId: putDeviceAddressLeaseRule
      tags:
        - rules
      summary: Create or update IP auto-expiry rule for a device
      description: Creates or updates the ip_auto_expiry rule for the device. ttl_seconds must be positive.
      parameters:
        - name: device_id
          in: path
          description: Device id
          required: true
          schema:
            $ref: '#/components/schemas/ID'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/PutDeviceAddressLeaseRuleRequest'
      responses:
        "200":
          description: Rule updated or created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DeviceAddressLeaseRule'
        "400":
          description: Bad Request
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        "404":
          description: Device not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        "500":
          description: Internal Server Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
    delete:
      operationId: disableDeviceAddressLeaseRule
      tags:
        - rules
      summary: Disable device lease rule for a device
      description: Disables the device lease rule for the device (sets enabled to false).
      parameters:
        - name: device_id
          in: path
          description: Device id
          required: true
          schema:
            $ref: '#/components/schemas/ID'
      responses:
        "204":
          description: Rule disabled
        "404":
          description: Device or rule not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        "500":
          description: Internal Server Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

components:
  securitySchemes:
    cookieAuth:
      type: apiKey
      in: cookie
      name: __Host-wdc_session
    apiKeyAuth:
      type: apiKey
      in: header
      name: X-API-Key
      description: API key for device authentication (e.g. heartbeat)

  schemas:
    #################
    # Admin Requests
    #################
    CreateUserRequest:
      type: object
      required:
        - username
        - display_name
        - email
        - password
      properties:
        username:
          $ref: '#/components/schemas/Username'
        display_name:
          $ref: '#/components/schemas/DisplayName'
        email:
          type: string
          format: email
          example: "user@example.com"
        password:
          $ref: '#/components/schemas/Password'
    AdminUpdateUserRequest:
      type: object
      properties:
        role:
          $ref: '#/components/schemas/UserRole'
    #################
    # Auth Requests
    #################
    AuthRequest:
      type: object
      required:
        - username
        - password
      properties:
        username:
          $ref: '#/components/schemas/Username'
        password:
          $ref: '#/components/schemas/Password'
    UpdateProfileRequest:
      type: object
      properties:
        display_name:
          $ref: '#/components/schemas/DisplayName'
        username:
          type: string
          minLength: 3
          maxLength: 32
          pattern: '^[a-z0-9_-]+$'
        email:
          type: string
          format: email
    ChangePasswordRequest:
      type: object
      required:
        - current_password
        - password
      properties:
        current_password:
          type: string
        password:
          type: string
          minLength: 8
          maxLength: 72

    #################
    # Device Requests
    #################
    CreateDeviceRequest:
      type: object
      required:
        - name
      properties:
        name:
          type: string
          example: Personal phone
          minLength: 1
          maxLength: 50
          description: "User-friendly name for the device"
    AddAddressRequest:
      required:
        - ip
      type: object
      properties:
        ip:
          $ref: '#/components/schemas/IPAddress'
    DeviceHeartbeatByApiKeyRequest:
      type: object
      properties:
        ip:
          $ref: '#/components/schemas/IPAddress'
    #################
    # Responses
    #################
    CreateDeviceResponse:
      type: object
      required:
        - device
        - api_key
      properties:
        device:
          $ref: '#/components/schemas/Device'
        api_key:
          type: string
          description: Secret key for the device; only returned on creation or regeneration.
    ErrorResponse:
      type: object
      properties:
        error:
          type: string
          example: device not found

    #################
    # Domain Entities
    #################
    User:
      type: object
      required:
        - id
        - username
        - display_name
        - role
        - must_change_password
        - created_at
      properties:
        id:
          $ref: '#/components/schemas/ID'
        username:
          $ref: '#/components/schemas/Username'
        display_name:
          $ref: '#/components/schemas/DisplayName'
        email:
          type: string
          format: email
        role:
          $ref: '#/components/schemas/UserRole'
          readOnly: true
        must_change_password:
          type: boolean
          readOnly: true
          description: When true, the user must change their password before using the app.
        created_at:
          type: string
          format: date-time
          x-go-type: UTCTime
    Device:
      type: object
      required:
        - id
        - name
        - created_at
        - api_key_prefix
      properties:
        created_at:
          type: string
          format: date-time
          x-go-type: UTCTime
        id:
          $ref: '#/components/schemas/ID'
        name:
          description: "User-friendly name for the device"
          type: string
          minLength: 1
          maxLength: 50
        api_key_prefix:
          type: string
          description: Prefix of the device API key (for display only).
        address_count:
          type: integer
          minimum: 0
          readOnly: true
          description: Number of currently enabled addresses for this device.
    Address:
      type: object
      required:
        - id
        - device_id
        - ip
        - is_enabled
        - created_at
        - updated_at
      properties:
        id:
          $ref: '#/components/schemas/ID'
        device_id:
          $ref: '#/components/schemas/ID'
        ip:
          $ref: '#/components/schemas/IPAddress'
        is_enabled:
          type: boolean
          description: The latest state of this address, enabled or disabled
        created_at:
          type: string
          format: date-time
          x-go-type: UTCTime
        updated_at:
          type: string
          format: date-time
          x-go-type: UTCTime
          description: Last time it was enabled or disabled
        expires_at:
          type: string
          format: date-time
          x-go-type: UTCTime
          nullable: true
          readOnly: true
          description: >
            UTC timestamp when this address will auto-expire, if an auto-expiry rule
            is enabled for the device. Null if no expiry is scheduled.

    DeviceAddressLeaseRule:
      type: object
      required:
        - id
        - device_id
        - enabled
        - ttl_seconds
        - created_at
        - updated_at
      properties:
        id:
          $ref: '#/components/schemas/ID'
        device_id:
          $ref: '#/components/schemas/ID'
        enabled:
          type: boolean
          description: Whether the lease rule is active
        ttl_seconds:
          type: integer
          minimum: 1
          description: Seconds after which an enabled device address lease expires
        created_at:
          type: string
          format: date-time
          x-go-type: UTCTime
        updated_at:
          type: string
          format: date-time
          x-go-type: UTCTime

    PutDeviceAddressLeaseRuleRequest:
      type: object
      required:
        - ttl_seconds
      properties:
        ttl_seconds:
          type: integer
          minimum: 1
          description: Seconds after which an enabled device address lease expires

    #################
