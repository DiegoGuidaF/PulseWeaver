openapi: 3.0.1
info:
  title: PulseWeaver Device Management API
  description: Device and IP address management system
  version: "1.0"
servers:
  - url: /api/v1

# 1. Global security requirement (denies access by default)
security:
  - cookieAuth: [ ]

paths:
  # --------------------
  # Auth Endpoints
  # --------------------
  /admin/users:
    get:
      operationId: listUsers
      tags:
        - admin
      summary: List all users (Admin only)
      description: Returns all non-deleted users.
      responses:
        "200":
          description: Users list
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/User'
        "401":
          description: Invalid credentials
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        "403":
          description: Forbidden - Only admins can list users
        "500":
          description: Internal Server Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
    post:
      operationId: createUser
      tags:
        - admin
      summary: Register a new user (Admin only)
      description: Creates a new user account.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateUserRequest'
      responses:
        "201":
          description: User created successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/User'
        "401":
          description: Invalid credentials
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        "403":
          description: Forbidden - Only admins can create users
        "409":
          description: Username or email already registered
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        "400":
          description: Bad Request
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        "500":
          description: Internal Server Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /admin/users/{user_id}:
    delete:
      operationId: deleteUser
      tags:
        - admin
      summary: Delete a user (Admin only)
      description: Soft-deletes a user and revokes all user sessions.
      parameters:
        - name: user_id
          in: path
          required: true
          schema:
            $ref: '#/components/schemas/ID'
      responses:
        "204":
          description: User deleted successfully
        "401":
          description: Invalid credentials
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        "403":
          description: Forbidden - cannot delete self
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        "404":
          description: User not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        "500":
          description: Internal Server Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /admin/users/{user_id}/promote:
    post:
      operationId: promoteUser
      tags:
        - admin
      summary: Promote a user to admin (Admin only)
      description: Promotes another user to the admin role. Cannot promote oneself.
      parameters:
        - name: user_id
          in: path
          required: true
          schema:
            $ref: '#/components/schemas/ID'
      responses:
        "200":
          description: User promoted successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/User'
        "401":
          description: Invalid credentials
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        "403":
          description: Forbidden - admin credentials required or self-promotion attempted
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        "404":
          description: User not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        "500":
          description: Internal Server Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /admin/users/{user_id}/demote:
    post:
      operationId: demoteUser
      tags:
        - admin
      summary: Demote an admin to regular user (Admin only)
      description: Demotes another admin to the user role. Cannot demote oneself.
      parameters:
        - name: user_id
          in: path
          required: true
          schema:
            $ref: '#/components/schemas/ID'
      responses:
        "200":
          description: User demoted successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/User'
        "401":
          description: Invalid credentials
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        "403":
          description: Forbidden - admin credentials required, self-demotion
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        "404":
          description: User not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        "500":
          description: Internal Server Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /auth/login:
    post:
      operationId: login
      tags:
        - auth
      summary: Login user
      description: Authenticates user and sets a strict HTTP-only session cookie.
      security: [ ] # Public endpoint
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AuthRequest'
      responses:
        "200":
          description: Logged in successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/User'
          headers:
            Set-Cookie:
              schema:
                type: string
        "401":
          description: Invalid credentials
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        "500":
          description: Internal Server Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /auth/logout:
    post:
      operationId: logout
      tags:
        - auth
      summary: Logout user
      description: Invalidates the session cookie.
      responses:
        "204":
          description: Logged out successfully
          headers:
            Set-Cookie:
              schema:
                type: string

  /auth/me:
    get:
      operationId: getCurrentUser
      tags:
        - auth
      summary: Get current user
      description: Returns the currently authenticated user's details.
      responses:
        "200":
          description: Current user details
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/User'
        "500":
          description: Internal Server Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        "401":
          description: Not authenticated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /users/me:
    patch:
      operationId: updateMe
      tags:
        - users
      summary: Update current user profile
      description: Updates display name, username, and/or email for the authenticated user.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateProfileRequest'
      responses:
        "200":
          description: User profile updated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/User'
        "400":
          description: Bad Request
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        "409":
          description: Username or email already registered
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        "401":
          description: Not authenticated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        "500":
          description: Internal Server Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /users/me/password:
    post:
      operationId: changePassword
      tags:
        - users
      summary: Change current user password
      description: Validates current password, updates password, and revokes all other sessions.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ChangePasswordRequest'
      responses:
        "204":
          description: Password changed successfully
        "400":
          description: Current password is wrong or new password is invalid
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        "401":
          description: Not authenticated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        "500":
          description: Internal Server Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  # --------------------
  # Device Endpoints
  # --------------------
  /devices:
    get:
      operationId: getDevices
      tags:
        - devices
      summary: List all devices
      description: Get all devices belonging to the authenticated user.
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Device'
        "500":
          description: Internal Server Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
    post:
      operationId: createDevice
      tags:
        - devices
      summary: Create a device
      description: Create a new device for the authenticated user.
      requestBody:
        description: Device creation request
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateDeviceRequest'
        required: true
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CreateDeviceResponse'
        "400":
          description: Bad Request
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        "409":
          description: Conflict - Device name already in use
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        "500":
          description: Internal Server Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /devices/{device_id}:
    get:
      operationId: getDevice
      tags:
        - devices
      summary: Get a device
      description: Get a single device by its id.
      parameters:
        - name: device_id
          in: path
          description: Device id
          required: true
          schema:
            $ref: '#/components/schemas/ID'
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Device'
        "404":
          description: Device not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        "500":
          description: Internal Server Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
    delete:
      operationId: deleteDevice
      tags:
        - devices
      summary: Delete a device
      description: Soft-deletes a device. The device is hidden from lists and cannot receive addresses.
      parameters:
        - name: device_id
          in: path
          description: Device id
          required: true
          schema:
            $ref: '#/components/schemas/ID'
      responses:
        "204":
          description: No Content - Device deleted successfully
        "404":
          description: Device not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        "500":
          description: Internal Server Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /devices/{device_id}/api-key/regenerate:
    post:
      operationId: regenerateDeviceAPIKey
      summary: Regenerate device API key
      description: >
        Generates a new API key for the device, immediately invalidating the old one.
        The raw key is returned once. Admin-only.
      tags: [devices]
      parameters:
        - name: device_id
          in: path
          description: Device id
          required: true
          schema:
            $ref: '#/components/schemas/ID'
      responses:
        '200':
          description: New API key generated successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CreateDeviceResponse'
        '404':
          description: Device not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '500':
          description: Internal Server Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /devices/{device_id}/addresses:
    get:
      operationId: getDeviceAddresses
      tags:
        - addresses
      summary: Get addresses for a device
      description: Get all enabled addresses for a specific device.
      parameters:
        - name: device_id
          in: path
          description: Device Id
          required: true
          schema:
            $ref: '#/components/schemas/ID'
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Address'
        "400":
          description: Bad Request
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        "404":
          description: Device id not Found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        "500":
          description: Internal Server Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
    post:
      operationId: addAddress
      tags:
        - addresses
      summary: Assign address to device
      description: Add a new address to a device.
      parameters:
        - name: device_id
          in: path
          description: Device id
          required: true
          schema:
            $ref: '#/components/schemas/ID'
      requestBody:
        description: Address assignment request
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AddAddressRequest'
        required: true
      responses:
        "200":
          description: Address already existed, enabled status set
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Address'
        "201":
          description: Created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Address'
        "400":
          description: Invalid address format
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        "404":
          description: Device not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        "500":
          description: Internal Server Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /address-history:
    get:
      operationId: getAddressHistory
      tags:
        - addresses
      summary: Get address activity history
      description: >
        Returns time-bucketed active IP counts and paginated address events.
        When device_id is omitted, returns history for all devices.
        When device_id is provided, filters to those devices only.
      parameters:
        - name: device_id
          in: query
          required: false
          description: Filter by device ID(s). Empty means all devices.
          schema:
            type: array
            items:
              $ref: '#/components/schemas/ID'
        - name: from
          in: query
          required: false
          schema:
            type: string
            format: date-time
          description: RFC3339 start of time window (default 24h ago)
        - name: to
          in: query
          required: false
          schema:
            type: string
            format: date-time
          description: RFC3339 end of time window (default now)
        - name: granularity
          in: query
          required: false
          schema:
            type: string
            enum:
              - hour
              - day
            default: hour
          description: Time bucket granularity (default hour)
        - name: source
          in: query
          required: false
          schema:
            type: string
            enum:
              - heartbeat
              - manual
              - expiry
          description: Filter events by source
        - name: is_enabled
          in: query
          required: false
          schema:
            type: boolean
          description: Filter events by enabled/disabled state
        - name: ip
          in: query
          required: false
          schema:
            type: string
          description: Filter events by IP address (substring match)
        - name: limit
          in: query
          required: false
          schema:
            type: integer
            default: 50
            maximum: 200
          description: Maximum number of events to return (default 50, max 200)
        - name: before_id
          in: query
          required: false
          schema:
            type: integer
            format: int64
          description: Cursor for pagination — return events with id < before_id
      responses:
        "200":
          description: Address history with time-series buckets and paginated events
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AddressHistoryResponse'
        "400":
          description: Invalid query parameters (e.g. bad granularity)
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        "500":
          description: Internal Server Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /devices/{device_id}/heartbeat:
    post:
      operationId: deviceHeartbeat
      tags:
        - devices
      summary: Device heartbeat
      description: Device reports its current IP address. Extracts the client IP from the request and ensures it is enabled. Requires API Token or Session.
      parameters:
        - name: device_id
          in: path
          description: Device Id
          required: true
          schema:
            $ref: '#/components/schemas/ID'
      responses:
        "200":
          description: Address enabled
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Address'
        "201":
          description: New address created and enabled
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Address'
        "400":
          description: Invalid IP address format
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        "404":
          description: Device not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        "500":
          description: Internal Server Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
  /heartbeat:
    post:
      operationId: deviceHeartbeatByAPIKey
      tags:
        - devices
      security:
        - apiKeyAuth: []
      summary: Performs a heartbeat with the given api key header
      description: Same as /devices/{device_id}/heartbeat but authentication is provided via api-key for the device to update
      requestBody:
        required: false
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/DeviceHeartbeatByApiKeyRequest'
      responses:
        "200":
          description: Address enabled
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Address'
        "201":
          description: New address created and enabled
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Address'
        "400":
          description: Invalid IP address format
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        "404":
          description: Device not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        "500":
          description: Internal Server Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /request-audit-log:
    get:
      operationId: getRequestAuditLog
      tags:
        - audit
      summary: List request audit log entries
      description: >
        Returns paginated request log entries to review access-control decisions.
        Admin-only.
      parameters:
        - name: device_id
          in: query
          required: false
          schema:
            $ref: '#/components/schemas/ID'
        - name: outcome
          in: query
          required: false
          schema:
            type: boolean
        - name: deny_reason
          in: query
          required: false
          schema:
            type: string
          description: Filter by deny reason (see GET /request-audit-log/deny-reasons for valid values)
        - name: ip
          in: query
          required: false
          schema:
            type: string
          description: Exact client IP match
        - name: host
          in: query
          required: false
          schema:
            type: string
          description: Exact target host match
        - name: from
          in: query
          required: false
          schema:
            type: string
            format: date-time
          description: RFC3339 start of time window (default 24h ago)
        - name: to
          in: query
          required: false
          schema:
            type: string
            format: date-time
          description: RFC3339 end of time window (default now)
        - name: limit
          in: query
          required: false
          schema:
            type: integer
            default: 50
            maximum: 200
          description: Page size (default 50, max 200)
        - name: before_id
          in: query
          required: false
          schema:
            $ref: '#/components/schemas/ID'
          description: Cursor; return rows with id < before_id
      responses:
        "200":
          description: Request audit log entries
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/RequestAuditLogResponse'
        "401":
          description: Not authenticated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        "403":
          description: Forbidden - admin credentials required
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        "500":
          description: Internal Server Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /request-audit-log/deny-reasons:
    get:
      operationId: getRequestAuditLogDenyReasons
      tags:
        - audit
      summary: List valid deny reason values
      description: >
        Returns all valid deny_reason values that can appear in audit log entries
        or be used as the deny_reason filter on GET /request-audit-log.
      responses:
        "200":
          description: List of deny reason values
          content:
            application/json:
              schema:
                type: array
                items:
                  type: string
        "401":
          description: Not authenticated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        "403":
          description: Forbidden - admin credentials required
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        "500":
          description: Internal Server Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /devices/{device_id}/addresses/{address_id}:
    delete:
      operationId: disableAddress
      tags:
        - addresses
      summary: Disable address
      description: Disables the address for the device.
      parameters:
        - name: device_id
          in: path
          description: Device Id
          required: true
          schema:
            $ref: '#/components/schemas/ID'
        - name: address_id
          in: path
          description: Address id
          required: true
          schema:
            $ref: '#/components/schemas/ID'
      responses:
        "200":
          description: Address successfully disabled
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Address'
        "400":
          description: Missing device id or address id
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        "404":
          description: Address or device not found.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        "500":
          description: Internal Server Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
  /devices/{device_id}/rules/address_lease:
    get:
      operationId: getDeviceAddressLeaseRule
      tags:
        - rules
      summary: Get address lease rule for a device
      description: Returns the address lease rule for the device if configured.
      parameters:
        - name: device_id
          in: path
          description: Device id
          required: true
          schema:
            $ref: '#/components/schemas/ID'
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DeviceAddressLeaseRule'
        "404":
          description: Device or rule not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        "500":
          description: Internal Server Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
    put:
      operationId: putDeviceAddressLeaseRule
      tags:
        - rules
      summary: Create or update IP auto-expiry rule for a device
      description: Creates or updates the ip_auto_expiry rule for the device. ttl_seconds must be positive.
      parameters:
        - name: device_id
          in: path
          description: Device id
          required: true
          schema:
            $ref: '#/components/schemas/ID'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/PutDeviceAddressLeaseRuleRequest'
      responses:
        "200":
          description: Rule updated or created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DeviceAddressLeaseRule'
        "400":
          description: Bad Request
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        "404":
          description: Device not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        "500":
          description: Internal Server Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
    delete:
      operationId: disableDeviceAddressLeaseRule
      tags:
        - rules
      summary: Disable device lease rule for a device
      description: Disables the device lease rule for the device (sets enabled to false).
      parameters:
        - name: device_id
          in: path
          description: Device id
          required: true
          schema:
            $ref: '#/components/schemas/ID'
      responses:
        "204":
          description: Rule disabled
        "404":
          description: Device or rule not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        "500":
          description: Internal Server Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  # --------------------
  # Dashboard Endpoints
  # --------------------
  /dashboard/stats:
    get:
      operationId: getDashboardStats
      tags:
        - dashboard
      summary: Dashboard summary statistics
      description: >
        Returns aggregate counts (total requests, allowed, denied, unique IPs)
        over the given time window. Queries pre-aggregated hourly traffic data.
      parameters:
        - name: from
          in: query
          required: false
          schema:
            type: string
            format: date-time
          description: RFC3339 start of time window (default 24h ago)
        - name: to
          in: query
          required: false
          schema:
            type: string
            format: date-time
          description: RFC3339 end of time window (default now)
      responses:
        "200":
          description: Summary statistics
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DashboardStats'
        "401":
          description: Not authenticated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        "500":
          description: Internal Server Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /dashboard/traffic:
    get:
      operationId: getDashboardTraffic
      tags:
        - dashboard
      summary: Dashboard traffic time series
      description: >
        Returns time-bucketed allow/deny counts for the stacked area chart.
      parameters:
        - name: from
          in: query
          required: false
          schema:
            type: string
            format: date-time
          description: RFC3339 start of time window (default 24h ago)
        - name: to
          in: query
          required: false
          schema:
            type: string
            format: date-time
          description: RFC3339 end of time window (default now)
        - name: granularity
          in: query
          required: false
          schema:
            type: string
            enum:
              - hour
              - day
            default: hour
          description: Time bucket granularity (default hour)
      responses:
        "200":
          description: Traffic time series
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DashboardTrafficResponse'
        "401":
          description: Not authenticated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        "500":
          description: Internal Server Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /dashboard/services:
    get:
      operationId: getDashboardServices
      tags:
        - dashboard
      summary: Dashboard service breakdown
      description: >
        Returns per-host allow/deny counts for the donut chart.
      parameters:
        - name: from
          in: query
          required: false
          schema:
            type: string
            format: date-time
          description: RFC3339 start of time window (default 24h ago)
        - name: to
          in: query
          required: false
          schema:
            type: string
            format: date-time
          description: RFC3339 end of time window (default now)
      responses:
        "200":
          description: Service breakdown
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DashboardServicesResponse'
        "401":
          description: Not authenticated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        "500":
          description: Internal Server Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /dashboard/top-denied-ips:
    get:
      operationId: getDashboardTopDeniedIps
      tags:
        - dashboard
      summary: Dashboard top denied IPs
      description: >
        Returns the IPs with the most denied requests for the threat surface table.
      parameters:
        - name: from
          in: query
          required: false
          schema:
            type: string
            format: date-time
          description: RFC3339 start of time window (default 24h ago)
        - name: to
          in: query
          required: false
          schema:
            type: string
            format: date-time
          description: RFC3339 end of time window (default now)
        - name: limit
          in: query
          required: false
          schema:
            type: integer
            default: 10
            maximum: 100
          description: Maximum number of IPs to return (default 10, max 100)
      responses:
        "200":
          description: Top denied IPs
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DashboardTopDeniedIpsResponse'
        "401":
          description: Not authenticated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        "500":
          description: Internal Server Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

components:
  securitySchemes:
    cookieAuth:
      type: apiKey
      in: cookie
      name: __Host-wdc_session
    apiKeyAuth:
      type: apiKey
      in: header
      name: X-API-Key
      description: API key for device authentication (e.g. heartbeat)

  schemas:
    #################
    # Admin Requests
    #################
    CreateUserRequest:
      type: object
      required:
        - username
        - display_name
        - email
        - password
      properties:
        username:
          $ref: '#/components/schemas/Username'
        display_name:
          $ref: '#/components/schemas/DisplayName'
        email:
          type: string
          format: email
          example: "user@example.com"
        password:
          $ref: '#/components/schemas/Password'
    #################
    # Auth Requests
    #################
    AuthRequest:
      type: object
      required:
        - username
        - password
      properties:
        username:
          $ref: '#/components/schemas/Username'
        password:
          $ref: '#/components/schemas/Password'
    UpdateProfileRequest:
      type: object
      anyOf:
        - required: [ display_name ]
        - required: [ username ]
        - required: [ email ]
      properties:
        display_name:
          $ref: '#/components/schemas/DisplayName'
        username:
          type: string
          minLength: 3
          maxLength: 32
          pattern: '^[a-z0-9_-]+$'
        email:
          type: string
          format: email
    ChangePasswordRequest:
      type: object
      required:
        - current_password
        - password
      properties:
        current_password:
          type: string
        password:
          type: string
          minLength: 8
          maxLength: 72

    #################
    # Device Requests
    #################
    CreateDeviceRequest:
      type: object
      required:
        - name
      properties:
        name:
          type: string
          example: Personal phone
          minLength: 1
          maxLength: 50
          description: "User-friendly name for the device"
    AddAddressRequest:
      required:
        - ip
      type: object
      properties:
        ip:
          $ref: '#/components/schemas/IPAddress'
    DeviceHeartbeatByApiKeyRequest:
      type: object
      properties:
        ip:
          $ref: '#/components/schemas/IPAddress'
    #################
    # Responses
    #################
    CreateDeviceResponse:
      type: object
      required:
        - device
        - api_key
      properties:
        device:
          $ref: '#/components/schemas/Device'
        api_key:
          type: string
          description: Secret key for the device; only returned on creation or regeneration.
    ErrorResponse:
      type: object
      properties:
        error:
          type: string
          example: device not found
    AddressHistoryResponse:
      type: object
      required:
        - buckets
        - events
        - total_events
      properties:
        buckets:
          type: array
          items:
            $ref: '#/components/schemas/AddressHistoryBucket'
        events:
          type: array
          items:
            $ref: '#/components/schemas/AddressHistoryEvent'
        total_events:
          type: integer
          description: Total number of events matching the filters (for pagination)
        next_cursor:
          allOf:
            - $ref: '#/components/schemas/ID'
          nullable: true
    AddressHistoryBucket:
      type: object
      required:
        - timestamp
        - active_count
        - event_count
      properties:
        timestamp:
          type: string
          format: date-time
          x-go-type: UTCTime
        active_count:
          type: integer
          description: Maximum active IPs seen in this time bucket
        event_count:
          type: integer
          description: Total address events in this time bucket
    AddressHistoryEvent:
      type: object
      required:
        - id
        - timestamp
        - ip
        - is_enabled
        - source
        - device_id
        - device_name
      properties:
        id:
          $ref: '#/components/schemas/ID'
        timestamp:
          type: string
          format: date-time
          x-go-type: UTCTime
        ip:
          type: string
          description: IP address
        is_enabled:
          type: boolean
          description: Whether the address was enabled or disabled
        source:
          type: string
          enum:
            - heartbeat
            - manual
            - expiry
          description: What triggered the state change
        device_id:
          $ref: '#/components/schemas/ID'
        device_name:
          type: string
          description: Name of the device

    #################
    # Domain Entities
    #################
    User:
      type: object
      required:
        - id
        - username
        - display_name
        - email
        - role
        - must_change_password
        - created_at
      properties:
        id:
          $ref: '#/components/schemas/ID'
        username:
          $ref: '#/components/schemas/Username'
        display_name:
          $ref: '#/components/schemas/DisplayName'
        email:
          type: string
          format: email
        role:
          $ref: '#/components/schemas/UserRole'
          readOnly: true
        must_change_password:
          type: boolean
          readOnly: true
          description: When true, the user must change their password before using the app.
        created_at:
          type: string
          format: date-time
          x-go-type: UTCTime
    Device:
      type: object
      required:
        - id
        - name
        - created_at
        - api_key_prefix
      properties:
        created_at:
          type: string
          format: date-time
          x-go-type: UTCTime
        id:
          $ref: '#/components/schemas/ID'
        name:
          description: "User-friendly name for the device"
          type: string
          minLength: 1
          maxLength: 50
        api_key_prefix:
          type: string
          description: Prefix of the device API key (for display only).
        address_count:
          type: integer
          minimum: 0
          readOnly: true
          description: Number of currently enabled addresses for this device.
    Address:
      type: object
      required:
        - id
        - device_id
        - ip
        - is_enabled
        - created_at
        - updated_at
      properties:
        id:
          $ref: '#/components/schemas/ID'
        device_id:
          $ref: '#/components/schemas/ID'
        ip:
          $ref: '#/components/schemas/IPAddress'
        is_enabled:
          type: boolean
          description: The latest state of this address, enabled or disabled
        created_at:
          type: string
          format: date-time
          x-go-type: UTCTime
        updated_at:
          type: string
          format: date-time
          x-go-type: UTCTime
          description: Last time it was enabled or disabled
        expires_at:
          type: string
          format: date-time
          x-go-type: UTCTime
          nullable: true
          readOnly: true
          description: >
            UTC timestamp when this address will auto-expire, if an auto-expiry rule
            is enabled for the device. Null if no expiry is scheduled.

    RequestAuditLogResponse:
      type: object
      required:
        - total
        - next_cursor
        - rows
      properties:
        total:
          type: integer
          description: Total rows matching the current filters (excludes cursor, useful for "N results" UI)
        next_cursor:
          allOf:
            - $ref: '#/components/schemas/ID'
          nullable: true
        rows:
          type: array
          items:
            $ref: '#/components/schemas/RequestAuditLogRow'

    RequestAuditLogRow:
      type: object
      required: [id, created_at, outcome, client_ip, headers]
      properties:
        id:
          $ref: '#/components/schemas/ID'
        client_ip:
          $ref: '#/components/schemas/IPAddress'
        outcome:
          type: boolean
        deny_reason:
          type: string
        device_id:
          $ref: '#/components/schemas/ID'
        device_name:
          type: string
        address_id:
          $ref: '#/components/schemas/ID'
        created_at:
          type: string
          format: date-time
          x-go-type: UTCTime
        xff_chain:
          type: string
        target_host:
          type: string
        target_uri:
          type: string
        http_method:
          type: string
        headers:
          type: object
          additionalProperties:
            type: array
            items:
              type: string

    DeviceAddressLeaseRule:
      type: object
      required:
        - id
        - device_id
        - enabled
        - ttl_seconds
        - created_at
        - updated_at
      properties:
        id:
          $ref: '#/components/schemas/ID'
        device_id:
          $ref: '#/components/schemas/ID'
        enabled:
          type: boolean
          description: Whether the lease rule is active
        ttl_seconds:
          type: integer
          minimum: 1
          description: Seconds after which an enabled device address lease expires
        created_at:
          type: string
          format: date-time
          x-go-type: UTCTime
        updated_at:
          type: string
          format: date-time
          x-go-type: UTCTime

    PutDeviceAddressLeaseRuleRequest:
      type: object
      required:
        - ttl_seconds
      properties:
        ttl_seconds:
          type: integer
          minimum: 1
          description: Seconds after which an enabled device address lease expires

    #################
    # Dashboard
    #################
    DashboardStats:
      type: object
      required:
        - total_requests
        - allowed_count
        - denied_count
        - unique_ips
      properties:
        total_requests:
          type: integer
          format: int64
        allowed_count:
          type: integer
          format: int64
        denied_count:
          type: integer
          format: int64
        unique_ips:
          type: integer
          format: int64

    DashboardTrafficBucket:
      type: object
      required:
        - timestamp
        - allow_count
        - deny_count
      properties:
        timestamp:
          type: string
          format: date-time
          x-go-type: UTCTime
        allow_count:
          type: integer
          format: int64
        deny_count:
          type: integer
          format: int64

    DashboardTrafficResponse:
      type: object
      required:
        - buckets
      properties:
        buckets:
          type: array
          items:
            $ref: '#/components/schemas/DashboardTrafficBucket'

    DashboardServiceCount:
      type: object
      required:
        - host
        - allow_count
        - deny_count
      properties:
        host:
          type: string
        allow_count:
          type: integer
          format: int64
        deny_count:
          type: integer
          format: int64

    DashboardServicesResponse:
      type: object
      required:
        - services
      properties:
        services:
          type: array
          items:
            $ref: '#/components/schemas/DashboardServiceCount'

    DashboardTopDeniedIp:
      type: object
      required:
        - ip
        - count
      properties:
        ip:
          type: string
        count:
          type: integer
          format: int64

    DashboardTopDeniedIpsResponse:
      type: object
      required:
        - ips
      properties:
        ips:
          type: array
          items:
            $ref: '#/components/schemas/DashboardTopDeniedIp'

    #################
    # Reused types
    #################
    Username:
      type: string
      description: "Unique username. Lowercase alphanumeric, underscores, and hyphens only. Uppercase letters are not accepted."
      minLength: 3
      maxLength: 32
      pattern: '^[a-z0-9_-]+$'
      example: "john_doe"
    UserRole:
      type: string
      enum:
        - admin
        - user
      description: The user's role. Only "admin" users can access admin endpoints.
    DisplayName:
      type: string
      description: "User's public name. Unicode allowed."
      minLength: 1
      maxLength: 50
      example: "John Doe"
    Password:
      type: string
      format: password
      minLength: 8
      maxLength: 72
      example: "123ASecretPassword"
    IPAddress:
      type: string
      description: "IPv4 or IPv6 address"
      anyOf:
        - type: string
          format: ipv4
        - type: string
          format: ipv6
      example: "192.168.1.132"
    ID:
      type: integer
      format: int64
