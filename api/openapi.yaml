openapi: 3.0.1
info:
  title: PulseWeaver Device Management API
  description: Device and IP address management system
  version: "1.0"
servers:
  - url: /api/v1

# 1. Global security requirement (denies access by default)
security:
  - cookieAuth: [ ]

paths:
  # --------------------
  # Admin Endpoints
  # --------------------
  /admin/users:
    $ref: './paths/admin.yaml#/users'
  /admin/users/{user_id}:
    $ref: './paths/admin.yaml#/userById'
  /admin/users/{user_id}/promote:
    $ref: './paths/admin.yaml#/promoteUser'
  /admin/users/{user_id}/demote:
    $ref: './paths/admin.yaml#/demoteUser'

  # --------------------
  # Auth Endpoints
  # --------------------
  /auth/login:
    $ref: './paths/auth.yaml#/login'
  /auth/logout:
    $ref: './paths/auth.yaml#/logout'
  /auth/me:
    $ref: './paths/auth.yaml#/me'

  # --------------------
  # User Endpoints
  # --------------------
  /users/me:
    $ref: './paths/users.yaml#/profile'
  /users/me/password:
    $ref: './paths/users.yaml#/password'

  # --------------------
  # Device Endpoints
  # --------------------
  /devices:
    $ref: './paths/devices.yaml#/devices'
  /devices/{device_id}:
    $ref: './paths/devices.yaml#/deviceById'
  /devices/{device_id}/api-key:
    $ref: './paths/devices.yaml#/deleteApiKey'
  /devices/{device_id}/api-key/regenerate:
    $ref: './paths/devices.yaml#/regenerateApiKey'
  /devices/{device_id}/disable:
    $ref: './paths/devices.yaml#/disableDevice'
  /devices/{device_id}/enable:
    $ref: './paths/devices.yaml#/enableDevice'
  /devices/{device_id}/heartbeat:
    $ref: './paths/devices.yaml#/heartbeatById'
  /heartbeat:
    $ref: './paths/devices.yaml#/heartbeat'

  # --------------------
  # Address Endpoints
  # --------------------
  /devices/{device_id}/addresses:
    $ref: './paths/addresses.yaml#/deviceAddresses'
  /address-history:
    $ref: './paths/addresses.yaml#/addressHistory'
  /devices/{device_id}/addresses/{address_id}:
    $ref: './paths/addresses.yaml#/addressById'

  # --------------------
  # Access Log Endpoints
  # --------------------
  /access-log:
    $ref: './paths/access-log.yaml#/accessLog'
  /access-log/stats/by-country:
    $ref: './paths/access-log.yaml#/accessLogByCountry'
  /access-log/deny-reasons:
    $ref: './paths/access-log.yaml#/accessLogDenyReasons'

  # --------------------
  # Rules Endpoints
  # --------------------
  /devices/{device_id}/rules/address-lease:
    $ref: './paths/rules.yaml#/addressLeaseRule'
  /devices/{device_id}/rules/max-active-addresses:
    $ref: './paths/rules.yaml#/maxActiveAddressesRule'

  # --------------------
  # Dashboard Endpoints
  # --------------------
  /dashboard/stats:
    $ref: './paths/dashboard.yaml#/stats'
  /dashboard/traffic:
    $ref: './paths/dashboard.yaml#/traffic'
  /dashboard/services:
    $ref: './paths/dashboard.yaml#/services'
  /dashboard/top-denied-ips:
    $ref: './paths/dashboard.yaml#/topDeniedIps'
  /dashboard/posture:
    $ref: './paths/dashboard.yaml#/posture'

  # --------------------
  # Device Pairing Endpoints
  # --------------------
  /device-pair:
    $ref: './paths/device-pairing.yaml#/claimPairing'
  /devices/{id}/pairings:
    $ref: './paths/device-pairing.yaml#/devicePairings'
  /devices/{id}/pairings/{pairingId}:
    $ref: './paths/device-pairing.yaml#/devicePairingById'

  # --------------------
  # Host Access Endpoints
  # --------------------
  /admin/access/hosts:
    $ref: './paths/admin/access/hosts.yaml#/hosts'
  /admin/access/hosts/reconcile:
    $ref: './paths/admin/access/hosts.yaml#/hostsReconcile'
  /admin/access/host-suggestions:
    $ref: './paths/admin/access/hosts.yaml#/hostSuggestions'
  /admin/access/host-suggestions/ignore:
    $ref: './paths/admin/access/hosts.yaml#/ignoredSuggestions'
  /admin/access/host-suggestions/ignore/{fqdn}:
    $ref: './paths/admin/access/hosts.yaml#/ignoredSuggestionByFqdn'
  /admin/access/host-groups:
    $ref: './paths/admin/access/host-groups.yaml#/hostGroups'
  /admin/access/host-groups/reconcile:
    $ref: './paths/admin/access/host-groups.yaml#/hostGroupsReconcile'
  /admin/access/users:
    $ref: './paths/admin/access/users.yaml#/users'
  /admin/access/users/{user_id}:
    $ref: './paths/admin/access/users.yaml#/userById'
  /admin/access/users/{user_id}/grants:
    $ref: './paths/admin/access/users.yaml#/userGrants'

  # --------------------
  # Policy Audit Endpoints
  # --------------------
  /admin/policy-map:
    $ref: './paths/policy-audit.yaml#/policyMap'
  /admin/policy-simulate:
    $ref: './paths/policy-audit.yaml#/policySimulate'

  # --------------------
  # Network Policy Endpoints
  # --------------------
  /admin/access/network-policies:
    $ref: './paths/admin/access/network-policies.yaml#/networkPolicies'
  /admin/access/network-policies/{policy_id}:
    $ref: './paths/admin/access/network-policies.yaml#/networkPolicy'
  /admin/access/network-policies/{policy_id}/grants:
    $ref: './paths/admin/access/network-policies.yaml#/networkPolicyGrants'

components:
  securitySchemes:
    cookieAuth:
      type: apiKey
      in: cookie
      name: __Host-wdc_session
    apiKeyAuth:
      type: apiKey
      in: header
      name: X-API-Key
      description: API key for device authentication (e.g. heartbeat)

  schemas:
    # --------------------
    # Common
    # --------------------
    ErrorResponse:
      $ref: './components/schemas/common.yaml#/ErrorResponse'
    ID:
      $ref: './components/schemas/common.yaml#/ID'
    IPAddress:
      $ref: './components/schemas/common.yaml#/IPAddress'

    # --------------------
    # Users
    # --------------------
    Username:
      $ref: './components/schemas/users.yaml#/Username'
    UserRole:
      $ref: './components/schemas/users.yaml#/UserRole'
    DisplayName:
      $ref: './components/schemas/users.yaml#/DisplayName'
    Password:
      $ref: './components/schemas/users.yaml#/Password'
    User:
      $ref: './components/schemas/users.yaml#/User'
    AuthRequest:
      $ref: './components/schemas/users.yaml#/AuthRequest'
    CreateUserRequest:
      $ref: './components/schemas/users.yaml#/CreateUserRequest'
    PromoteUserRequest:
      $ref: './components/schemas/users.yaml#/PromoteUserRequest'
    UpdateProfileRequest:
      $ref: './components/schemas/users.yaml#/UpdateProfileRequest'
    ChangePasswordRequest:
      $ref: './components/schemas/users.yaml#/ChangePasswordRequest'

    # --------------------
    # Devices
    # --------------------
    CreateDeviceRequest:
      $ref: './components/schemas/devices.yaml#/CreateDeviceRequest'
    CreateDeviceResult:
      $ref: './components/schemas/devices.yaml#/CreateDeviceResult'
    UpdateDeviceRequest:
      $ref: './components/schemas/devices.yaml#/UpdateDeviceRequest'
    Device:
      $ref: './components/schemas/devices.yaml#/Device'
    DeviceAPIKeyResponse:
      $ref: './components/schemas/devices.yaml#/DeviceAPIKeyResponse'
    DeviceState:
      $ref: './components/schemas/devices.yaml#/DeviceState'
    DeviceRuleSummary:
      $ref: './components/schemas/devices.yaml#/DeviceRuleSummary'
    DevicePairingSummary:
      $ref: './components/schemas/devices.yaml#/DevicePairingSummary'
    DeviceListEntry:
      $ref: './components/schemas/devices.yaml#/DeviceListEntry'
    DeviceListOwner:
      $ref: './components/schemas/devices.yaml#/DeviceListOwner'
    DeviceOwnerGroup:
      $ref: './components/schemas/devices.yaml#/DeviceOwnerGroup'

    # --------------------
    # Addresses
    # --------------------
    AddAddressRequest:
      $ref: './components/schemas/addresses.yaml#/AddAddressRequest'
    Address:
      $ref: './components/schemas/addresses.yaml#/Address'
    AddressHistoryResponse:
      $ref: './components/schemas/addresses.yaml#/AddressHistoryResponse'
    AddressHistoryBucket:
      $ref: './components/schemas/addresses.yaml#/AddressHistoryBucket'
    AddressEventSource:
      $ref: './components/schemas/addresses.yaml#/AddressEventSource'
    AddressHistoryEvent:
      $ref: './components/schemas/addresses.yaml#/AddressHistoryEvent'

    # --------------------
    # Access Log
    # --------------------
    AccessLogResponse:
      $ref: './components/schemas/access-log.yaml#/AccessLogResponse'
    AccessLogCountryStats:
      $ref: './components/schemas/access-log.yaml#/AccessLogCountryStats'
    AccessLogRow:
      $ref: './components/schemas/access-log.yaml#/AccessLogRow'

    # --------------------
    # Rules
    # --------------------
    DeviceAddressLeaseRule:
      $ref: './components/schemas/rules.yaml#/DeviceAddressLeaseRule'
    PutDeviceAddressLeaseRuleRequest:
      $ref: './components/schemas/rules.yaml#/PutDeviceAddressLeaseRuleRequest'
    MaxActiveAddressesRule:
      $ref: './components/schemas/rules.yaml#/MaxActiveAddressesRule'
    PutMaxActiveAddressesRuleRequest:
      $ref: './components/schemas/rules.yaml#/PutMaxActiveAddressesRuleRequest'

    # --------------------
    # Dashboard
    # --------------------
    DashboardStats:
      $ref: './components/schemas/dashboard.yaml#/DashboardStats'
    DashboardTrafficBucket:
      $ref: './components/schemas/dashboard.yaml#/DashboardTrafficBucket'
    DashboardTrafficResponse:
      $ref: './components/schemas/dashboard.yaml#/DashboardTrafficResponse'
    DashboardServiceCount:
      $ref: './components/schemas/dashboard.yaml#/DashboardServiceCount'
    DashboardServicesResponse:
      $ref: './components/schemas/dashboard.yaml#/DashboardServicesResponse'
    DashboardTopDeniedIp:
      $ref: './components/schemas/dashboard.yaml#/DashboardTopDeniedIp'
    DashboardTopDeniedIpsResponse:
      $ref: './components/schemas/dashboard.yaml#/DashboardTopDeniedIpsResponse'
    DashboardPostureUsers:
      $ref: './components/schemas/dashboard.yaml#/DashboardPostureUsers'
    DashboardPostureNetworkPolicies:
      $ref: './components/schemas/dashboard.yaml#/DashboardPostureNetworkPolicies'
    DashboardPosture:
      $ref: './components/schemas/dashboard.yaml#/DashboardPosture'

    # --------------------
    # Device Pairing
    # --------------------
    CreatePairingRequest:
      $ref: './components/schemas/device-pairing.yaml#/CreatePairingRequest'
    DevicePairing:
      $ref: './components/schemas/device-pairing.yaml#/DevicePairing'
    ClaimPairingRequest:
      $ref: './components/schemas/device-pairing.yaml#/ClaimPairingRequest'
    ClaimPairingResponse:
      $ref: './components/schemas/device-pairing.yaml#/ClaimPairingResponse'

    # --------------------
    # Network Policies
    # --------------------
    NetworkPolicyListItem:
      $ref: './components/schemas/network-policy.yaml#/NetworkPolicyListItem'
    NetworkPolicyDetail:
      $ref: './components/schemas/network-policy.yaml#/NetworkPolicyDetail'
    CreateNetworkPolicyRequest:
      $ref: './components/schemas/network-policy.yaml#/CreateNetworkPolicyRequest'
    ModifyNetworkPolicyRequest:
      $ref: './components/schemas/network-policy.yaml#/ModifyNetworkPolicyRequest'

    # --------------------
    # Policy Audit
    # --------------------
    PolicyUserMapAudit:
      $ref: './components/schemas/policy-audit.yaml#/PolicyUserMapAudit'
    PolicyUserEntry:
      $ref: './components/schemas/policy-audit.yaml#/PolicyUserEntry'
    PolicyIPDevice:
      $ref: './components/schemas/policy-audit.yaml#/PolicyIPDevice'
    PolicyUserIPSharedUser:
      $ref: './components/schemas/policy-audit.yaml#/PolicyUserIPSharedUser'
    PolicyUserIP:
      $ref: './components/schemas/policy-audit.yaml#/PolicyUserIP'
    PolicyUserAddress:
      $ref: './components/schemas/policy-audit.yaml#/PolicyUserAddress'
    PolicySimulateDenyReason:
      $ref: './components/schemas/policy-audit.yaml#/PolicySimulateDenyReason'
    PolicySimulateResult:
      $ref: './components/schemas/policy-audit.yaml#/PolicySimulateResult'
    PolicyNetworkPolicyEntry:
      $ref: './components/schemas/policy-audit.yaml#/PolicyNetworkPolicyEntry'

    # --------------------
    # Groups
    # --------------------
    GroupRef:
      $ref: './components/schemas/host-groups.yaml#/GroupRef'
    GroupSummary:
      $ref: './components/schemas/host-groups.yaml#/GroupSummary'
    HostSummary:
      $ref: './components/schemas/host-groups.yaml#/HostSummary'
    UserSummary:
      $ref: './components/schemas/host-groups.yaml#/UserSummary'
    NetworkPolicyRef:
      $ref: './components/schemas/host-groups.yaml#/NetworkPolicyRef'
    GroupDetail:
      $ref: './components/schemas/host-groups.yaml#/GroupDetail'
    GroupDetailWithUsers:
      $ref: './components/schemas/host-groups.yaml#/GroupDetailWithUsers'
    SubjectGroupDetail:
      $ref: './components/schemas/host-groups.yaml#/SubjectGroupDetail'
    GroupWrite:
      $ref: './components/schemas/host-groups.yaml#/GroupWrite'
    GroupListResponse:
      $ref: './components/schemas/host-groups.yaml#/GroupListResponse'
    ReconcileGroupsRequest:
      $ref: './components/schemas/host-groups.yaml#/ReconcileGroupsRequest'
    ModifyAccessRequest:
      $ref: './components/schemas/host-groups.yaml#/ModifyAccessRequest'

    # --------------------
    # Hosts
    # --------------------
    Host:
      $ref: './components/schemas/hosts.yaml#/Host'
    HostInput:
      $ref: './components/schemas/hosts.yaml#/HostInput'
    HostListResponse:
      $ref: './components/schemas/hosts.yaml#/HostListResponse'
    ReconcileHostsRequest:
      $ref: './components/schemas/hosts.yaml#/ReconcileHostsRequest'
    HostSuggestion:
      $ref: './components/schemas/hosts.yaml#/HostSuggestion'
    IgnoredHostSuggestion:
      $ref: './components/schemas/hosts.yaml#/IgnoredHostSuggestion'
    IgnoreSuggestionRequest:
      $ref: './components/schemas/hosts.yaml#/IgnoreSuggestionRequest'
    HostSuggestionsPage:
      $ref: './components/schemas/hosts.yaml#/HostSuggestionsPage'

    # --------------------
    # User Access Views
    # --------------------
    DeviceListItem:
      $ref: './components/schemas/users.yaml#/DeviceListItem'
    UserListItem:
      $ref: './components/schemas/users.yaml#/UserListItem'
    UserAccessDetail:
      $ref: './components/schemas/users.yaml#/UserAccessDetail'
