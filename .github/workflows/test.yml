name: Test

on:
  workflow_call:

jobs:
  test-backend:
    name: Backend (lint + test)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v7

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version: '1.26'
          cache-dependency-path: |
            go.sum
            tools/go.sum
          cache: true

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '25.8'
          cache: 'npm'
          cache-dependency-path: package-lock.json

      - name: Install Go dependencies
        run: |
          go mod download
          go mod download -modfile=tools/go.mod

      - name: Install root npm dependencies
        run: npm ci

      - name: Bundle API spec
        run: npm run bundle:api

      - name: Generate Go types
        run: go generate ./cmd/... ./internal/...

      - name: Check migrations
        run: bash scripts/check-migrations.sh

      - name: Lint
        run: go tool -modfile=tools/go.mod golangci-lint run ./cmd/... ./internal/...

      - name: Run tests
        run: go test -tags=test ./cmd/... ./internal/...

  test-frontend:
    name: Frontend (lint + test)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v7

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '25.8'
          cache: 'npm'
          cache-dependency-path: |
            package-lock.json
            frontend/package-lock.json

      - name: Install root npm dependencies
        run: npm ci

      - name: Install frontend dependencies
        working-directory: frontend
        run: npm ci

      - name: Generate frontend API types
        working-directory: frontend
        run: npm run generate:api

      - name: Lint
        working-directory: frontend
        run: npx eslint .

      - name: Type-check
        working-directory: frontend
        run: npx tsc --noEmit -p tsconfig.app.json

      - name: Run tests
        working-directory: frontend
        run: npm test
