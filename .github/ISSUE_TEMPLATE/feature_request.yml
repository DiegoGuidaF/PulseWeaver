name: Feature Request
description: Suggest an improvement or new capability
labels: ["enhancement"]
body:
  - type: textarea
    id: problem
    attributes:
      label: What problem does this solve?
      description: Describe the use case or pain point. "I want to..." or "It's frustrating when..."
    validations:
      required: true

  - type: textarea
    id: solution
    attributes:
      label: Proposed solution
      description: How would you like this to work?
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
      description: Any workarounds or alternative approaches you've thought about?

  - type: dropdown
    id: area
    attributes:
      label: Area
      options:
        - Backend / API
        - Frontend / UI
        - Forward-auth flow
        - Heartbeat / device tracking
        - Policy engine
        - Deployment / Docker
        - Documentation
        - Other
    validations:
      required: true
