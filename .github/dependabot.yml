version: 2
updates:
  # Go modules — group all minor/patch together; major bumps get individual PRs
  - package-ecosystem: "gomod"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
    open-pull-requests-limit: 5
    labels: ["dependencies", "backend"]
    groups:
      go-minor-patch:
        update-types: ["minor", "patch"]

  # Frontend npm
  - package-ecosystem: "npm"
    directory: "/frontend"
    schedule:
      interval: "weekly"
      day: "monday"
    open-pull-requests-limit: 5
    labels: ["dependencies", "frontend"]
    groups:
      # Group all @mantine/* packages together (including major bumps)
      mantine:
        patterns: ["@mantine/*"]
      # Group remaining minor/patch updates to reduce PR noise
      frontend-minor-patch:
        patterns: ["*"]
        update-types: ["minor", "patch"]

  # GitHub Actions — group everything together
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
    open-pull-requests-limit: 5
    labels: ["dependencies", "ci"]
    groups:
      github-actions:
        patterns: ["*"]
