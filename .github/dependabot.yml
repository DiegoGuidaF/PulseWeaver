version: 2
updates:
  # Go modules (app) — group all minor/patch together; major bumps get individual PRs
  - package-ecosystem: "gomod"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
      timezone: "Europe/Rome"
    open-pull-requests-limit: 5
    assignees: ["DiegoGuidaF"]
    labels: ["dependencies", "backend"]
    groups:
      go-minor-patch:
        update-types: ["minor", "patch"]

  # Go modules (tools) — golangci-lint, oapi-codegen
  - package-ecosystem: "gomod"
    directory: "/tools"
    schedule:
      interval: "weekly"
      day: "monday"
      timezone: "Europe/Rome"
    open-pull-requests-limit: 3
    assignees: ["DiegoGuidaF"]
    labels: ["dependencies", "backend"]
    groups:
      go-tools-minor-patch:
        update-types: ["minor", "patch"]

  # Root npm — build-time tooling only (e.g. @redocly/cli for the OpenAPI bundle)
  - package-ecosystem: "npm"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
      timezone: "Europe/Rome"
    open-pull-requests-limit: 3
    assignees: ["DiegoGuidaF"]
    labels: ["dependencies", "backend"]
    groups:
      root-tools-minor-patch:
        update-types: ["minor", "patch"]

  # Frontend npm
  - package-ecosystem: "npm"
    directory: "/frontend"
    schedule:
      interval: "weekly"
      day: "monday"
      timezone: "Europe/Rome"
    open-pull-requests-limit: 5
    assignees: ["DiegoGuidaF"]
    labels: ["dependencies", "frontend"]
    ignore:
      # TypeScript and ESLint major bumps require manual migration work.
      # Close the open PRs (#22, #28) and handle these as planned stories.
      - dependency-name: "typescript"
        update-types: ["version-update:semver-major"]
      - dependency-name: "eslint"
        update-types: ["version-update:semver-major"]
      - dependency-name: "@eslint/*"
        update-types: ["version-update:semver-major"]
    groups:
      # Group all @mantine/* packages together (including major bumps)
      mantine:
        patterns: ["@mantine/*"]
      # Group remaining minor/patch updates to reduce PR noise
      frontend-minor-patch:
        patterns: ["*"]
        update-types: ["minor", "patch"]

  # Docker base images (Dockerfile: node, golang, distroless) — group minor/patch
  - package-ecosystem: "docker"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
      timezone: "Europe/Rome"
    open-pull-requests-limit: 3
    assignees: ["DiegoGuidaF"]
    labels: ["dependencies", "ci"]
    groups:
      docker-minor-patch:
        update-types: ["minor", "patch"]

  # GitHub Actions — group minor/patch; major bumps (v4→v5) get individual PRs
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
      timezone: "Europe/Rome"
    open-pull-requests-limit: 5
    assignees: ["DiegoGuidaF"]
    labels: ["dependencies", "ci"]
    groups:
      github-actions:
        patterns: ["*"]
        update-types: ["minor", "patch"]
