# git-cliff configuration — https://git-cliff.org/docs/configuration
# Shared convention for all PulseWeaver repositories.

[changelog]
header = """
# Changelog\n
All notable changes to this project will be documented in this file.\n
"""
body = """
{% if version %}\
## [{{ version | trim_start_matches(pat="v") }}] - {{ timestamp | date(format="%Y-%m-%d") }}
{% else %}\
## [Unreleased]
{% endif %}\
{% for group, commits in commits | group_by(attribute="group") %}
### {{ group | upper_first }}
{% for commit in commits %}
- {% if commit.scope %}*({{ commit.scope }})* {% endif %}\
{% if commit.breaking %}[**breaking**] {% endif %}\
{{ commit.message | upper_first }} ([`{{ commit.id | truncate(length=7, end="") }}`](https://github.com/DiegoGuidaF/PulseWeaver/commit/{{ commit.id }}))\
{% endfor %}
{% endfor %}\n
"""
footer = ""
trim = true

[git]
conventional_commits = true
filter_unconventional = true
split_commits = false
commit_preprocessors = [
    { pattern = '\(#([0-9]+)\)', replace = "([#${1}](https://github.com/DiegoGuidaF/PulseWeaver/pull/${1}))" },
    { pattern = '\[PW-([0-9]+)\]:', replace = ": [PW-${1}]" },
]
commit_parsers = [
    # Skip dependabot
    { message = "^chore\\(deps\\): Bump", skip = true },
    # User-centric sections (must be easy to read and not too technical)
    { message = "^feat", group = "Features" },
    { message = "^fix", group = "Bug Fixes" },
    { message = "^docs", group = "Documentation" },
    { message = "^ai", group = "Documentation" },
    # Tech-centric sections
    { message = "^perf", group = "Under the Hood" },
    { message = "^refactor", group = "Under the Hood" },
    { message = "^chore", group = "Under the Hood" },
    { message = "^test", group = "Under the Hood" },
    { message = "^build", group = "Under the Hood" },
    { message = "^ci", group = "Under the Hood" },
    { message = "^style", group = "Under the Hood" },
    { message = "^revert", group = "Under the Hood" },
    # Catch-all
    { message = ".*", group = "Unmatched commits - REVIEW" }
]
protect_breaking_commits = false
filter_commits = false
tag_pattern = "v[0-9].*"
skip_tags = ""
ignore_tags = ""
topo_order = false
sort_commits = "oldest"
