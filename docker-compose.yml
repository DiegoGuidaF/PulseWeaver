services:
  wallydic:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: wallydic
    ports:
      - "8080:8080"
    environment:
      # Required
      - ADMIN_PASSWORD=${ADMIN_PASSWORD:-changeme}
      # Optional (with defaults from Dockerfile)
      - SERVER_PORT=8080
      - DB_FILE=/app/data/wallydic.db
      - LOG_LEVEL=debug
      - LOG_COLOR=true
      - LOG_FORMAT=text
      - AUTHZ_API_SECRET="averylongandsecuresecret"
      #- TZ=
      #- TRUSTED_PROXY=${TRUSTED_PROXY:-}
      #- DB_DEBUG=${DB_DEBUG:-false}
    volumes:
      - ./docker-data/:/app/data
    restart: unless-stopped