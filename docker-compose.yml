services:
  wallydic:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: wallydic
    ports:
      - "8080:8080"
    environment:
      # Required
      - ADMIN_PASSWORD=${ADMIN_PASSWORD:-changeme}
      # Optional (with defaults)
      - SERVER_PORT=8080
      - LOG_LEVEL=debug
      - LOG_COLOR=true
      - LOG_FORMAT=text
      - POLICY_ENGINE_API_SECRET="averylongandsecuresecret"
      #- TZ=
      #- TRUSTED_PROXY=${TRUSTED_PROXY:-}
    volumes:
      - ./docker-data:/data
      # Named volume alternative (easiest for persistence; no chown needed):
      # - wallydic-data:/data
    restart: unless-stopped

# Uncomment if using named volume:
# volumes:
#   wallydic-data: